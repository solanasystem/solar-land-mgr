<!-- ===== セッションチェック (スプラッシュ重複表示防止) =====
     ブラウザセッションごとに1回のみスプラッシュ表示。
     既に「入場済み」フラグがあれば即座にmain.htmlへリダイレクト。
     タブを閉じるとフラグが消えるので、次回再度スプラッシュ。 -->
<script>
(function(){
  try {
    if (sessionStorage.getItem('grid_entered') === '1') {
      window.location.replace('main.html');
    }
  } catch(e) { /* sessionStorage無効環境では毎回スプラッシュ */ }
})();
</script>

<title>GRID LAND MGR — Initializing</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --core: #ffffff;
    --cyan: #66e5ff;
    --aqua: #00c8ff;
    --blue: #0080ff;
    --green: #3eff9d;
    --emerald: #00ff99;
    --ivory: #e8faff;
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000308;
    color: var(--ivory);
    font-family: 'Rajdhani', sans-serif;
    cursor: default;
  }

  #warpCanvas {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 1;
  }

  /* ===== 中心コア (CSS発光・控えめ) ===== */
  .core {
    position: fixed;
    top: 50%;
    left: 50%;
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: white;
    transform: translate(-50%, -50%);
    z-index: 5;
    pointer-events: none;
    box-shadow:
      0 0 14px 4px rgba(255, 255, 255, 0.9),
      0 0 35px 12px rgba(180, 240, 255, 0.55),
      0 0 75px 30px rgba(0, 200, 255, 0.3);
    opacity: 0;
    animation: core-emerge 1s ease-out 0.1s forwards;
  }
  @keyframes core-emerge {
    0%   { opacity: 0; transform: translate(-50%, -50%) scale(0); }
    50%  { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    100% { opacity: 1; transform: translate(-50%, -50%) scale(1.4); }
  }
  .core.flash {
    animation: core-flash 0.6s ease-out forwards;
  }
  @keyframes core-flash {
    0%   { opacity: 1; transform: translate(-50%, -50%) scale(1.4); }
    50% {
      opacity: 1;
      transform: translate(-50%, -50%) scale(80);
      box-shadow:
        0 0 200px 100px rgba(255, 255, 255, 1),
        0 0 600px 300px rgba(102, 229, 255, 0.85),
        0 0 1200px 600px rgba(0, 200, 255, 0.5);
    }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(150); }
  }

  /* ===== スキャンライン ===== */
  .scanlines {
    position: fixed;
    inset: 0;
    z-index: 50;
    pointer-events: none;
    background: repeating-linear-gradient(
      0deg,
      rgba(0, 0, 0, 0) 0px,
      rgba(0, 0, 0, 0) 2px,
      rgba(0, 20, 30, 0.18) 3px,
      rgba(0, 0, 0, 0) 4px
    );
    opacity: 0.4;
  }

  /* ===== ビネット ===== */
  .vignette {
    position: fixed;
    inset: 0;
    z-index: 40;
    pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 25%, rgba(0,5,15,0.85) 100%);
  }

  /* ===== ノイズ ===== */
  .noise {
    position: fixed;
    inset: 0;
    z-index: 60;
    pointer-events: none;
    opacity: 0.04;
    mix-blend-mode: screen;
    background-image: url("data:image/svg+xml;utf8,<svg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='1.2' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.4 0 0 0 0 0.9 0 0 0 0 1 0 0 0 0.9 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
    animation: noise-shift 0.18s steps(4) infinite;
  }
  @keyframes noise-shift {
    0%   { transform: translate(0,0); }
    25%  { transform: translate(-3%, 2%); }
    50%  { transform: translate(2%, -2%); }
    75%  { transform: translate(-2%, 3%); }
  }

  /* ===== タイトルオーバーレイ ===== */
  .overlay {
    position: fixed;
    inset: 0;
    z-index: 70;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }
  .title-shell {
    position: relative;
    text-align: center;
    transform: scale(12);
    opacity: 0;
    filter: blur(40px);
    animation:
      warp-in 1.6s cubic-bezier(0.19, 1, 0.22, 1) 2.6s forwards,
      warp-through 1.4s cubic-bezier(0.7, 0, 0.85, 0) 5.4s forwards;
  }
  @keyframes warp-in {
    0%   { transform: scale(12); opacity: 0; filter: blur(40px); }
    30%  { opacity: 0.4; }
    70%  { opacity: 1; }
    100% { transform: scale(1); opacity: 1; filter: blur(0); }
  }
  @keyframes warp-through {
    0%   { transform: scale(1);  opacity: 1; filter: blur(0); }
    40%  { opacity: 0.95; filter: blur(4px); }
    100% { transform: scale(28); opacity: 0; filter: blur(50px); }
  }

  .title {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: clamp(2rem, 7.5vw, 6.5rem);
    letter-spacing: 0.22em;
    line-height: 1;
    color: var(--ivory);
    text-indent: 0.22em;
    text-shadow:
      0 0 8px rgba(255, 255, 255, 0.95),
      0 0 24px rgba(102, 229, 255, 0.85),
      0 0 60px rgba(0, 200, 255, 0.7),
      0 0 120px rgba(0, 255, 153, 0.45);
  }

  .ornament-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1.5em;
    margin-top: 1.5em;
    opacity: 0;
    animation: bar-in 1s ease-out 4s forwards;
  }
  .ornament-bar .seg {
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--cyan), transparent);
    box-shadow: 0 0 12px var(--cyan);
  }
  .ornament-bar .seg.left,
  .ornament-bar .seg.right { width: 80px; }
  .ornament-bar .pip {
    width: 8px;
    height: 8px;
    background: var(--core);
    transform: rotate(45deg);
    box-shadow: 0 0 18px var(--cyan), 0 0 36px var(--emerald);
  }
  @keyframes bar-in { to { opacity: 1; } }

  .subtitle {
    font-family: 'Orbitron', sans-serif;
    font-weight: 400;
    font-size: clamp(0.75rem, 1.4vw, 1rem);
    letter-spacing: 0.55em;
    color: rgba(232, 250, 255, 0.85);
    margin-top: 1.4em;
    text-indent: 0.55em;
    text-transform: uppercase;
    opacity: 0;
    animation: fade-in 1s ease-out 4.2s forwards;
    text-shadow: 0 0 16px rgba(102, 229, 255, 0.6);
  }
  @keyframes fade-in { to { opacity: 1; } }

  /* ===== HUD ===== */
  .hud {
    position: fixed;
    z-index: 65;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 500;
    font-size: 0.75rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: rgba(150, 230, 255, 0.75);
    text-shadow: 0 0 8px rgba(0, 200, 255, 0.6);
    opacity: 0;
    animation: fade-in 0.8s ease-out 0.5s forwards;
  }
  .hud.tl { top: 5vh; left: 5vw; }
  .hud.tr { top: 5vh; right: 5vw; text-align: right; }
  .hud.bl { bottom: 5vh; left: 5vw; }
  .hud.br {
    bottom: 5vh;
    right: 5vw;
    text-align: right;
    opacity: 0;
    animation: fade-in 0.8s ease-out 6.9s forwards;
  }
  .hud .label {
    color: rgba(0, 255, 153, 0.85);
    font-size: 0.65rem;
    letter-spacing: 0.35em;
    margin-bottom: 0.3em;
    display: block;
  }
  .hud .val {
    color: var(--ivory);
    font-weight: 700;
    font-size: 0.95rem;
    letter-spacing: 0.15em;
  }
  .hud .blink { animation: blink 1s steps(2) infinite; }
  @keyframes blink { 50% { opacity: 0.2; } }

  /* コーナーブラケット */
  .bracket {
    position: fixed;
    width: 60px;
    height: 60px;
    z-index: 64;
    opacity: 0;
    animation: fade-in 0.6s ease-out 0.3s forwards;
  }
  .bracket::before, .bracket::after {
    content: '';
    position: absolute;
    background: rgba(102, 229, 255, 0.85);
    box-shadow: 0 0 10px rgba(0, 200, 255, 0.7);
  }
  .bracket.tl { top: 3vh; left: 3vw; }
  .bracket.tl::before { top: 0; left: 0; width: 30px; height: 2px; }
  .bracket.tl::after  { top: 0; left: 0; width: 2px; height: 30px; }
  .bracket.tr { top: 3vh; right: 3vw; }
  .bracket.tr::before { top: 0; right: 0; width: 30px; height: 2px; }
  .bracket.tr::after  { top: 0; right: 0; width: 2px; height: 30px; }
  .bracket.bl { bottom: 3vh; left: 3vw; }
  .bracket.bl::before { bottom: 0; left: 0; width: 30px; height: 2px; }
  .bracket.bl::after  { bottom: 0; left: 0; width: 2px; height: 30px; }
  .bracket.br { bottom: 3vh; right: 3vw; }
  .bracket.br::before { bottom: 0; right: 0; width: 30px; height: 2px; }
  .bracket.br::after  { bottom: 0; right: 0; width: 2px; height: 30px; }

  /* ===== Skip ===== */
  .skip {
    position: fixed;
    top: 5vh;
    right: 5vw;
    background: transparent;
    border: 1px solid rgba(102, 229, 255, 0.3);
    padding: 0.5em 1.2em;
    color: rgba(150, 230, 255, 0.6);
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.7rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    cursor: pointer;
    z-index: 80;
    opacity: 0;
    animation: fade-in 0.5s ease-out 1s forwards;
    transition: all 0.3s;
    pointer-events: auto;
  }
  .skip:hover {
    color: var(--cyan);
    border-color: var(--cyan);
    box-shadow: 0 0 12px rgba(102, 229, 255, 0.5);
  }

  body.fade-out { animation: master-fade 0.9s ease-in forwards; }
  @keyframes master-fade {
    to { opacity: 0; transform: scale(1.06); filter: blur(6px); }
  }

  @media (max-width: 640px) {
    .title { letter-spacing: 0.13em; text-indent: 0.13em; }
    .ornament-bar .seg.left, .ornament-bar .seg.right { width: 40px; }
    .subtitle { letter-spacing: 0.35em; text-indent: 0.35em; }
    .hud { font-size: 0.6rem; letter-spacing: 0.18em; }
    .hud .val { font-size: 0.8rem; }
    .hud .label { font-size: 0.55rem; }
    .bracket { width: 36px; height: 36px; }
    .bracket::before { width: 18px !important; }
    .bracket::after  { height: 18px !important; }
  }
</style>
</head>
<body>
  <canvas id="warpCanvas"></canvas>

  <div class="core" id="core"></div>

  <div class="bracket tl"></div>
  <div class="bracket tr"></div>
  <div class="bracket bl"></div>
  <div class="bracket br"></div>

  <div class="hud tl">
    <span class="label">System</span>
    <span class="val">GRID LAND MGR</span>
  </div>
  <div class="hud tr">
    <span class="label">Status</span>
    <span class="val blink">▮ INITIALIZING</span>
  </div>
  <div class="hud bl">
    <span class="label">Node</span>
    <span class="val">XAMAX / 2026</span>
  </div>
  <div class="hud br">
    <span class="label">Sequence</span>
    <span class="val">0x4C-NODE</span>
  </div>

  <div class="overlay">
    <div class="title-shell">
      <h1 class="title">GRID LAND MGR</h1>
      <div class="ornament-bar">
        <span class="seg left"></span>
        <span class="pip"></span>
        <span class="seg right"></span>
      </div>
      <p class="subtitle">Connected Energy Grid</p>
    </div>
  </div>

  <button class="skip" id="skipBtn">Skip ›</button>

  <div class="vignette"></div>
  <div class="scanlines"></div>
  <div class="noise"></div>

<script>
  /* ============================================
     星空のような繊細な光点ワープエフェクト
     - 10500個の超小粒子 (大半がdust)
     - 1500個の光子の雲
     - 多層ハロー
     ============================================ */
  const canvas = document.getElementById('warpCanvas');
  const ctx = canvas.getContext('2d');
  let W, H, cx, cy, dpr;

  function resize() {
    dpr = window.devicePixelRatio || 1;
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    cx = W / 2;
    cy = H / 2;
  }
  window.addEventListener('resize', resize);
  resize();

  /* ===== カラーパレット (12色) ===== */
  const PALETTE = [
    [255, 255, 255], // 純白
    [230, 250, 255], // アイス
    [180, 240, 255], // 淡シアン
    [130, 220, 255], // ソフトシアン
    [102, 229, 255], // シアン
    [60, 200, 235],  // ターコイズ
    [30, 180, 255],  // アクアブルー
    [60, 142, 255],  // ブルー
    [80, 220, 200],  // ティール
    [62, 255, 157],  // エメラルド
    [0, 255, 136],   // スプリンググリーン
    [144, 255, 200], // ライムティール
  ];

  /* ===== ワープ粒子 (繊細な光点) ===== */
  class Particle {
    constructor() { this.reset(true); }
    reset(initial = false) {
      const angle = Math.random() * Math.PI * 2;
      const radius = Math.random() * 0.95 + 0.05;
      this.x = Math.cos(angle) * radius;
      this.y = Math.sin(angle) * radius;
      this.z = initial ? Math.random() * 0.99 + 0.01 : 1;
      this.prevZ = this.z;

      // サイズ階層 - 大半が極小の dust (1.5倍版)
      const r = Math.random();
      if (r > 0.997)      { this.tier = 'sparkle'; this.sizeMul = 1.275; this.isStar = true; }
      else if (r > 0.985) { this.tier = 'large';   this.sizeMul = 0.975; this.isStar = false; }
      else if (r > 0.93)  { this.tier = 'medium';  this.sizeMul = 0.63;  this.isStar = false; }
      else if (r > 0.60)  { this.tier = 'small';   this.sizeMul = 0.42;  this.isStar = false; }
      else                { this.tier = 'dust';    this.sizeMul = 0.27;  this.isStar = false; }

      // 明滅
      this.twinkleSpeed = 1.5 + Math.random() * 7;
      this.twinklePhase = Math.random() * Math.PI * 2;
      this.twinkleDepth = 0.2 + Math.random() * 0.5;

      this.color = PALETTE[Math.floor(Math.random() * PALETTE.length)];
      this.spikeRot = Math.random() * Math.PI;
    }
    update(speed) {
      this.prevZ = this.z;
      this.z -= speed;
      if (this.z <= 0.005) this.reset();
    }
    draw(time) {
      const scale = Math.max(W, H) * 0.7;
      const px = cx + (this.x / this.z) * scale;
      const py = cy + (this.y / this.z) * scale;

      if (px < -50 || px > W + 50 || py < -50 || py > H + 50) return;

      const depth = 1 - this.z;
      const twinkle = (1 - this.twinkleDepth) +
                      this.twinkleDepth * Math.sin(time * this.twinkleSpeed + this.twinklePhase);

      // 繊細な小サイズ (1.5倍版)
      const baseSize = depth * depth * 1.7 * this.sizeMul;
      const size = Math.max(0.27, baseSize);
      const alpha = Math.min(1, depth * 2.0) * twinkle;

      const [r, g, b] = this.color;

      // 軌跡 (depth > 0.5 の近距離粒子のみ・極短)
      if (depth > 0.5) {
        const ppx = cx + (this.x / this.prevZ) * scale;
        const ppy = cy + (this.y / this.prevZ) * scale;
        const dx = px - ppx;
        const dy = py - ppy;
        const dist = Math.sqrt(dx * dx + dy * dy + 0.0001);
        const maxTrail = size * 1.8;
        const trailScale = Math.min(1, maxTrail / dist);
        const tx = px - dx * trailScale;
        const ty = py - dy * trailScale;

        ctx.strokeStyle = `rgba(${r}, ${g}, ${b}, ${alpha * 0.4})`;
        ctx.lineWidth = size * 0.6;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(tx, ty);
        ctx.lineTo(px, py);
        ctx.stroke();
      }

      // グロー (size > 0.5 の中粒以上のみ・パフォーマンス最適化)
      if (size > 0.5) {
        const glowR = size * 4;
        const glowGrad = ctx.createRadialGradient(px, py, 0, px, py, glowR);
        glowGrad.addColorStop(0,   `rgba(${r}, ${g}, ${b}, ${alpha * 0.7})`);
        glowGrad.addColorStop(0.4, `rgba(${r}, ${g}, ${b}, ${alpha * 0.2})`);
        glowGrad.addColorStop(1,   `rgba(${r}, ${g}, ${b}, 0)`);
        ctx.fillStyle = glowGrad;
        ctx.beginPath();
        ctx.arc(px, py, glowR, 0, Math.PI * 2);
        ctx.fill();
      }

      // 核 (常時)
      ctx.fillStyle = `rgba(${Math.min(255, r + 50)}, ${Math.min(255, g + 35)}, ${Math.min(255, b + 25)}, ${alpha})`;
      ctx.beginPath();
      ctx.arc(px, py, size, 0, Math.PI * 2);
      ctx.fill();

      // スパークル(クロスフレア) — 極稀な明るい星のみ
      if (this.isStar && depth > 0.55) {
        const flareLen = size * 9;
        const flareAlpha = alpha * 0.55;
        ctx.save();
        ctx.translate(px, py);
        ctx.rotate(this.spikeRot);

        const vGrad = ctx.createLinearGradient(0, -flareLen, 0, flareLen);
        vGrad.addColorStop(0,    `rgba(${r}, ${g}, ${b}, 0)`);
        vGrad.addColorStop(0.45, `rgba(${r}, ${g}, ${b}, ${flareAlpha})`);
        vGrad.addColorStop(0.5,  `rgba(255, 255, 255, ${flareAlpha})`);
        vGrad.addColorStop(0.55, `rgba(${r}, ${g}, ${b}, ${flareAlpha})`);
        vGrad.addColorStop(1,    `rgba(${r}, ${g}, ${b}, 0)`);
        ctx.strokeStyle = vGrad;
        ctx.lineWidth = 0.5;
        ctx.beginPath();
        ctx.moveTo(0, -flareLen);
        ctx.lineTo(0, flareLen);
        ctx.stroke();

        const hGrad = ctx.createLinearGradient(-flareLen, 0, flareLen, 0);
        hGrad.addColorStop(0,    `rgba(${r}, ${g}, ${b}, 0)`);
        hGrad.addColorStop(0.45, `rgba(${r}, ${g}, ${b}, ${flareAlpha})`);
        hGrad.addColorStop(0.5,  `rgba(255, 255, 255, ${flareAlpha})`);
        hGrad.addColorStop(0.55, `rgba(${r}, ${g}, ${b}, ${flareAlpha})`);
        hGrad.addColorStop(1,    `rgba(${r}, ${g}, ${b}, 0)`);
        ctx.strokeStyle = hGrad;
        ctx.beginPath();
        ctx.moveTo(-flareLen, 0);
        ctx.lineTo(flareLen, 0);
        ctx.stroke();

        ctx.restore();
      }
    }
  }

  /* ===== 中央光子の雲 (静的微粒子・繊細化) ===== */
  class HaloPhoton {
    constructor() { this.reset(); }
    reset() {
      const u1 = Math.random();
      const u2 = Math.random();
      // 分布範囲を 0.55 → 0.9 に拡張 (ハロー全域に粒子を散布)
      const r = Math.pow(u1, 1.5) * 0.9;
      const angle = u2 * Math.PI * 2;
      this.x = Math.cos(angle) * r;
      this.y = Math.sin(angle) * r;
      this.distFromCenter = r;

      // 大幅縮小 (1.4+0.3 → 0.6+0.12 → 1.5倍版: 0.9+0.18)
      this.size = Math.random() * 0.9 + 0.18;
      this.brightness = 0.25 + Math.random() * 0.65;

      this.twinkleSpeed = 0.8 + Math.random() * 5;
      this.twinklePhase = Math.random() * Math.PI * 2;
      this.twinkleDepth = 0.4 + Math.random() * 0.5;

      this.driftAmp = Math.random() * 0.008;
      this.driftSpeedX = (Math.random() - 0.5) * 1.5;
      this.driftSpeedY = (Math.random() - 0.5) * 1.5;

      // 距離に応じた色相変化 (拡張範囲対応)
      const tone = Math.random();
      if (this.distFromCenter < 0.15) {
        this.color = tone > 0.5 ? [255, 255, 255] : [230, 250, 255];
      } else if (this.distFromCenter < 0.3) {
        this.color = tone > 0.5 ? [180, 240, 255] : [130, 220, 255];
      } else if (this.distFromCenter < 0.5) {
        this.color = tone > 0.5 ? [102, 229, 255] : [60, 200, 235];
      } else if (this.distFromCenter < 0.7) {
        this.color = tone > 0.5 ? [62, 255, 157] : [80, 220, 200];
      } else {
        // 外周は深いブルー〜エメラルドの淡い色
        this.color = tone > 0.5 ? [40, 160, 220] : [50, 200, 180];
      }
    }
    draw(time, intensity) {
      const scale = Math.max(W, H) * 0.5;
      const driftX = Math.sin(time * this.driftSpeedX + this.twinklePhase) * this.driftAmp;
      const driftY = Math.cos(time * this.driftSpeedY + this.twinklePhase) * this.driftAmp;
      const px = cx + (this.x + driftX) * scale;
      const py = cy + (this.y + driftY) * scale;

      const twinkle = (1 - this.twinkleDepth) +
                      this.twinkleDepth * Math.sin(time * this.twinkleSpeed + this.twinklePhase);
      // フェードカーブも分布範囲拡張に合わせる
      const distFade = Math.max(0, 1 - Math.pow(this.distFromCenter / 0.9, 1.6));
      const alpha = this.brightness * twinkle * distFade * intensity;

      if (alpha < 0.012) return;

      const [r, g, b] = this.color;

      // 大粒のみグロー
      if (this.size > 0.4) {
        const glowR = this.size * 3.2;
        const glowGrad = ctx.createRadialGradient(px, py, 0, px, py, glowR);
        glowGrad.addColorStop(0,   `rgba(${r}, ${g}, ${b}, ${alpha * 0.75})`);
        glowGrad.addColorStop(0.5, `rgba(${r}, ${g}, ${b}, ${alpha * 0.18})`);
        glowGrad.addColorStop(1,   `rgba(${r}, ${g}, ${b}, 0)`);
        ctx.fillStyle = glowGrad;
        ctx.beginPath();
        ctx.arc(px, py, glowR, 0, Math.PI * 2);
        ctx.fill();
      }

      // 核
      ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${alpha})`;
      ctx.beginPath();
      ctx.arc(px, py, this.size, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  /* ===== 初期化 ===== */
  const particles = [];
  for (let i = 0; i < 10500; i++) particles.push(new Particle());

  const haloPhotons = [];
  for (let i = 0; i < 2500; i++) haloPhotons.push(new HaloPhoton());

  /* ===== 速度カーブ ===== */
  let speed = 0;
  let startTime = performance.now();
  let flashTriggered = false;

  function getSpeed(t) {
    if (t < 0.4) return 0.001;
    if (t < 2.4) {
      const k = (t - 0.4) / 2.0;
      return 0.001 + Math.pow(k, 1.6) * 0.075;
    }
    if (t < 2.8) return 0.076;
    if (t < 3.6) {
      const k = (t - 2.8) / 0.8;
      return 0.076 - k * 0.07;
    }
    if (t < 5.4) return 0.006 + Math.sin(t * 1.5) * 0.001;
    if (t < 6.8) {
      const k = (t - 5.4) / 1.4;
      const accel = Math.sin(k * Math.PI) * 0.045;
      return 0.006 + accel;
    }
    return 0.006 + Math.sin(t * 1.5) * 0.001;
  }

  /* ===== 多層ハロー描画 (マルチセンター方式で円形境界を曖昧化) =====
     - 4つの中心点 (メイン + 3つの時間で揺らぐオフセット) で各層を重ねる
     - 各層のグラデーションストップを6点に増やして滑らかに減衰
     - 結果として完全な同心円ではなく、不規則なガス雲のような光に見える
  */
  function drawHaloAt(x, y, weight, intensity, speedNow) {
    // コア層 (純白、強烈、小さい)
    const coreR = 30 + speedNow * 220;
    const coreGrad = ctx.createRadialGradient(x, y, 0, x, y, coreR);
    coreGrad.addColorStop(0,    `rgba(255, 255, 255, ${0.55 * intensity * weight})`);
    coreGrad.addColorStop(0.20, `rgba(255, 255, 255, ${0.42 * intensity * weight})`);
    coreGrad.addColorStop(0.40, `rgba(255, 255, 255, ${0.25 * intensity * weight})`);
    coreGrad.addColorStop(0.60, `rgba(245, 252, 255, ${0.13 * intensity * weight})`);
    coreGrad.addColorStop(0.80, `rgba(230, 250, 255, ${0.05 * intensity * weight})`);
    coreGrad.addColorStop(0.95, `rgba(230, 250, 255, ${0.015 * intensity * weight})`);
    coreGrad.addColorStop(1,    'rgba(230, 250, 255, 0)');
    ctx.fillStyle = coreGrad;
    ctx.fillRect(0, 0, W, H);

    // インナー層 (淡シアン、ふわっと広がる)
    const innerR = 90 + speedNow * 700;
    const innerGrad = ctx.createRadialGradient(x, y, 0, x, y, innerR);
    innerGrad.addColorStop(0,    `rgba(180, 240, 255, ${0.18 * intensity * weight})`);
    innerGrad.addColorStop(0.18, `rgba(180, 240, 255, ${0.14 * intensity * weight})`);
    innerGrad.addColorStop(0.38, `rgba(160, 235, 255, ${0.10 * intensity * weight})`);
    innerGrad.addColorStop(0.58, `rgba(130, 220, 255, ${0.06 * intensity * weight})`);
    innerGrad.addColorStop(0.78, `rgba(110, 215, 255, ${0.025 * intensity * weight})`);
    innerGrad.addColorStop(0.92, `rgba(102, 229, 255, ${0.008 * intensity * weight})`);
    innerGrad.addColorStop(1,    'rgba(102, 229, 255, 0)');
    ctx.fillStyle = innerGrad;
    ctx.fillRect(0, 0, W, H);

    // ミドル層 (シアン、もっと広がる)
    const midR = 230 + speedNow * 1500;
    const midGrad = ctx.createRadialGradient(x, y, 0, x, y, midR);
    midGrad.addColorStop(0,    `rgba(60, 200, 235, ${0.10 * intensity * weight})`);
    midGrad.addColorStop(0.20, `rgba(60, 200, 235, ${0.075 * intensity * weight})`);
    midGrad.addColorStop(0.45, `rgba(60, 200, 235, ${0.05 * intensity * weight})`);
    midGrad.addColorStop(0.68, `rgba(40, 190, 245, ${0.025 * intensity * weight})`);
    midGrad.addColorStop(0.85, `rgba(30, 180, 255, ${0.01 * intensity * weight})`);
    midGrad.addColorStop(1,    'rgba(30, 180, 255, 0)');
    ctx.fillStyle = midGrad;
    ctx.fillRect(0, 0, W, H);

    // アウター層 (エメラルド、最も広がる)
    const outerR = 480 + speedNow * 2700;
    const outerGrad = ctx.createRadialGradient(x, y, 0, x, y, outerR);
    outerGrad.addColorStop(0,   `rgba(62, 255, 157, ${0.06 * intensity * weight})`);
    outerGrad.addColorStop(0.3, `rgba(62, 255, 157, ${0.04 * intensity * weight})`);
    outerGrad.addColorStop(0.6, `rgba(40, 220, 200, ${0.022 * intensity * weight})`);
    outerGrad.addColorStop(0.85, `rgba(0, 130, 200, ${0.008 * intensity * weight})`);
    outerGrad.addColorStop(1,   'rgba(0, 100, 200, 0)');
    ctx.fillStyle = outerGrad;
    ctx.fillRect(0, 0, W, H);
  }

  function drawHalo(intensity, speedNow, time) {
    // メインの中心
    drawHaloAt(cx, cy, 1.0, intensity, speedNow);

    // 時間でゆっくり浮遊する3つのオフセット中心 (円形の輪郭を崩す)
    const t = time * 0.35;
    const ox1 = Math.sin(t) * 28          + Math.cos(t * 1.7) * 12;
    const oy1 = Math.cos(t * 1.3) * 22    + Math.sin(t * 0.8) * 14;
    drawHaloAt(cx + ox1, cy + oy1, 0.55, intensity, speedNow);

    const ox2 = -Math.cos(t * 0.7) * 32   + Math.sin(t * 1.4) * 10;
    const oy2 = Math.sin(t * 1.1) * 18    - Math.cos(t * 0.6) * 16;
    drawHaloAt(cx + ox2, cy + oy2, 0.5, intensity, speedNow);

    const ox3 = Math.sin(t * 1.5) * 20    + Math.cos(t * 0.9) * 14;
    const oy3 = -Math.cos(t * 0.9) * 26   + Math.sin(t * 1.2) * 11;
    drawHaloAt(cx + ox3, cy + oy3, 0.45, intensity, speedNow);
  }

  /* ===== メインループ ===== */
  function animate() {
    const elapsed = (performance.now() - startTime) / 1000;
    speed = getSpeed(elapsed);

    // 残像
    const fadeAlpha = elapsed < 2.8 ? 0.22 : 0.32;
    ctx.fillStyle = `rgba(0, 3, 12, ${fadeAlpha})`;
    ctx.fillRect(0, 0, W, H);

    // 加算合成
    ctx.globalCompositeOperation = 'lighter';

    // 多層ハロー
    const haloIntensity = Math.min(1, elapsed * 0.55);
    drawHalo(haloIntensity, speed, elapsed);

    // 光子の雲
    for (const photon of haloPhotons) {
      photon.draw(elapsed, haloIntensity);
    }

    // ワープ粒子
    for (const p of particles) {
      p.update(speed);
      p.draw(elapsed);
    }

    ctx.globalCompositeOperation = 'source-over';

    // 最高速時のフラッシュ
    if (!flashTriggered && elapsed >= 2.55) {
      flashTriggered = true;
      document.getElementById('core').classList.add('flash');
      const flashDiv = document.createElement('div');
      flashDiv.style.cssText = `
        position: fixed; inset: 0; z-index: 90;
        background: radial-gradient(circle at center,
          rgba(255,255,255,1) 0%,
          rgba(180,240,255,0.85) 25%,
          rgba(0,200,255,0.5) 55%,
          rgba(0,255,153,0.25) 75%,
          transparent 100%);
        pointer-events: none;
        animation: full-flash 0.7s ease-out forwards;
      `;
      const styleEl = document.createElement('style');
      styleEl.textContent = `
        @keyframes full-flash {
          0%   { opacity: 0; }
          15%  { opacity: 1; }
          100% { opacity: 0; }
        }
      `;
      document.head.appendChild(styleEl);
      document.body.appendChild(flashDiv);
      setTimeout(() => flashDiv.remove(), 800);
    }

    requestAnimationFrame(animate);
  }
  animate();

  /* ===== 遷移処理 (main.htmlへ自動起動) ===== */
  const NEXT_URL = 'main.html';

  let transitioning = false;
  function proceed() {
    if (transitioning) return;
    transitioning = true;
    // セッションフラグを保存 (このタブでは再表示しない)
    try { sessionStorage.setItem('grid_entered', '1'); } catch(e) {}
    document.body.classList.add('fade-out');
    setTimeout(() => {
      // replaceで履歴を残さない (戻るボタンでスプラッシュに戻れないように)
      window.location.replace(NEXT_URL);
    }, 900);
  }

  document.getElementById('skipBtn').addEventListener('click', proceed);
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ' || e.key === 'Escape') proceed();
  });

  /* ===== ステータス切り替え ===== */
  setTimeout(() => {
    const statusEl = document.querySelector('.hud.tr .val');
    if (statusEl) {
      statusEl.textContent = '● ONLINE';
      statusEl.classList.remove('blink');
      statusEl.style.color = '#3eff9d';
      statusEl.style.textShadow = '0 0 12px rgba(62, 255, 157, 0.85)';
    }
  }, 6900);

  /* ===== 自動起動 ===== */
  setTimeout(() => {
    proceed();
  }, 7400);
</script>
</body>
</html>
