<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>現地調査マップ | SOLAR LAND MGR</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2333;
    --border: #30363d;
    --accent: #f0b429;
    --green: #3fb950;
    --blue: #58a6ff;
    --red: #f85149;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --font-main: 'Zen Kaku Gothic New', sans-serif;
    --font-mono: 'Share Tech Mono', monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: var(--font-main); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 20px; height: 52px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; z-index: 1000; }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .logo { display: flex; align-items: center; gap: 8px; text-decoration: none; color: var(--text); }
  .logo-icon { width: 28px; height: 28px; background: linear-gradient(135deg, #f0b429, #e85d04); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 14px; }
  .logo-text { font-size: 14px; font-weight: 700; }
  .page-title { font-size: 13px; color: var(--text-muted); display: flex; align-items: center; gap: 6px; }
  .page-title::before { content: '/'; color: var(--border); }
  .legend { display: flex; align-items: center; gap: 14px; font-size: 12px; color: var(--text-muted); }
  .legend-item { display: flex; align-items: center; gap: 5px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
  .btn { padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border); font-family: var(--font-main); font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.15s; }
  .btn-ghost { background: none; color: var(--text-muted); }
  .btn-ghost:hover { background: var(--surface2); color: var(--text); }

  .map-wrapper { flex: 1; position: relative; overflow: hidden; }
  #map { width: 100%; height: 100%; }

  .leaflet-top.leaflet-left { display: none; }

  .control-panel {
    position: absolute;
    top: 12px;
    left: 12px;
    z-index: 500;
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 110px;
    transition: left 0.3s ease;
  }
  .control-panel.shifted { left: 272px; }

  .action-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px; display: flex; flex-direction: column; gap: 8px; min-width: 200px; }
  .action-panel-title { font-size: 11px; font-weight: 700; color: var(--text-muted); letter-spacing: .08em; text-transform: uppercase; }
  .btn-start { background: var(--accent); color: #000; border: none; border-radius: 6px; padding: 8px 14px; font-family: var(--font-main); font-size: 12px; font-weight: 700; cursor: pointer; transition: background 0.15s; }
  .btn-start:hover { background: #e0a820; }
  .btn-start:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-reset { background: none; color: var(--red); border: 1px solid var(--red); border-radius: 6px; padding: 7px 14px; font-family: var(--font-main); font-size: 11px; font-weight: 500; cursor: pointer; transition: all 0.15s; }
  .btn-reset:hover { background: rgba(248,81,73,0.1); }

  .zoom-controls { position: absolute; bottom: 24px; right: 12px; z-index: 500; display: flex; flex-direction: column; gap: 2px; }
  .zoom-btn { width: 32px; height: 32px; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 18px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.15s; }
  .zoom-btn:hover { background: var(--surface2); }
  .zoom-level { width: 32px; height: 28px; background: var(--surface); border: 1px solid var(--border); border-radius: 4px; color: var(--accent); font-family: var(--font-mono); font-size: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center; }

  .stats-overlay {
    position: absolute;
    top: 12px;
    left: 12px;
    z-index: 500;
    display: flex;
    flex-direction: column;
    gap: 6px;
    transition: left 0.3s ease;
  }
  .stats-overlay.shifted { left: 272px; }

  .stat-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 6px 14px; font-size: 12px; display: flex; align-items: center; gap: 6px; }
  .stat-pill-dot { width: 8px; height: 8px; border-radius: 50%; }

  .layer-control { position: absolute; top: 12px; right: 12px; z-index: 500; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; display: flex; flex-direction: column; gap: 8px; min-width: 160px; }
  .layer-title { font-size: 10px; font-weight: 700; color: var(--text-muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 2px; }
  .layer-item { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text); cursor: pointer; }
  .layer-item input[type=checkbox] { accent-color: var(--accent); }

  .survey-list-panel {
    position: absolute;
    top: 0; left: 0;
    width: 260px;
    height: 100%;
    background: var(--surface);
    border-right: 1px solid var(--border);
    z-index: 600;
    transform: translateX(-100%);
    transition: transform 0.3s ease;
    display: flex;
    flex-direction: column;
  }
  .survey-list-panel.open { transform: translateX(0); }
  .survey-list-header {
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface2);
    flex-shrink: 0;
  }
  .survey-list-title { font-size: 12px; font-weight: 700; color: var(--text); }
  .survey-list-count { font-size: 11px; color: var(--accent); font-family: var(--font-mono); }
  .survey-table-wrap { flex: 1; overflow-y: auto; padding: 8px; }
  .survey-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .survey-table thead tr { background: var(--surface2); position: sticky; top: 0; z-index: 1; }
  .survey-table th { padding: 7px 8px; text-align: left; font-size: 10px; font-weight: 700; color: var(--text-muted); letter-spacing: 0.06em; text-transform: uppercase; border-bottom: 1px solid var(--border); white-space: nowrap; }
  .survey-table th:first-child { width: 36px; text-align: center; }
  .survey-table td { padding: 7px 8px; border-bottom: 1px solid rgba(48,54,61,0.5); vertical-align: middle; color: var(--text); }
  .survey-table td:first-child { text-align: center; font-family: var(--font-mono); font-size: 11px; color: var(--accent); font-weight: 700; }
  .survey-table tr:hover td { background: var(--surface2); }
  .survey-table tr.confirmed td { opacity: 0.5; }

  .leaflet-popup-content-wrapper { background: var(--surface) !important; border: 1px solid var(--border) !important; border-radius: 10px !important; color: var(--text) !important; box-shadow: 0 8px 32px rgba(0,0,0,0.5) !important; padding: 0 !important; min-width: 280px; }
  .leaflet-popup-tip { background: var(--surface) !important; }
  .leaflet-popup-content { margin: 0 !important; }
  .popup-body { padding: 16px; font-family: var(--font-main); }
  .popup-case-no { font-family: var(--font-mono); font-size: 13px; color: var(--accent); font-weight: 700; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }
  .popup-status { font-size: 11px; padding: 2px 8px; border-radius: 10px; }
  .popup-status.unchecked { background: rgba(240,180,41,0.15); color: var(--accent); }
  .popup-status.checked { background: rgba(248,81,73,0.15); color: var(--red); }
  .popup-status.planned { background: rgba(63,185,80,0.15); color: var(--green); }
  .popup-info { display: flex; flex-direction: column; gap: 7px; margin-bottom: 12px; }
  .popup-row { display: flex; gap: 8px; font-size: 12px; line-height: 1.5; }
  .popup-label { color: var(--text-muted); min-width: 72px; flex-shrink: 0; }
  .popup-value { color: var(--text); }
  .popup-landowner-link { color: var(--blue); cursor: pointer; text-decoration: underline; }
  .popup-landowner-link:hover { color: var(--accent); }
  .popup-divider { border: none; border-top: 1px solid var(--border); margin: 10px 0; }
  .popup-comment { background: var(--bg); border-radius: 6px; padding: 8px 10px; font-size: 12px; color: var(--text-muted); margin-bottom: 10px; line-height: 1.5; font-style: italic; }
  .popup-actions { display: flex; gap: 6px; flex-wrap: wrap; }
  .popup-btn { flex: 1; padding: 7px 10px; border-radius: 6px; border: 1px solid var(--border); background: none; color: var(--text); font-family: var(--font-main); font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.15s; text-align: center; min-width: 80px; }
  .popup-btn:hover { background: var(--surface2); }
  .popup-btn.confirm { background: var(--red); border-color: var(--red); color: #fff; }
  .popup-btn.confirm:hover { background: #d9342b; }
  .popup-btn.confirmed-label { background: rgba(248,81,73,0.1); border-color: var(--red); color: var(--red); cursor: default; }
  .popup-btn.plan-btn { border-color: var(--green); color: var(--green); }
  .popup-btn.plan-btn:hover { background: rgba(63,185,80,0.1); }
  .popup-btn.planned-btn { background: rgba(63,185,80,0.15); border-color: var(--green); color: var(--green); }

  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 20px; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; width: 100%; max-width: 480px; transform: scale(0.95); transition: transform 0.2s; }
  .modal-overlay.open .modal { transform: scale(1); }
  .modal-header { padding: 18px 20px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .modal-title { font-size: 15px; font-weight: 700; }
  .modal-subtitle { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .modal-close { background: none; border: none; color: var(--text-muted); font-size: 18px; cursor: pointer; padding: 4px; border-radius: 4px; }
  .modal-close:hover { background: var(--surface2); color: var(--text); }
  .modal-body { padding: 18px 20px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
  .form-label { font-size: 11px; font-weight: 700; color: var(--text-muted); letter-spacing: 0.06em; text-transform: uppercase; }
  .form-textarea { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; color: var(--text); font-family: var(--font-main); font-size: 13px; resize: vertical; min-height: 100px; transition: border-color 0.2s; }
  .form-textarea:focus { outline: none; border-color: var(--accent); }
  .modal-footer { padding: 14px 20px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; }
  .btn-primary { background: var(--red); color: #fff; border-color: var(--red); }
  .btn-primary:hover { background: #d9342b; }

  .side-panel { position: absolute; top: 0; right: 0; width: 320px; height: 100%; background: var(--surface); border-left: 1px solid var(--border); z-index: 600; transform: translateX(100%); transition: transform 0.3s ease; overflow-y: auto; display: flex; flex-direction: column; }
  .side-panel.open { transform: translateX(0); }
  .side-panel-header { padding: 16px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: var(--surface); z-index: 1; }
  .side-panel-title { font-size: 14px; font-weight: 700; }
  .side-panel-body { padding: 16px 18px; flex: 1; }
  .info-item { margin-bottom: 14px; }
  .info-label { font-size: 10px; font-weight: 700; color: var(--text-muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 3px; }
  .info-value { font-size: 13px; color: var(--text); line-height: 1.5; }

  .toast-container { position: fixed; bottom: 20px; right: 60px; z-index: 3000; display: flex; flex-direction: column; gap: 8px; }
  .toast { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 11px 16px; font-size: 13px; min-width: 220px; animation: slideIn 0.3s ease; display: flex; align-items: center; gap: 8px; }
  .toast.success { border-left: 3px solid var(--green); }
  .toast.error { border-left: 3px solid var(--red); }
  @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
</style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <a class="logo" href="index.html">
      <div class="logo-icon">☀️</div>
      <span class="logo-text">SOLAR LAND MGR</span>
    </a>
    <span class="page-title">🗺 現地調査マップ</span>
  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#f0b429"></div><span>未確認</span></div>
    <div class="legend-item"><div class="legend-dot" style="background:#3fb950"></div><span>調査予定</span></div>
    <div class="legend-item"><div class="legend-dot" style="background:#f85149"></div><span>確認済</span></div>
    <button class="btn btn-ghost" onclick="location.href='index.html'">← 案件一覧</button>
  </div>
</header>

<div class="map-wrapper">
  <div id="map"></div>

  <!-- 調査リストパネル（左側） -->
  <div class="survey-list-panel" id="surveyListPanel">
    <div class="survey-list-header">
      <span class="survey-list-title">📋 調査予定リスト</span>
      <span class="survey-list-count" id="surveyListCount">0件</span>
    </div>
    <div class="survey-table-wrap">
      <table class="survey-table">
        <thead>
          <tr><th>No</th><th>案件番号</th></tr>
        </thead>
        <tbody id="surveyTableBody">
          <tr><td colspan="2" style="color:var(--text-muted);text-align:center;padding:16px">フラグをクリックして<br>調査予定を追加</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- 統計 -->
  <div class="stats-overlay" id="statsOverlay">
    <div class="stat-pill"><div class="stat-pill-dot" style="background:var(--accent)"></div><span id="statUnchecked">—</span> 件 未確認</div>
    <div class="stat-pill"><div class="stat-pill-dot" style="background:var(--green)"></div><span id="statPlanned">0</span> 件 調査予定</div>
    <div class="stat-pill"><div class="stat-pill-dot" style="background:var(--red)"></div><span id="statChecked">—</span> 件 確認済</div>
  </div>

  <!-- 調査計画パネル -->
  <div class="control-panel" id="controlPanel">
    <div class="action-panel" id="planPanel">
      <div class="action-panel-title">現地調査計画モード</div>
      <div style="font-size:11px;color:var(--text-muted);line-height:1.6">フラグをクリックして<br>調査予定を選択してください</div>
      <button class="btn btn-start" onclick="startSurveyMode()" id="startBtn" disabled>🗺 調査開始</button>
    </div>
    <div class="action-panel" id="surveyPanel" style="display:none">
      <div class="action-panel-title">調査実行モード</div>
      <div style="font-size:11px;color:var(--text-muted);line-height:1.6">フラグをクリックして<br>現地確認を記録してください</div>
      <button class="btn btn-reset" onclick="resetSurvey()">🔄 計画をリセット</button>
    </div>
  </div>

  <!-- レイヤーコントロール -->
  <div class="layer-control">
    <div class="layer-title">地図レイヤー</div>
    <label class="layer-item"><input type="checkbox" id="layerGsi" onchange="toggleLayer('gsi',this.checked)"> GSI 航空写真</label>
    <label class="layer-item"><input type="checkbox" id="layerHazard" onchange="toggleLayer('hazard',this.checked)"> ハザードマップ</label>
    <label class="layer-item"><input type="checkbox" id="layerFarmland" onchange="toggleLayer('farmland',this.checked)"> 農地フラグ</label>
  </div>

  <!-- ズームボタン（右下） -->
  <div class="zoom-controls">
    <button class="zoom-btn" onclick="map.zoomIn()">＋</button>
    <div class="zoom-level" id="zoomLevel">6</div>
    <button class="zoom-btn" onclick="map.zoomOut()">－</button>
  </div>

  <!-- 地権者サイドパネル -->
  <div class="side-panel" id="sidePanel">
    <div class="side-panel-header">
      <span class="side-panel-title">🧑 地権者情報</span>
      <button class="modal-close" onclick="closeSidePanel()">✕</button>
    </div>
    <div class="side-panel-body" id="sidePanelBody"></div>
  </div>

</div><!-- /.map-wrapper -->

<!-- 確認終了モーダル -->
<div class="modal-overlay" id="confirmModal">
  <div class="modal" style="max-width:560px">
    <div class="modal-header">
      <div>
        <div class="modal-title">✅ 現地確認終了</div>
        <div class="modal-subtitle" id="confirmCaseNo"></div>
      </div>
      <button class="modal-close" onclick="closeModal('confirmModal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">現地確認コメント</label>
        <textarea class="form-textarea" id="confirmComment" placeholder="確認した内容・状況・所感などを記入してください..."></textarea>
      </div>
      <div style="margin-top:16px">
        <div style="font-size:11px;font-weight:700;color:var(--text-muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px">📸 現地写真（任意）</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
          <div>
            <div style="font-size:11px;color:var(--text-muted);margin-bottom:6px">接道状況 ①</div>
            <label style="display:block;border:1px dashed var(--border);border-radius:8px;aspect-ratio:4/3;cursor:pointer;overflow:hidden;position:relative;background:var(--bg)">
              <input type="file" accept="image/*" capture="environment" id="photo_road1" style="display:none" onchange="previewPhoto(this,'prev_road1')">
              <img id="prev_road1" src="" style="width:100%;height:100%;object-fit:cover;display:none">
              <div id="placeholder_road1" style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text-muted);font-size:12px;gap:6px"><span style="font-size:24px">📷</span><span>タップして撮影</span></div>
            </label>
          </div>
          <div>
            <div style="font-size:11px;color:var(--text-muted);margin-bottom:6px">接道状況 ②</div>
            <label style="display:block;border:1px dashed var(--border);border-radius:8px;aspect-ratio:4/3;cursor:pointer;overflow:hidden;position:relative;background:var(--bg)">
              <input type="file" accept="image/*" capture="environment" id="photo_road2" style="display:none" onchange="previewPhoto(this,'prev_road2')">
              <img id="prev_road2" src="" style="width:100%;height:100%;object-fit:cover;display:none">
              <div id="placeholder_road2" style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text-muted);font-size:12px;gap:6px"><span style="font-size:24px">📷</span><span>タップして撮影</span></div>
            </label>
          </div>
          <div>
            <div style="font-size:11px;color:var(--text-muted);margin-bottom:6px">土地状態 ①</div>
            <label style="display:block;border:1px dashed var(--border);border-radius:8px;aspect-ratio:4/3;cursor:pointer;overflow:hidden;position:relative;background:var(--bg)">
              <input type="file" accept="image/*" capture="environment" id="photo_land1" style="display:none" onchange="previewPhoto(this,'prev_land1')">
              <img id="prev_land1" src="" style="width:100%;height:100%;object-fit:cover;display:none">
              <div id="placeholder_land1" style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text-muted);font-size:12px;gap:6px"><span style="font-size:24px">📷</span><span>タップして撮影</span></div>
            </label>
          </div>
          <div>
            <div style="font-size:11px;color:var(--text-muted);margin-bottom:6px">土地状態 ②</div>
            <label style="display:block;border:1px dashed var(--border);border-radius:8px;aspect-ratio:4/3;cursor:pointer;overflow:hidden;position:relative;background:var(--bg)">
              <input type="file" accept="image/*" capture="environment" id="photo_land2" style="display:none" onchange="previewPhoto(this,'prev_land2')">
              <img id="prev_land2" src="" style="width:100%;height:100%;object-fit:cover;display:none">
              <div id="placeholder_land2" style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text-muted);font-size:12px;gap:6px"><span style="font-size:24px">📷</span><span>タップして撮影</span></div>
            </label>
          </div>
        </div>
      </div>
      <div id="uploadProgress" style="display:none;margin-top:12px">
        <div style="font-size:12px;color:var(--text-muted);margin-bottom:6px" id="uploadStatus">アップロード中...</div>
        <div style="background:var(--bg);border-radius:4px;height:6px;overflow:hidden">
          <div id="uploadBar" style="height:100%;background:var(--green);width:0%;transition:width 0.3s"></div>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('confirmModal')">キャンセル</button>
      <button class="btn btn-primary" id="confirmSaveBtn" onclick="saveConfirm()">確認終了・フラグを赤に変更</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
const SUPABASE_URL = 'https://fygnrjjifoasozbhkxlk.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ5Z25yamppZm9hc296YmhreGxrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2MDYzNTEsImV4cCI6MjA5MDE4MjM1MX0.A1fAMcu7wGBBP4xHUKkrExIuy7MFbmarAtLQahwZiso';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

let map, gsiLayer, hazardLayer;
let markers = {};
let planSet = new Set();
let surveyMode = false;
let currentConfirmCaseId = null;

function initMap() {
  map = L.map('map', { zoomControl: false }).setView([36.2048, 138.2529], 6);
  L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/std/{z}/{x}/{y}.png', { attribution: '© 国土地理院', maxZoom: 18 }).addTo(map);
  gsiLayer = L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/seamlessphoto/{z}/{x}/{y}.jpg', { attribution: '© 国土地理院', maxZoom: 18, opacity: 0.85, zIndex: 1 });
  hazardLayer = L.tileLayer('https://disaportaldata.gsi.go.jp/raster/01_flood_l2_shinsuishin_data/{z}/{x}/{y}.png', { attribution: '© ハザードマップポータルサイト', maxZoom: 17, minZoom: 2, opacity: 0.7, errorTileUrl: '', zIndex: 2 });
  map.on('zoomend', () => {
    document.getElementById('zoomLevel').textContent = map.getZoom();
  });
}

function toggleLayer(type, enabled) {
  if (type === 'gsi') {
    enabled ? gsiLayer.addTo(map) : map.removeLayer(gsiLayer);
    if (enabled && map.hasLayer(hazardLayer)) hazardLayer.bringToFront();
  }
  else if (type === 'hazard') {
    enabled ? hazardLayer.addTo(map) : map.removeLayer(hazardLayer);
    if (enabled) hazardLayer.bringToFront();
  }
  else if (type === 'farmland') {
    if (enabled) {
      if (!farmlandLayer) loadFarmland();
      else farmlandLayer.addTo(map);
    } else {
      if (farmlandLayer) map.removeLayer(farmlandLayer);
    }
  }
}

let farmlandLayer = null;

function getFarmlandColor(code) {
  switch(String(code)) {
    case '1': return '#3b82f6'; // 青地　→ 青
    case '2': return '#ffffff'; // 白地　→ 白
    case '3': return '#f472b6'; // 農振外 → ピンク
    default:  return '#a855f7'; // 調査中 → 紫
  }
}

function makeFlagIcon(color) {
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="28" viewBox="0 0 20 28">
    <line x1="3" y1="0" x2="3" y2="28" stroke="${color}" stroke-width="2"/>
    <polygon points="3,2 18,7 3,14" fill="${color}" stroke="none"/>
  </svg>`;
  return L.divIcon({
    html: svg,
    className: '',
    iconSize: [20, 28],
    iconAnchor: [3, 28],
    popupAnchor: [8, -28]
  });
}

async function loadFarmland() {
  try {
    const res = await fetch(encodeURI('農地ピン_20260409005315.geojson'));
    const data = await res.json();
    farmlandLayer = L.geoJSON(data, {
      pointToLayer: (feature, latlng) => {
        const code = feature.properties.SectionOfNoushinhou;
        return L.marker(latlng, { icon: makeFlagIcon(getFarmlandColor(code)) });
      },
      onEachFeature: (feature, layer) => {
        const p = feature.properties;
        const lat = feature.geometry.coordinates[1];
        const lng = feature.geometry.coordinates[0];
        layer.bindPopup(`
          <div class="popup-body">
            <div class="popup-case-no">
              <span>${p.Address || '—'} ${p.Tiban || ''}</span>
            </div>
            <div class="popup-info">
              <div class="popup-row"><span class="popup-label">農振区分</span><span class="popup-value">${p.SectionOfNoushinhouCodeName || '—'}</span></div>
              <div class="popup-row"><span class="popup-label">地目</span><span class="popup-value">${p.ClassificationOfLandCodeName || '—'}</span></div>
              <div class="popup-row"><span class="popup-label">面積</span><span class="popup-value">${p.AreaOnRegistry ? Number(p.AreaOnRegistry).toLocaleString() + ' ㎡' : '—'}</span></div>
              <div class="popup-row"><span class="popup-label">都市計画</span><span class="popup-value">${p.SectionOfToshikeikakuhouCodeName || '—'}</span></div>
            </div>
            <hr class="popup-divider">
            <div style="display:flex;gap:6px">
              <button class="popup-btn" style="border-color:var(--green);color:var(--green)" onclick="window.open('https://map.maff.go.jp/?zoom=16&lat=${lat}&lng=${lng}','_blank')">🌾 農地ナビで確認</button>
            </div>
          </div>
        `, { maxWidth: 300, minWidth: 260 });
      }
    });
    farmlandLayer.addTo(map);
  } catch(e) {
    showToast('農地データの読み込みに失敗しました', 'error');
  }
}

async function loadData() {
  const { data: cases } = await db.from('cases').select('id, case_no, kubun, status, area_name');
  const { data: lands } = await db.from('land_info').select('*');
  const { data: surveys } = await db.from('field_survey_status').select('*');
  const { data: landowners } = await db.from('landowner_info').select('id, case_id, name');
  if (!cases) return;

  let unchecked = 0, checked = 0;
  cases.forEach(c => {
    const land = lands?.find(l => l.case_id === c.id);
    const survey = surveys?.find(s => s.case_id === c.id);
    const landowner = landowners?.find(lo => lo.case_id === c.id);
    if (!land?.lat || !land?.lng) return;

    const confirmed = survey?.confirmed || false;
    const color = confirmed ? '#f85149' : '#f0b429';
    if (confirmed) checked++; else unchecked++;

    const marker = L.marker([land.lat, land.lng], { icon: makeIcon(color) });
    marker.bindPopup(buildPopup(c, land, survey, landowner), { maxWidth: 300, minWidth: 280 });
    marker.addTo(map);
    markers[c.id] = { marker, survey, land, landowner, case: c, confirmed };
  });

  document.getElementById('statUnchecked').textContent = unchecked;
  document.getElementById('statChecked').textContent = checked;
}

function makeIcon(color) {
  return L.divIcon({
    html: `<div style="width:24px;height:24px;background:${color};border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:2px solid rgba(0,0,0,0.3);box-shadow:0 2px 6px rgba(0,0,0,0.4)"></div>`,
    className: '', iconSize: [24,24], iconAnchor: [12,24], popupAnchor: [0,-26]
  });
}

function buildPopup(c, land, survey, landowner) {
  const confirmed = survey?.confirmed || false;
  const planned = planSet.has(c.id);
  const comment = survey?.comment || '';
  const photos = [survey?.photo_road1, survey?.photo_road2, survey?.photo_land1, survey?.photo_land2].filter(Boolean);

  let statusHtml = confirmed
    ? '<span class="popup-status checked">確認済</span>'
    : planned
      ? '<span class="popup-status planned">調査予定</span>'
      : '<span class="popup-status unchecked">未確認</span>';

  let planBtnHtml = '';
  if (!confirmed && !surveyMode) {
    planBtnHtml = planned
      ? `<button class="popup-btn planned-btn" onclick="removePlan('${c.id}')">✓ 予定済（解除）</button>`
      : `<button class="popup-btn plan-btn" onclick="addPlan('${c.id}')">＋ 調査予定に追加</button>`;
  }

  return `
    <div class="popup-body">
      <div class="popup-case-no">
        <span>${c.case_no}</span>
        ${statusHtml}
      </div>
      <div class="popup-info">
        <div class="popup-row"><span class="popup-label">所在</span><span class="popup-value">${land?.location || '—'}</span></div>
        <div class="popup-row"><span class="popup-label">面積</span><span class="popup-value">${land?.area_sqm ? Number(land.area_sqm).toLocaleString() + ' ㎡' : '—'}</span></div>
        <div class="popup-row"><span class="popup-label">地目</span><span class="popup-value">${land?.chiban || '—'}</span></div>
        <div class="popup-row"><span class="popup-label">ハザード</span><span class="popup-value">${land?.hazard || '—'}</span></div>
        <div class="popup-row"><span class="popup-label">地権者</span><span class="popup-value">${landowner?.name ? `<span class="popup-landowner-link" onclick="showLandownerPanel('${c.id}')">${landowner.name}</span>` : '—'}</span></div>
      </div>
      ${comment ? `<hr class="popup-divider"><div class="popup-comment">💬 ${comment}</div>` : ''}
      ${photos.length ? `<hr class="popup-divider"><div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-bottom:8px">${photos.map(url => `<a href="${url}" target="_blank"><img src="${url}" style="width:100%;aspect-ratio:4/3;object-fit:cover;border-radius:4px;border:1px solid var(--border)"></a>`).join('')}</div>` : ''}
      <hr class="popup-divider">
      <div class="popup-actions" style="flex-direction:column;gap:6px">
        <div style="display:flex;gap:6px">
          ${land?.google_map ? `<button class="popup-btn" onclick="window.open('${land.google_map}','_blank')">🗺 地図</button>` : ''}
          ${land?.lat && land?.lng ? `<button class="popup-btn" onclick="window.open('https://map.maff.go.jp/?zoom=16&lat=${land.lat}&lng=${land.lng}','_blank')" style="border-color:var(--green);color:var(--green)">🌾 農地ナビ</button>` : ''}
          ${confirmed
            ? `<button class="popup-btn confirmed-label">✓ 確認済み</button>`
            : `<button class="popup-btn confirm" onclick="openConfirmModal('${c.id}','${c.case_no}')">確認終了</button>`}
        </div>
        ${planBtnHtml ? `<div>${planBtnHtml}</div>` : ''}
      </div>
    </div>
  `;
}

function addPlan(caseId) {
  if (planSet.size >= 30) { showToast('調査予定は最大30件までです', 'error'); return; }
  planSet.add(caseId);
  const d = markers[caseId];
  if (d && !d.confirmed) d.marker.setIcon(makeIcon('#3fb950'));
  if (d) d.marker.setPopupContent(buildPopup(d.case, d.land, d.survey, d.landowner));
  updateSurveyUI();
  map.closePopup();
  showToast('調査予定に追加しました', 'success');
}

function startSurveyMode() {
  surveyMode = true;
  Object.keys(markers).forEach(caseId => {
    const d = markers[caseId];
    if (!planSet.has(caseId) && !d.confirmed) map.removeLayer(d.marker);
    if (d) d.marker.setPopupContent(buildPopup(d.case, d.land, d.survey, d.landowner));
  });
  document.getElementById('planPanel').style.display = 'none';
  document.getElementById('surveyPanel').style.display = 'flex';
  showToast('調査実行モードに切り替えました', 'success');
}

function resetSurvey() {
  if (!confirm('調査計画をリセットして計画モードに戻りますか？')) return;
  surveyMode = false;
  planSet.clear();
  Object.keys(markers).forEach(caseId => {
    const d = markers[caseId];
    const color = d.confirmed ? '#f85149' : '#f0b429';
    d.marker.setIcon(makeIcon(color));
    if (!map.hasLayer(d.marker)) d.marker.addTo(map);
    if (d) d.marker.setPopupContent(buildPopup(d.case, d.land, d.survey, d.landowner));
  });
  document.getElementById('planPanel').style.display = 'flex';
  document.getElementById('surveyPanel').style.display = 'none';
  updateSurveyUI();
}

function removePlan(caseId) {
  planSet.delete(caseId);
  const d = markers[caseId];
  if (d && !d.confirmed) d.marker.setIcon(makeIcon('#f0b429'));
  if (d) d.marker.setPopupContent(buildPopup(d.case, d.land, d.survey, d.landowner));
  updateSurveyUI();
  map.closePopup();
  showToast('調査予定から解除しました', 'success');
}

function updateSurveyUI() {
  document.getElementById('statPlanned').textContent = planSet.size;
  const startBtn = document.getElementById('startBtn');
  if (startBtn) startBtn.disabled = planSet.size === 0;
  renderSurveyTable();
}

function renderSurveyTable() {
  const tbody = document.getElementById('surveyTableBody');
  const countEl = document.getElementById('surveyListCount');
  const panel = document.getElementById('surveyListPanel');
  const stats = document.getElementById('statsOverlay');

  if (planSet.size === 0) {
    panel.classList.remove('open');
    stats.classList.remove('shifted');
    tbody.innerHTML = '<tr><td colspan="2" style="color:var(--text-muted);text-align:center;padding:16px">フラグをクリックして<br>調査予定を追加</td></tr>';
    countEl.textContent = '0件';
    return;
  }

  panel.classList.add('open');
  stats.classList.add('shifted');
  document.getElementById('controlPanel')?.classList.add('shifted');
  countEl.textContent = `${planSet.size}件`;

  const rows = [...planSet].map((caseId, idx) => {
    const d = markers[caseId];
    const caseNo = d?.case?.case_no || '—';
    const conf = d?.confirmed ? 'confirmed' : '';
    return `<tr class="${conf}"><td>${idx + 1}</td><td style="font-family:var(--font-mono);font-size:11px;white-space:nowrap">${caseNo}</td></tr>`;
  });

  const empty = Array(Math.max(0, 30 - planSet.size)).fill(
    '<tr><td style="color:var(--border)">—</td><td></td></tr>'
  );

  tbody.innerHTML = rows.join('') + empty.join('');
}

function openConfirmModal(caseId, caseNo) {
  currentConfirmCaseId = caseId;
  document.getElementById('confirmCaseNo').textContent = caseNo;
  document.getElementById('confirmComment').value = '';
  ['road1','road2','land1','land2'].forEach(key => {
    const input = document.getElementById(`photo_${key}`);
    const img = document.getElementById(`prev_${key}`);
    const ph = document.getElementById(`placeholder_${key}`);
    if (input) input.value = '';
    if (img) { img.src = ''; img.style.display = 'none'; }
    if (ph) ph.style.display = 'flex';
  });
  document.getElementById('uploadProgress').style.display = 'none';
  document.getElementById('confirmModal').classList.add('open');
  map.closePopup();
}

function previewPhoto(input, previewId) {
  const file = input.files[0];
  if (!file) return;
  const img = document.getElementById(previewId);
  const ph = document.getElementById(previewId.replace('prev_', 'placeholder_'));
  const reader = new FileReader();
  reader.onload = e => { img.src = e.target.result; img.style.display = 'block'; if (ph) ph.style.display = 'none'; };
  reader.readAsDataURL(file);
}

async function uploadPhoto(file, caseId, label) {
  if (!file) return null;
  const ext = file.name.split('.').pop() || 'jpg';
  const path = `${caseId}/${label}_${Date.now()}.${ext}`;
  const { error } = await db.storage.from('survey-photos').upload(path, file, { upsert: true });
  if (error) { console.error('upload error', error); return null; }
  const { data } = db.storage.from('survey-photos').getPublicUrl(path);
  return data.publicUrl;
}

async function saveConfirm() {
  const comment = document.getElementById('confirmComment').value.trim();
  const caseId = currentConfirmCaseId;
  const btn = document.getElementById('confirmSaveBtn');
  btn.disabled = true; btn.textContent = '保存中...';

  const progress = document.getElementById('uploadProgress');
  const bar = document.getElementById('uploadBar');
  const status = document.getElementById('uploadStatus');
  progress.style.display = 'block';

  const photoKeys = ['road1','road2','land1','land2'];
  const photoUrls = {};
  let done = 0;
  for (const key of photoKeys) {
    const input = document.getElementById(`photo_${key}`);
    const file = input?.files[0];
    status.textContent = `写真をアップロード中... (${done+1}/4)`;
    bar.style.width = `${(done / 4) * 100}%`;
    if (file) photoUrls[key] = await uploadPhoto(file, caseId, key);
    done++;
  }
  bar.style.width = '100%'; status.textContent = 'データを保存中...';

  const { data: existing } = await db.from('field_survey_status').select('id').eq('case_id', caseId).single();
  const payload = { confirmed: true, confirmed_at: new Date().toISOString(), flag_color: 'red', comment, photo_road1: photoUrls['road1']||null, photo_road2: photoUrls['road2']||null, photo_land1: photoUrls['land1']||null, photo_land2: photoUrls['land2']||null };
  let error;
  if (existing) { ({ error } = await db.from('field_survey_status').update(payload).eq('case_id', caseId)); }
  else { ({ error } = await db.from('field_survey_status').insert({ case_id: caseId, ...payload })); }

  btn.disabled = false; btn.textContent = '確認終了・フラグを赤に変更';
  progress.style.display = 'none';
  if (error) { showToast('保存エラー: ' + error.message, 'error'); return; }

  const d = markers[caseId];
  if (d) {
    d.confirmed = true;
    d.survey = { confirmed: true, comment, ...photoUrls };
    d.marker.setIcon(makeIcon('#f85149'));
    d.marker.setPopupContent(buildPopup(d.case, d.land, d.survey, d.landowner));
  }

  if (planSet.has(caseId)) { planSet.delete(caseId); updateSurveyUI(); }

  const u = parseInt(document.getElementById('statUnchecked').textContent) - 1;
  const c2 = parseInt(document.getElementById('statChecked').textContent) + 1;
  document.getElementById('statUnchecked').textContent = Math.max(0, u);
  document.getElementById('statChecked').textContent = c2;

  showToast('現地確認・写真を保存しました', 'success');
  closeModal('confirmModal');
}

async function showLandownerPanel(caseId) {
  const d = markers[caseId];
  if (!d?.landowner) return;
  const { data } = await db.from('landowner_info').select('*').eq('case_id', caseId).single();
  if (!data) return;
  const { data: logs } = await db.from('negotiation_logs').select('*').eq('landowner_id', data.id).order('log_date', { ascending: false });

  let html = `
    <div class="info-item"><div class="info-label">氏名</div><div class="info-value">${data.name || '—'}</div></div>
    <div class="info-item"><div class="info-label">住所</div><div class="info-value">${data.address || '—'}</div></div>
    <div class="info-item"><div class="info-label">電話番号</div><div class="info-value">${data.tel || '—'}</div></div>
    <div class="info-item"><div class="info-label">価格（万円）</div><div class="info-value">${data.price ? Number(data.price).toLocaleString() : '—'}</div></div>
    <div class="info-item"><div class="info-label">メモ</div><div class="info-value">${data.memo || '—'}</div></div>
  `;
  if (data.google_map) html += `<div class="info-item"><div class="info-label">Googleマップ</div><div class="info-value"><a href="${data.google_map}" target="_blank" style="color:var(--blue)">🗺 地図を開く</a></div></div>`;
  const land = d.land;
  if (land?.location) html += `<hr style="border-color:var(--border);margin:12px 0"><div class="info-item"><div class="info-label">🏔 土地所在</div><div class="info-value">${land.location}</div></div>`;
  if (logs && logs.length) {
    html += `<hr style="border-color:var(--border);margin:12px 0"><div class="info-label" style="font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);margin-bottom:10px">📋 商談記録</div>`;
    html += logs.map(log => `<div style="background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:10px;margin-bottom:8px;border-left:2px solid var(--accent)"><div style="font-family:var(--font-mono);font-size:11px;color:var(--accent);margin-bottom:4px">${log.log_date}</div><div style="font-size:12px;color:var(--text);line-height:1.5">${log.content}</div></div>`).join('');
  }

  document.getElementById('sidePanelBody').innerHTML = html;
  document.getElementById('sidePanel').classList.add('open');
}

function showToast(msg, type = 'success') {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.textContent = msg;
  container.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

function closeSidePanel() { document.getElementById('sidePanel').classList.remove('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

initMap();
loadData();
</script>
</body>
</html>
