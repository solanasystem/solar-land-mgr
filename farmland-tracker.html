<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>農地変化トラッカー | SOLAR LAND MGR</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#0d1117;--surface:#161b22;--surface2:#1c2333;--border:#30363d;--accent:#f0b429;--green:#3fb950;--red:#f85149;--text:#e6edf3;--text-muted:#8b949e;--font-main:'Zen Kaku Gothic New',sans-serif;--font-mono:'Share Tech Mono',monospace;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:var(--font-main);height:100vh;display:flex;flex-direction:column;overflow:hidden;}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:1000;}
.header-left{display:flex;align-items:center;gap:12px;}
.logo{display:flex;align-items:center;gap:8px;text-decoration:none;color:var(--text);}
.logo-icon{width:28px;height:28px;background:linear-gradient(135deg,#f0b429,#e85d04);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;}
.logo-text{font-size:14px;font-weight:700;}
.page-title{font-size:13px;color:var(--text-muted);}
.btn{padding:6px 14px;border-radius:6px;border:1px solid var(--border);font-family:var(--font-main);font-size:12px;font-weight:500;cursor:pointer;transition:all 0.15s;}
.btn-ghost{background:none;color:var(--text-muted);}
.btn-ghost:hover{background:var(--surface2);color:var(--text);}
.btn-primary{background:var(--accent);color:#000;border-color:var(--accent);}
.toolbar{background:var(--surface);border-bottom:1px solid var(--border);padding:8px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;flex-shrink:0;z-index:999;}
.toolbar-label{font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;white-space:nowrap;}
.date-select{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:5px 10px;color:var(--text);font-family:var(--font-main);font-size:12px;cursor:pointer;}
.stats-bar{display:flex;align-items:center;gap:16px;margin-left:auto;}
.stat-item{display:flex;align-items:center;gap:6px;font-size:12px;}
.stat-dot{width:10px;height:10px;border-radius:50%;}
.stat-count{font-family:var(--font-mono);font-weight:700;font-size:14px;}
.map-wrapper{flex:1;position:relative;overflow:hidden;}
#map{width:100%;height:100%;}
.leaflet-top.leaflet-left{display:none;}
.zoom-controls{position:absolute;bottom:24px;right:12px;z-index:500;display:flex;flex-direction:column;gap:2px;}
.zoom-btn{width:32px;height:32px;background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:18px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.zoom-level{width:32px;height:28px;background:var(--surface);border:1px solid var(--border);border-radius:4px;color:var(--accent);font-family:var(--font-mono);font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;}
.map-legend{position:absolute;bottom:24px;left:12px;z-index:500;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 14px;}
.legend-title{font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;margin-bottom:8px;}
.legend-item{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text);margin-bottom:5px;}
.legend-marker{width:14px;height:14px;border-radius:50%;border:2px solid rgba(0,0,0,0.3);}
.side-panel{position:absolute;top:0;right:0;width:300px;height:100%;background:var(--surface);border-left:1px solid var(--border);z-index:600;transform:translateX(100%);transition:transform 0.3s ease;overflow-y:auto;display:flex;flex-direction:column;}
.side-panel.open{transform:translateX(0);}
.side-panel-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--surface);z-index:1;}
.side-panel-title{font-size:13px;font-weight:700;}
.close-btn{background:none;border:none;color:var(--text-muted);font-size:18px;cursor:pointer;}
.side-panel-body{padding:14px 16px;flex:1;}
.detail-item{margin-bottom:12px;}
.detail-label{font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;margin-bottom:3px;}
.detail-value{font-size:13px;color:var(--text);line-height:1.5;}
.change-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:700;margin-bottom:12px;}
.change-badge.new{background:rgba(63,185,80,.2);color:#3fb950;border:1px solid rgba(63,185,80,.4);}
.change-badge.removed{background:rgba(248,81,73,.2);color:#f85149;border:1px solid rgba(248,81,73,.4);}
.change-badge.existing{background:rgba(139,148,158,.15);color:var(--text-muted);border:1px solid rgba(139,148,158,.3);}
.loading-overlay{position:absolute;inset:0;background:rgba(13,17,23,.8);z-index:700;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:13px;color:var(--text-muted);}
.empty-state{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;pointer-events:none;}
.empty-icon{font-size:48px;}
.empty-text{font-size:14px;color:var(--text-muted);text-align:center;line-height:1.8;}
.toast-container{position:fixed;bottom:20px;right:60px;z-index:3000;display:flex;flex-direction:column;gap:8px;}
.farmland-tooltip{background:#161b22;border:1px solid #f0b429;border-radius:6px;color:#e6edf3;font-family:'Zen Kaku Gothic New',sans-serif;font-size:12px;padding:4px 10px;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,.5);}
.farmland-tooltip::before{display:none;}
.toast{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:11px 16px;font-size:13px;min-width:220px;animation:slideIn .3s ease;}
.toast.success{border-left:3px solid var(--green);}
.toast.error{border-left:3px solid var(--red);}
@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
</style>
</head>
<body>
<header class="header">
  <div class="header-left">
    <a class="logo" href="index.html">
      <div class="logo-icon">☀️</div>
      <span class="logo-text">SOLAR LAND MGR</span>
    </a>
    <span class="page-title">🌾 農地変化トラッカー</span>
  </div>
  <div style="display:flex;align-items:center;gap:8px;">
    <a href="https://aichi.farm.cloudgis.jp/matching/aic/" target="_blank" class="btn btn-ghost">↗ 未来の農地マップ</a>
    <button class="btn btn-ghost" onclick="location.href='index.html'">← 案件一覧</button>
  </div>
</header>

<div class="toolbar">
  <span class="toolbar-label">比較日付</span>
  <select class="date-select" id="dateFrom" onchange="loadDiff()"><option value="">基準日（前）</option></select>
  <span style="color:var(--text-muted);font-size:12px;">→</span>
  <select class="date-select" id="dateTo" onchange="loadDiff()"><option value="">比較日（後）</option></select>
  <button class="btn btn-primary" onclick="triggerManualCollection()" style="font-size:12px;padding:5px 12px;">📥 今日のデータ取得</button>
  <div class="stats-bar">
    <div class="stat-item"><div class="stat-dot" style="background:#3fb950;"></div><span style="color:var(--text-muted)">新規追加</span><span class="stat-count" style="color:#3fb950;" id="statNew">0</span></div>
    <div class="stat-item"><div class="stat-dot" style="background:#f85149;"></div><span style="color:var(--text-muted)">削除済み</span><span class="stat-count" style="color:#f85149;" id="statRemoved">0</span></div>
    <div class="stat-item"><div class="stat-dot" style="background:var(--text-muted);"></div><span style="color:var(--text-muted)">変化なし</span><span class="stat-count" style="color:var(--text-muted);" id="statExisting">0</span></div>
  </div>
</div>

<div class="map-wrapper">
  <div id="map"></div>
  <div class="loading-overlay" id="loadingOverlay" style="display:none;">
    <div class="spinner"></div>
    <div class="loading-text" id="loadingText">データを読み込み中...</div>
  </div>
  <div class="empty-state" id="emptyState">
    <div class="empty-icon">🌾</div>
    <div class="empty-text">上の「📥 今日のデータ取得」ボタンを押してデータを収集してください<br>2日分のデータが溜まると変化が表示されます</div>
  </div>
  <div class="map-legend">
    <div class="legend-title">変化状況</div>
    <div class="legend-item"><div class="legend-marker" style="background:#3fb950;"></div>新規追加</div>
    <div class="legend-item"><div class="legend-marker" style="background:#f85149;"></div>削除済み</div>
    <div class="legend-item"><div class="legend-marker" style="background:#8b949e;"></div>変化なし</div>
  </div>
  <div class="zoom-controls">
    <button class="zoom-btn" onclick="map.zoomIn()">＋</button>
    <div class="zoom-level" id="zoomLevel">10</div>
    <button class="zoom-btn" onclick="map.zoomOut()">－</button>
  </div>
  <div class="side-panel" id="sidePanel">
    <div class="side-panel-header">
      <span class="side-panel-title">🌾 農地詳細</span>
      <button class="close-btn" onclick="closeSidePanel()">✕</button>
    </div>
    <div class="side-panel-body" id="sidePanelBody"></div>
  </div>
</div>
<div class="toast-container" id="toastContainer"></div>

<script>
var SUPABASE_URL = 'https://fygnrjjifoasozbhkxlk.supabase.co';
var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ5Z25yamppZm9hc296YmhreGxrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2MDYzNTEsImV4cCI6MjA5MDE4MjM1MX0.A1fAMcu7wGBBP4xHUKkrExIuy7MFbmarAtLQahwZiso';
var WORKER_BASE = 'https://reinfolib-proxy.takumi-29b.workers.dev';
var db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
var map, markersLayer = null;

function initMap() {
  map = L.map('map', {zoomControl:false}).setView([34.8, 137.1], 10);
  L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/std/{z}/{x}/{y}.png', {attribution:'GSI', maxZoom:18, opacity:0.8}).addTo(map);
  map.on('zoomend', function() { document.getElementById('zoomLevel').textContent = map.getZoom(); });
}

async function loadDates() {
  var res = await db.from('farmland_snapshots').select('snapshot_date').order('snapshot_date', {ascending:true}).limit(10000);
  if (res.error || !res.data) return;
  var seen = {}, dates = [];
  res.data.forEach(function(d) { if (!seen[d.snapshot_date]) { seen[d.snapshot_date]=true; dates.push(d.snapshot_date); } });
  dates.sort().reverse();
  var fe = document.getElementById('dateFrom'), te = document.getElementById('dateTo');
  fe.innerHTML = '<option value="">基準日（前）</option>';
  te.innerHTML = '<option value="">比較日（後）</option>';
  dates.forEach(function(d) { fe.innerHTML += '<option value="'+d+'">'+d+'</option>'; te.innerHTML += '<option value="'+d+'">'+d+'</option>'; });
  if (dates.length >= 2) { fe.value = dates[1]; te.value = dates[0]; loadDiff(); }
  else if (dates.length === 1) { te.value = dates[0]; }
}

async function loadDiff() {
  var dateFrom = document.getElementById('dateFrom').value;
  var dateTo = document.getElementById('dateTo').value;
  if (!dateTo) return;
  showLoading('差分データを取得中...');
  if (markersLayer) { map.removeLayer(markersLayer); markersLayer = null; }
  document.getElementById('emptyState').style.display = 'none';
  try {
    var toRes = await db.from('farmland_snapshots').select('*').eq('snapshot_date', dateTo);
    var toData = toRes.data || [];
    var fromIds = {};
    if (dateFrom) {
      var fRes = await db.from('farmland_snapshots').select('feature_id').eq('snapshot_date', dateFrom);
      (fRes.data||[]).forEach(function(d) { fromIds[d.feature_id]=true; });
    }
    if (!toData.length) { hideLoading(); document.getElementById('emptyState').style.display='flex'; return; }
    var newCount=0, removedCount=0, existingCount=0, markers=[];
    toData.forEach(function(item) {
      if (!item.lat||!item.lng) return;
      if (dateFrom && !fromIds[item.feature_id]) { newCount++; markers.push({item:item, changeType:'new'}); }
      else { existingCount++; }
    });
    if (dateFrom) {
      var toIds={};
      toData.forEach(function(d) { toIds[d.feature_id]=true; });
      var ffRes = await db.from('farmland_snapshots').select('*').eq('snapshot_date', dateFrom);
      (ffRes.data||[]).forEach(function(item) {
        if (!item.lat||!item.lng) return;
        if (!toIds[item.feature_id]) { removedCount++; markers.push({item:item, changeType:'removed'}); }
      });
    }
    var shown=0;
    toData.forEach(function(item) {
      if (!item.lat||!item.lng) return;
      if (dateFrom && !fromIds[item.feature_id]) return;
      if (shown>=200) return;
      markers.push({item:item, changeType:'existing'}); shown++;
    });
    document.getElementById('statNew').textContent = newCount;
    document.getElementById('statRemoved').textContent = removedCount;
    document.getElementById('statExisting').textContent = dateFrom ? existingCount : toData.length;
    var lm = markers.map(function(m) {
      var c = m.changeType==='new'?'#3fb950':m.changeType==='removed'?'#f85149':'#8b949e';
      var label = m.changeType==='new'?'新規':m.changeType==='removed'?'削除':'既存';
      var sz = m.changeType==='existing'?5:8;
      var op = m.changeType==='existing'?0.6:0.9;
      var mk = L.circleMarker([m.item.lat,m.item.lng], {
        radius:sz, fillColor:c, color:'#fff',
        weight:1.5, fillOpacity:op, pane:'markerPane'
      });
      mk.bindTooltip('<b>'+label+'</b> ' + (m.item.city||''), {
        direction: 'top', permanent: false, opacity: 0.95,
        className: 'farmland-tooltip'
      });
      mk.on('click', function() { showDetail(m.item, m.changeType); });
      return mk;
    });
    markersLayer = L.layerGroup(lm).addTo(map);
    var imp = markers.filter(function(m) { return m.changeType!=='existing'; });
    if (imp.length) { var b=L.latLngBounds(imp.map(function(m){return [m.item.lat,m.item.lng];})); map.fitBounds(b,{padding:[40,40]}); }
    hideLoading();
    if (newCount===0 && removedCount===0 && dateFrom) showToast('変化はありませんでした', 'success');
    else if (newCount>0||removedCount>0) showToast('新規 '+newCount+'件 / 削除 '+removedCount+'件 の変化を検出しました', 'success');
  } catch(e) { hideLoading(); showToast('エラー: '+e.message, 'error'); }
}

function showDetail(item, changeType) {
  var lbl = changeType==='new'?'🟢 新規追加':changeType==='removed'?'🔴 削除済み':'⚪ 変化なし';
  var bc = changeType==='new'?'new':changeType==='removed'?'removed':'existing';
  document.getElementById('sidePanelBody').innerHTML =
    '<div class="change-badge '+bc+'">'+lbl+'</div>'+
    '<div class="detail-item"><div class="detail-label">ID</div><div class="detail-value" style="font-family:var(--font-mono);font-size:11px;">'+(item.feature_id||'-')+'</div></div>'+
    '<div class="detail-item"><div class="detail-label">市町村</div><div class="detail-value">'+(item.city||'-')+'</div></div>'+
    '<div class="detail-item"><div class="detail-label">スナップショット日</div><div class="detail-value">'+(item.snapshot_date||'-')+'</div></div>'+
    '<hr style="border-color:var(--border);margin:12px 0;">'+
    '<a href="https://aichi.farm.cloudgis.jp/matching/aic/" target="_blank" style="display:block;text-align:center;padding:8px;background:rgba(34,197,94,.15);color:#22c55e;border:1px solid rgba(34,197,94,.3);border-radius:6px;text-decoration:none;font-size:12px;font-weight:600;">🌾 未来の農地マップで確認</a>';
  document.getElementById('sidePanel').classList.add('open');
}

function closeSidePanel() { document.getElementById('sidePanel').classList.remove('open'); }

function parseAreasToRecords(areas, today) {
  var records = [];
  if (areas && typeof areas==='object' && !Array.isArray(areas) && !areas.features) {
    var idx=0, keys=Object.keys(areas);
    for (var ki=0; ki<keys.length; ki++) {
      var city = keys[ki];
      var val = areas[city];
      if (!Array.isArray(val)) continue;
      // 形式A: [minLng, minLat, maxLng, maxLat] — 1つのbbox
      if (val.length===4 && typeof val[0]==='number') {
        var lng=(parseFloat(val[0])+parseFloat(val[2]))/2;
        var lat=(parseFloat(val[1])+parseFloat(val[3]))/2;
        if (lat&&lng&&!isNaN(lat)&&!isNaN(lng)) {
          records.push({feature_id:city+'_'+idx, city:city, address:'', area_sqm:null, intent:'', price:'', registered_date:'', lat:lat, lng:lng, snapshot_date:today, status:'active'});
          idx++;
        }
      } else {
        // 形式B: [[bbox1], [bbox2], ...] — 複数bbox
        for (var bi=0; bi<val.length; bi++) {
          var bbox=val[bi];
          if (!Array.isArray(bbox)||bbox.length<4) continue;
          var lng2=(parseFloat(bbox[0])+parseFloat(bbox[2]))/2;
          var lat2=(parseFloat(bbox[1])+parseFloat(bbox[3]))/2;
          if (!lat2||!lng2||isNaN(lat2)||isNaN(lng2)) continue;
          records.push({feature_id:city+'_'+idx, city:city, address:'', area_sqm:null, intent:'', price:'', registered_date:'', lat:lat2, lng:lng2, snapshot_date:today, status:'active'});
          idx++;
        }
      }
    }
    showDebug('形式: city-keyed 変換後: '+records.length+'件');
  } else if (Array.isArray(areas) && areas.length && Array.isArray(areas[0])) {
    for (var i=0; i<areas.length; i++) {
      var a=areas[i]; if (a.length<4) continue;
      var lng2=(parseFloat(a[0])+parseFloat(a[2]))/2, lat2=(parseFloat(a[1])+parseFloat(a[3]))/2;
      if (!lat2||!lng2||isNaN(lat2)||isNaN(lng2)) continue;
      records.push({feature_id:String(i), city:'', address:'', area_sqm:null, intent:'', price:'', registered_date:'', lat:lat2, lng:lng2, snapshot_date:today, status:'active'});
    }
    showDebug('形式: flat bbox 変換後: '+records.length+'件');
  } else if (areas && areas.features) {
    for (var j=0; j<areas.features.length; j++) {
      var f=areas.features[j], p=f.properties||{};
      var flat=f.geometry&&f.geometry.coordinates?f.geometry.coordinates[1]:null;
      var flng=f.geometry&&f.geometry.coordinates?f.geometry.coordinates[0]:null;
      if (!flat||!flng) continue;
      records.push({feature_id:String(f.id||j), city:p.city||'', address:p.address||'', area_sqm:parseFloat(p.area||0)||null, intent:p.intent||'', price:p.price?String(p.price):'', registered_date:p.registered_date||'', lat:flat, lng:flng, snapshot_date:today, status:'active'});
    }
    showDebug('形式: GeoJSON 変換後: '+records.length+'件');
  } else if (Array.isArray(areas)) {
    for (var k=0; k<areas.length; k++) {
      var o=areas[k];
      var olat=parseFloat(o.lat||o.latitude||o.y||0)||null, olng=parseFloat(o.lng||o.longitude||o.x||0)||null;
      if (!olat||!olng) continue;
      records.push({feature_id:String(o.id||k), city:o.city||'', address:o.address||'', area_sqm:parseFloat(o.area||0)||null, intent:o.intent||'', price:o.price?String(o.price):'', registered_date:o.registered_date||'', lat:olat, lng:olng, snapshot_date:today, status:'active'});
    }
    showDebug('形式: object array 変換後: '+records.length+'件');
  }
  return records;
}

async function triggerManualCollection() {
  alert('ボタンが押されました！処理を開始します。');
  showLoading('農地データを取得中...');
  try {
    var today = new Date().toISOString().split('T')[0];
    var chk = await db.from('farmland_snapshots').select('id').eq('snapshot_date', today).limit(1);
    if (chk.data && chk.data.length>0) { hideLoading(); showToast('今日のデータはすでに取得済みです', 'success'); await loadDates(); return; }
    var urls = [WORKER_BASE+'/farmland/common/aic/search/area.json?v=1225', WORKER_BASE+'/farmland/common/aic/search/area.json'];
    var areas = null;
    for (var ui=0; ui<urls.length; ui++) {
      try {
        var r = await fetch(urls[ui]);
        if (r.ok) {
          var ct = r.headers.get('content-type')||'';
          if (ct.indexOf('json')>=0) {
            areas = await r.json();
            var cnt = Array.isArray(areas)?areas.length:Object.keys(areas).length;
            showDebug('✅ 成功: '+urls[ui]+' 件数: '+cnt);
            break;
          }
        }
        showDebug('❌ 失敗: '+urls[ui]+' HTTP:'+r.status);
      } catch(e2) { showDebug('⚠️ エラー: '+urls[ui]+' '+e2.message); }
    }
    if (!areas) { hideLoading(); showToast('農地データの取得に失敗しました', 'error'); return; }
    var records = parseAreasToRecords(areas, today);
    if (!records.length) { hideLoading(); showToast('位置情報付きの農地データが見つかりませんでした', 'error'); return; }
    var saved=0;
    for (var si=0; si<records.length; si+=100) {
      var batch=records.slice(si, si+100);
      var ins = await db.from('farmland_snapshots').insert(batch);
      if (ins.error) showDebug('保存エラー: '+JSON.stringify(ins.error));
      else saved+=batch.length;
    }
    hideLoading();
    showToast(saved+'件の農地データを保存しました', 'success');
    showDebug('保存完了: '+saved+'件');
    await loadDates();
  } catch(e) { hideLoading(); showToast('取得エラー: '+e.message, 'error'); showDebug('例外: '+e.message); }
}

function showLoading(text) { document.getElementById('loadingText').textContent=text; document.getElementById('loadingOverlay').style.display='flex'; }
function hideLoading() { document.getElementById('loadingOverlay').style.display='none'; }
function showToast(msg, type) {
  var c=document.getElementById('toastContainer'), t=document.createElement('div');
  t.className='toast '+(type||'success'); t.textContent=msg; c.appendChild(t);
  setTimeout(function(){if(t.parentNode)t.parentNode.removeChild(t);}, 6000);
}
function showDebug(msg) {
  var el=document.getElementById('debugPanel');
  if (!el) {
    el=document.createElement('div'); el.id='debugPanel';
    el.style.cssText='position:fixed;top:60px;left:50%;transform:translateX(-50%);z-index:9999;background:#1c2333;border:2px solid #f0b429;border-radius:10px;padding:16px 24px;max-width:600px;font-family:monospace;font-size:12px;color:#e6edf3;white-space:pre-wrap;max-height:300px;overflow-y:auto;';
    el.innerHTML='<button onclick="this.parentElement.remove()" style="float:right;background:#f85149;border:none;color:#fff;border-radius:4px;padding:2px 8px;cursor:pointer;">X</button><div id="debugLog"></div>';
    document.body.appendChild(el);
  }
  document.getElementById('debugLog').textContent += new Date().toLocaleTimeString()+' '+msg+'\n';
}

initMap();
loadDates();
</script>
</body>
</html>
