<style>
:root{--bg:#0d1117;--surface:#161b22;--surface2:#1c2333;--border:#30363d;--accent:#f0b429;--green:#3fb950;--red:#f85149;--text:#e6edf3;--text-muted:#8b949e;--font-main:'Zen Kaku Gothic New',sans-serif;--font-mono:'Share Tech Mono',monospace;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:var(--font-main);height:100vh;display:flex;flex-direction:column;overflow:hidden;}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:1000;}
.header-left{display:flex;align-items:center;gap:12px;}
.logo{display:flex;align-items:center;gap:8px;text-decoration:none;color:var(--text);}
.logo-icon{width:28px;height:28px;background:linear-gradient(135deg,#f0b429,#e85d04);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;}
.logo-text{font-size:14px;font-weight:700;}
.page-title{font-size:13px;color:var(--text-muted);}
.btn{padding:6px 14px;border-radius:6px;border:1px solid var(--border);font-family:var(--font-main);font-size:12px;font-weight:500;cursor:pointer;transition:all 0.15s;}
.btn-ghost{background:none;color:var(--text-muted);}
.btn-ghost:hover{background:var(--surface2);color:var(--text);}
.btn-primary{background:var(--accent);color:#000;border-color:var(--accent);}
.toolbar{background:var(--surface);border-bottom:1px solid var(--border);padding:8px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;flex-shrink:0;z-index:999;}
.toolbar-label{font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;white-space:nowrap;}
.date-select{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:5px 10px;color:var(--text);font-family:var(--font-main);font-size:12px;cursor:pointer;}
.stats-bar{display:flex;align-items:center;gap:16px;margin-left:auto;}
.stat-item{display:flex;align-items:center;gap:6px;font-size:12px;}
.stat-dot{width:10px;height:10px;border-radius:50%;}
.stat-count{font-family:var(--font-mono);font-weight:700;font-size:14px;}
.map-wrapper{flex:1;position:relative;overflow:hidden;}
#map{width:100%;height:100%;}
.leaflet-top.leaflet-left{display:none;}
.zoom-controls{position:absolute;bottom:24px;right:12px;z-index:500;display:flex;flex-direction:column;gap:2px;}
.zoom-btn{width:32px;height:32px;background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:18px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.zoom-level{width:32px;height:28px;background:var(--surface);border:1px solid var(--border);border-radius:4px;color:var(--accent);font-family:var(--font-mono);font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;}
.map-legend{position:absolute;bottom:24px;left:12px;z-index:500;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 14px;}
.legend-title{font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;margin-bottom:8px;}
.legend-item{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text);margin-bottom:5px;}
.legend-marker{width:14px;height:14px;border-radius:50%;border:2px solid rgba(0,0,0,0.3);}
.side-panel{position:absolute;top:0;right:0;width:320px;height:100%;background:var(--surface);border-left:1px solid var(--border);z-index:600;transform:translateX(100%);transition:transform 0.3s ease;overflow-y:auto;display:flex;flex-direction:column;}
.side-panel.open{transform:translateX(0);}
.side-panel-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--surface);z-index:1;}

.close-btn{background:none;border:none;color:var(--text-muted);font-size:18px;cursor:pointer;}

@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:13px;color:var(--text-muted);}
.empty-state{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;pointer-events:none;}
.empty-icon{font-size:48px;}
.empty-text{font-size:14px;color:var(--text-muted);text-align:center;line-height:1.8;}
.toast-container{position:fixed;bottom:20px;right:60px;z-index:3000;display:flex;flex-direction:column;gap:8px;}

.farmland-tooltip::before{display:none;}
.toast{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:11px 16px;font-size:13px;min-width:220px;animation:slideIn .3s ease;}
.toast.success{border-left:3px solid var(--green);}
.toast.error{border-left:3px solid var(--red);}
@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}

<script>

];

function getTileVersion() {
  var d = new Date();
  return String(d.getMonth()+1).padStart(2,'0') + String(d.getDate()).padStart(2,'0');
}

function lngLatToTile(lng, lat, z) {
  var x = Math.floor((lng + 180) / 360 * Math.pow(2, z));
  var r = lat * Math.PI / 180;
  var y = Math.floor((1 - Math.log(Math.tan(r) + 1/Math.cos(r)) / Math.PI) / 2 * Math.pow(2, z));
  return {x: x, y: y};
}

// ======== PBF デコーダー ========
function decodePBFTile(buf) {
  var pbf = new Pbf(new Uint8Array(buf));
  var layers = {};
  pbf.readFields(function(tag, layers, pbf) {
    if (tag === 3) {
      var layer = {name:'', version:1, extent:4096, keys:[], values:[], features:[]};
      pbf.readMessage(readVTLayer, layer);
      if (layer.name) layers[layer.name] = layer;
    }
  }, layers);
  return layers;
}
function readVTLayer(tag, layer, pbf) {
  if      (tag === 15) layer.version = pbf.readVarint();
  else if (tag === 1)  layer.name    = pbf.readString();
  else if (tag === 5)  layer.extent  = pbf.readVarint();
  else if (tag === 3)  layer.keys.push(pbf.readString());
  else if (tag === 4)  { var v={}; pbf.readMessage(readVTValue, v); layer.values.push(v); }
  else if (tag === 2)  { var f={id:0,tags:[],type:0,geometry:[]}; pbf.readMessage(readVTFeature, f); layer.features.push(f); }
}
function readVTFeature(tag, f, pbf) {
  if      (tag === 1) f.id       = pbf.readVarint();
  else if (tag === 2) f.tags     = pbf.readPackedVarint();
  else if (tag === 3) f.type     = pbf.readVarint();
  else if (tag === 4) f.geometry = pbf.readPackedVarint();
}
function readVTValue(tag, v, pbf) {
  if      (tag === 1) v.v = pbf.readString();
  else if (tag === 2) v.v = pbf.readFloat();
  else if (tag === 3) v.v = pbf.readDouble();
  else if (tag === 4) v.v = pbf.readVarint(true);
  else if (tag === 5) v.v = pbf.readVarint();
  else if (tag === 6) v.v = pbf.readSVarint();
  else if (tag === 7) v.v = pbf.readBoolean();
}
function getVTProperties(feature, layer) {
  var props = {};
  for (var i = 0; i + 1 < feature.tags.length; i += 2) {
    var ki = feature.tags[i], vi = feature.tags[i+1];
    if (ki < layer.keys.length && vi < layer.values.length)
      props[layer.keys[ki]] = layer.values[vi].v;
  }
  return props;
}

// ポリゴン重心 → lat/lng
function getPolygonCentroid(geometry, tileX, tileY, tileZ, extent) {
  var x=0, y=0, sumX=0, sumY=0, count=0, i=0;
  while (i < geometry.length) {
    var cmdInt = geometry[i++];
    var cmd = cmdInt & 7;
    var len = cmdInt >> 3;
    if (cmd === 1 || cmd === 2) {
      for (var j=0; j<len; j++) {
        x += (geometry[i]>>1)^-(geometry[i]&1); i++;
        y += (geometry[i]>>1)^-(geometry[i]&1); i++;
        sumX += x; sumY += y; count++;
      }
    } else if (cmd === 7) { break; } else { i++; }
  }
  if (!count) return null;
  var tx = sumX/count, ty = sumY/count;
  var z2 = Math.pow(2, tileZ);
  var lng = ((tileX + tx/extent) / z2) * 360 - 180;
  var n = Math.PI * (1 - 2*(tileY + ty/extent)/z2);
  var lat = 180/Math.PI * Math.atan(Math.sinh(n));
  if (lat < 30 || lat > 38 || lng < 130 || lng > 142) return null;
  return {lat: lat, lng: lng};
}

// 出手意向フィルタ
// 「貸したい」のみ = 不要。「売りたい」「貸したい・売りたい」= 対象
function isTargetIntent(iko) {
  if (!iko || iko === '') return false;
  // 「貸したい」のみは除外
  if (iko === '貸したい' || iko === '1' || iko === 1) return false;
  return true;
}

// ======== 地図初期化 ========
function initMap() {
  map = L.map('map', {zoomControl: false}).setView([34.85, 137.1], 11);
  L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/std/{z}/{x}/{y}.png', {
    attribution: 'GSI', maxZoom: 18, opacity: 0.8
  }).addTo(map);
  map.on('zoomend', function() {
    document.getElementById('zoomLevel').textContent = map.getZoom();
  });
}

// ======== 日付リスト ========
async function loadDates() {
  var res = await db.from('farmland_snapshots').select('snapshot_date').order('snapshot_date', {ascending: true}).limit(10000);
  if (res.error || !res.data) return;
  var seen = {}, dates = [];
  res.data.forEach(function(d) { if (!seen[d.snapshot_date]) { seen[d.snapshot_date]=true; dates.push(d.snapshot_date); } });
  dates.sort().reverse();
  var fe = document.getElementById('dateFrom'), te = document.getElementById('dateTo');
  fe.innerHTML = '<option value="">基準日（前）</option>';
  te.innerHTML = '<option value="">比較日（後）</option>';
  dates.forEach(function(d) {
    fe.innerHTML += '<option value="'+d+'">'+d+'</option>';
    te.innerHTML += '<option value="'+d+'">'+d+'</option>';
  });
  if (dates.length >= 2) { fe.value = dates[1]; te.value = dates[0]; loadDiff(); }
  else if (dates.length === 1) { te.value = dates[0]; }
}

// ======== 差分表示 ========
async function loadDiff() {
  var dateFrom = document.getElementById('dateFrom').value;
  var dateTo   = document.getElementById('dateTo').value;
  if (!dateTo) return;
  showLoading('差分データを取得中...');
  if (markersLayer) { map.removeLayer(markersLayer); markersLayer = null; }
  document.getElementById('emptyState').style.display = 'none';
  try {
    var toRes = await db.from('farmland_snapshots').select('*').eq('snapshot_date', dateTo).limit(10000);
    var toData = toRes.data || [];
    var fromIds = {};
    if (dateFrom) {
      var fRes = await db.from('farmland_snapshots').select('feature_id').eq('snapshot_date', dateFrom).limit(10000);
      (fRes.data||[]).forEach(function(d) { fromIds[d.feature_id]=true; });
    }
    if (!toData.length) { hideLoading(); document.getElementById('emptyState').style.display='flex'; return; }
    var newCount=0, removedCount=0, existingCount=0, markers=[];
    toData.forEach(function(item) {
      if (!item.lat||!item.lng) return;
      if (dateFrom && !fromIds[item.feature_id]) { newCount++; markers.push({item:item, changeType:'new'}); }
      else { existingCount++; }
    });
    if (dateFrom) {
      var toIds={};
      toData.forEach(function(d) { toIds[d.feature_id]=true; });
      var ffRes = await db.from('farmland_snapshots').select('*').eq('snapshot_date', dateFrom).limit(10000);
      (ffRes.data||[]).forEach(function(item) {
        if (!item.lat||!item.lng) return;
        if (!toIds[item.feature_id]) { removedCount++; markers.push({item:item, changeType:'removed'}); }
      });
    }
    var shown=0;
    toData.forEach(function(item) {
      if (!item.lat||!item.lng) return;
      if (dateFrom && !fromIds[item.feature_id]) return;
      if (shown>=500) return;
      markers.push({item:item, changeType:'existing'}); shown++;
    });
    document.getElementById('statNew').textContent      = newCount;
    document.getElementById('statRemoved').textContent  = removedCount;
    document.getElementById('statExisting').textContent = dateFrom ? existingCount : toData.length;
    var lm = markers.map(function(m) {
      var c  = m.changeType==='new'?'#3fb950':m.changeType==='removed'?'#f85149':'#8b949e';
      var lbl= m.changeType==='new'?'新規':m.changeType==='removed'?'削除':'既存';
      var sz = m.changeType==='existing'?5:9;
      var op = m.changeType==='existing'?0.5:0.9;
      var mk = L.circleMarker([m.item.lat,m.item.lng], {radius:sz, fillColor:c, color:'#fff', weight:2, fillOpacity:op, pane:'markerPane'});
      mk.bindTooltip('<b>'+lbl+'</b> '+(m.item.city||''), {direction:'top', permanent:false, opacity:0.95, className:'farmland-tooltip'});
      mk.on('click', function() { showDetail(m.item, m.changeType); });
      return mk;
    });
    markersLayer = L.layerGroup(lm).addTo(map);
    var imp = markers.filter(function(m) { return m.changeType!=='existing'; });
    if (imp.length) { var b=L.latLngBounds(imp.map(function(m){return [m.item.lat,m.item.lng];})); map.fitBounds(b,{padding:[40,40]}); }
    hideLoading();
    if (newCount===0 && removedCount===0 && dateFrom) showToast('変化はありませんでした', 'success');
    else if (newCount>0||removedCount>0) showToast('新規 '+newCount+'件 / 削除 '+removedCount+'件 の変化を検出しました', 'success');
  } catch(e) { hideLoading(); showToast('エラー: '+e.message, 'error'); }
}

// ======== 詳細パネル ========
function showDetail(item, changeType) {
  var lbl = changeType==='new'?'🟢 新規追加':changeType==='removed'?'🔴 削除済み':'⚪ 変化なし';
  var bc  = changeType==='new'?'new':changeType==='removed'?'removed':'existing';
  var iko = item.intent || '-';
  document.getElementById('sidePanelBody').innerHTML =
    '<div class="change-badge '+bc+'">'+lbl+'</div>'+
    '<div class="detail-item"><div class="detail-label">市町村</div><div class="detail-value">'+(item.city||'-')+'</div></div>'+
    '<div class="detail-item"><div class="detail-label">出手意向</div><div class="detail-value">'+iko+'</div></div>'+
    '<div class="detail-item"><div class="detail-label">所在地</div><div class="detail-value">'+(item.address||'-')+'</div></div>'+
    '<div class="detail-item"><div class="detail-label">面積</div><div class="detail-value">'+(item.area_sqm?Number(item.area_sqm).toLocaleString()+' m²':'-')+'</div></div>'+
    '<div class="detail-item"><div class="detail-label">地目</div><div class="detail-value">'+(item.registered_date||'-')+'</div></div>'+
    '<div class="detail-item"><div class="detail-label">スナップショット日</div><div class="detail-value">'+(item.snapshot_date||'-')+'</div></div>'+
    '<hr style="border-color:var(--border);margin:12px 0;">'+
    '<a href="https://aichi.farm.cloudgis.jp/matching/aic/" target="_blank" style="display:block;text-align:center;padding:8px;background:rgba(34,197,94,.15);color:#22c55e;border:1px solid rgba(34,197,94,.3);border-radius:6px;text-decoration:none;font-size:12px;font-weight:600;">🌾 未来の農地マップで確認</a>';
  document.getElementById('sidePanel').classList.add('open');
}

function closeSidePanel() { document.getElementById('sidePanel').classList.remove('open'); }

// ======== データ収集（PBFデコード・出手意向フィルタ） ========
async function triggerManualCollection() {
  if (typeof Pbf === 'undefined') { showToast('PBFライブラリ未読み込み', 'error'); return; }
  showLoading('農地タイルをデコード中...');
  try {
    var today = new Date().toISOString().split('T')[0];
    var chk = await db.from('farmland_snapshots').select('id').eq('snapshot_date', today).limit(1);
    if (chk.data && chk.data.length>0) {
      hideLoading(); showToast('今日のデータはすでに取得済みです', 'success'); await loadDates(); return;
    }

    var ZOOM = 14, RADIUS = 6;
    var ver = getTileVersion();
    var records = [], featureSeen = {}, tileSeen = {};
    var totalTiles=0, nonEmpty=0, totalFeatures=0;

    for (var ci=0; ci<CITIES.length; ci++) {
      var city = CITIES[ci];
      document.getElementById('loadingText').textContent = city.name+' デコード中... ('+(ci+1)+'/'+CITIES.length+')';
      var center = lngLatToTile(city.lng, city.lat, ZOOM);
      var cityCount = 0;

      for (var dx=-RADIUS; dx<=RADIUS; dx++) {
        for (var dy=-RADIUS; dy<=RADIUS; dy++) {
          var tx=center.x+dx, ty=center.y+dy;
          var tKey=ZOOM+'/'+tx+'/'+ty+'/'+city.slug;
          if (tileSeen[tKey]) continue;
          tileSeen[tKey]=true; totalTiles++;
          try {
            var url=WORKER_BASE+'/farmland/matching/aic/map/'+city.slug+'/tiles/'+ZOOM+'/'+tx+'/'+ty+'.pbf?v='+ver;
            var r=await fetch(url);
            if (!r.ok) continue;
            var buf=await r.arrayBuffer();
            if (buf.byteLength<30) continue;
            nonEmpty++;
            var layers=decodePBFTile(buf);
            for (var layerName in layers) {
              var layer=layers[layerName];
              for (var fi=0; fi<layer.features.length; fi++) {
                var feature=layer.features[fi];
                if (feature.type!==3) continue;
                var props=getVTProperties(feature, layer);

                // 初回デバッグ出力
                if (!window._propsDumped && Object.keys(props).length>0) {
                  window._propsDumped=true;
                  showDebug('Layer: '+layerName+'\nProps: '+JSON.stringify(props).slice(0,400));
                }

                // 出手意向フィルタ（確認済みフィールド名）
                var iko = props['出手意向'];

                // 意向が空（一般農地筆）→ スキップ
                if (!iko || iko==='' || iko==='null') continue;

                // 「貸したい」のみ → スキップ（赤は不要）
                if (!isTargetIntent(iko)) continue;

                // 重複チェック
                var fid=city.slug+'_'+feature.id;
                if (featureSeen[fid]) continue;
                featureSeen[fid]=true;

                // 重心計算
                var centroid=getPolygonCentroid(feature.geometry, tx, ty, ZOOM, layer.extent);
                if (!centroid) continue;

                // 所在地は筆在キーから取得（例: 232149/71-140-2-4/）
                var chiban = String(props['筆在キー']||'').replace(/^[0-9]+\//,'').replace(/\/$/,'');

                records.push({
                  feature_id: fid,
                  city: city.name,
                  address: chiban,
                  area_sqm: parseFloat(props['出手農地数']||props['面積']||0)||null,
                  intent: String(iko),
                  price: String(props['出手売却金額']||''),
                  registered_date: String(props['地目']||''),
                  lat: centroid.lat,
                  lng: centroid.lng,
                  snapshot_date: today,
                  status: 'active'
                });
                cityCount++; totalFeatures++;
              }
            }
          } catch(e2) { /* スキップ */ }
        }
      }
      if (cityCount>0) showDebug(city.name+': '+cityCount+'件');
    }

    showDebug('タイル: '+totalTiles+' / 非空: '+nonEmpty+' / 農地: '+totalFeatures);

    if (!records.length) {
      hideLoading();
      showToast('出手農地データが見つかりませんでした', 'error');
      showDebug('→ Supabaseの古いデータを削除してから再試行してください');
      return;
    }

    var saved=0;
    for (var si=0; si<records.length; si+=100) {
      var batch=records.slice(si, si+100);
      var ins=await db.from('farmland_snapshots').insert(batch);
      if (ins.error) showDebug('保存エラー: '+JSON.stringify(ins.error));
      else saved+=batch.length;
    }
    hideLoading();
    showToast(saved+'件の出手農地データを保存しました', 'success');
    showDebug('保存完了: '+saved+'件');
    await loadDates();
  } catch(e) {
    hideLoading();
    showToast('エラー: '+e.message, 'error');
    showDebug('例外: '+e.message);
  }
}

function showLoading(t) { document.getElementById('loadingText').textContent=t; document.getElementById('loadingOverlay').style.display='flex'; }
function hideLoading()   { document.getElementById('loadingOverlay').style.display='none'; }
function showToast(msg, type) {
  var c=document.getElementById('toastContainer'), t=document.createElement('div');
  t.className='toast '+(type||'success'); t.textContent=msg; c.appendChild(t);
  setTimeout(function(){if(t.parentNode)t.parentNode.removeChild(t);}, 6000);
}
function showDebug(msg) {
  var el=document.getElementById('debugPanel');
  if (!el) {
    el=document.createElement('div'); el.id='debugPanel';
    el.style.cssText='position:fixed;top:60px;left:50%;transform:translateX(-50%);z-index:9999;background:#1c2333;border:2px solid #f0b429;border-radius:10px;padding:16px 24px;max-width:700px;width:90%;font-family:monospace;font-size:12px;color:#e6edf3;white-space:pre-wrap;max-height:400px;overflow-y:auto;';
    el.innerHTML='<button onclick="this.parentElement.remove()" style="float:right;background:#f85149;border:none;color:#fff;border-radius:4px;padding:2px 8px;cursor:pointer;">X</button><div id="debugLog"></div>';
    document.body.appendChild(el);
  }
  document.getElementById('debugLog').textContent += new Date().toLocaleTimeString()+' '+msg+'\n';
}

initMap();
loadDates();
</script>
