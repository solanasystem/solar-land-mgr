<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>農地変更トラッカー | SOLAR LAND MGR</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/pbf@3.2.1/dist/pbf.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#0d1117;--surface:#161b22;--surface2:#1c2333;--border:#30363d;--accent:#f0b429;--green:#3fb950;--red:#f85149;--text:#e6edf3;--text-muted:#8b949e;--font-main:'Zen Kaku Gothic New',sans-serif;--font-mono:'Share Tech Mono',monospace;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:var(--font-main);height:100vh;display:flex;flex-direction:column;overflow:hidden;}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:1000;}
.header-left{display:flex;align-items:center;gap:12px;}
.logo{display:flex;align-items:center;gap:8px;text-decoration:none;color:var(--text);}
.logo-icon{width:28px;height:28px;background:linear-gradient(135deg,#f0b429,#e85d04);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;}
.logo-text{font-size:14px;font-weight:700;}
.page-title{font-size:13px;color:var(--text-muted);}
.btn{padding:6px 14px;border-radius:6px;border:1px solid var(--border);font-family:var(--font-main);font-size:12px;font-weight:500;cursor:pointer;transition:all 0.15s;}
.btn-ghost{background:none;color:var(--text-muted);}
.btn-ghost:hover{background:var(--surface2);color:var(--text);}
.btn-primary{background:var(--accent);color:#000;border-color:var(--accent);}
.toolbar{background:var(--surface);border-bottom:1px solid var(--border);padding:8px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;flex-shrink:0;z-index:999;}
.toolbar-label{font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;white-space:nowrap;}
.date-select{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:5px 10px;color:var(--text);font-family:var(--font-main);font-size:12px;cursor:pointer;}
.stats-bar{display:flex;align-items:center;gap:16px;margin-left:auto;}
.stat-item{display:flex;align-items:center;gap:6px;font-size:12px;}
.stat-dot{width:10px;height:10px;border-radius:50%;}
.stat-count{font-family:var(--font-mono);font-weight:700;font-size:14px;}
.map-wrapper{flex:1;position:relative;overflow:hidden;}
#map{width:100%;height:100%;}
.leaflet-top.leaflet-left{display:none;}
.zoom-controls{position:absolute;bottom:24px;right:12px;z-index:500;display:flex;flex-direction:column;gap:2px;}
.zoom-btn{width:32px;height:32px;background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:18px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.zoom-level{width:32px;height:28px;background:var(--surface);border:1px solid var(--border);border-radius:4px;color:var(--accent);font-family:var(--font-mono);font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;}
.map-legend{position:absolute;bottom:24px;left:12px;z-index:500;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 14px;}
.legend-title{font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;margin-bottom:8px;}
.legend-item{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text);margin-bottom:5px;}
.legend-marker{width:14px;height:14px;border-radius:50%;border:2px solid rgba(0,0,0,0.3);}
.side-panel{position:absolute;top:0;right:0;width:320px;height:100%;background:var(--surface);border-left:1px solid var(--border);z-index:600;transform:translateX(100%);transition:transform 0.3s ease;overflow-y:auto;display:flex;flex-direction:column;}
.side-panel.open{transform:translateX(0);}
.side-panel-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--surface);z-index:1;}
.side-panel-title{font-size:13px;font-weight:700;}
.close-btn{background:none;border:none;color:var(--text-muted);font-size:18px;cursor:pointer;}
.side-panel-body{padding:14px 16px;flex:1;}
.detail-item{margin-bottom:12px;}
.detail-label{font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;margin-bottom:3px;}
.detail-value{font-size:13px;color:var(--text);line-height:1.5;}
.change-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:700;margin-bottom:12px;}
.change-badge.new{background:rgba(63,185,80,.2);color:#3fb950;border:1px solid rgba(63,185,80,.4);}
.change-badge.removed{background:rgba(248,81,73,.2);color:#f85149;border:1px solid rgba(248,81,73,.4);}
.change-badge.existing{background:rgba(139,148,158,.15);color:var(--text-muted);border:1px solid rgba(139,148,158,.3);}
.loading-overlay{position:absolute;inset:0;background:rgba(13,17,23,.8);z-index:700;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:13px;color:var(--text-muted);}
.empty-state{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;pointer-events:none;}
.empty-icon{font-size:48px;}
.empty-text{font-size:14px;color:var(--text-muted);text-align:center;line-height:1.8;}
.toast-container{position:fixed;bottom:20px;right:60px;z-index:3000;display:flex;flex-direction:column;gap:8px;}
.farmland-tooltip{background:#161b22;border:1px solid #f0b429;border-radius:6px;color:#e6edf3;font-size:12px;padding:4px 10px;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,.5);}
.farmland-tooltip::before{display:none;}
/* ======== 地番検索 ======== */
.chiban-search{position:absolute;top:60px;left:12px;z-index:501;width:260px;}
.chiban-search input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 12px 8px 32px;color:var(--text);font-family:var(--font-main);font-size:12px;outline:none;}
.chiban-search input:focus{border-color:var(--accent);}
.chiban-search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:13px;pointer-events:none;}
.chiban-results{background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-top:4px;max-height:200px;overflow-y:auto;display:none;}
.chiban-result-item{padding:8px 12px;font-size:12px;cursor:pointer;border-bottom:1px solid rgba(48,54,61,0.5);color:var(--text);}
.chiban-result-item:hover{background:var(--surface2);}
.chiban-result-item:last-child{border-bottom:none;}
.hazard-controls{position:absolute;top:60px;right:12px;z-index:500;display:flex;flex-direction:column;gap:4px;}
.hazard-btn{padding:5px 10px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--text-muted);font-family:var(--font-main);font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all 0.15s;text-align:left;}
.hazard-btn:hover{background:var(--surface2);color:var(--text);}
.hazard-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(240,180,41,.12);}
.hazard-divider{border-top:1px solid var(--border);margin:2px 0;}
.gis-switch{position:absolute;top:12px;left:12px;z-index:500;display:flex;border:1px solid var(--border);border-radius:6px;overflow:hidden;}
.gis-switch-btn{padding:5px 12px;background:var(--surface);color:var(--text-muted);font-family:var(--font-main);font-size:11px;font-weight:700;cursor:pointer;border:none;transition:all 0.15s;white-space:nowrap;}
.gis-switch-btn.active{background:var(--accent);color:#000;}
.gis-switch-btn:not(.active):hover{background:var(--surface2);color:var(--text);}
.toast{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:11px 16px;font-size:13px;min-width:220px;animation:slideIn .3s ease;}
.toast.success{border-left:3px solid var(--green);}
.toast.error{border-left:3px solid var(--red);}
@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
</style>
</head>
<body>
<header class="header">
  <div class="header-left">
    <a class="logo" href="index.html"><div class="logo-icon">☀️</div><span class="logo-text">SOLAR LAND MGR</span></a>
    <span class="page-title">🌿 農地変更トラッカー</span>
  </div>
  <div style="display:flex;align-items:center;gap:8px;">
    <a href="https://aichi.farm.cloudgis.jp/matching/aic/" target="_blank" class="btn btn-ghost">↗ 未来の農地マップ</a>
    <button class="btn btn-ghost" onclick="location.href='index.html'">← 案件一覧</button>
  </div>
</header>
<div class="toolbar">
  <span class="toolbar-label">比較日付</span>
  <select class="date-select" id="dateFrom" onchange="loadDiff()"><option value="">基準日（前）</option></select>
  <span style="color:var(--text-muted);font-size:12px;">→</span>
  <select class="date-select" id="dateTo" onchange="loadDiff()"><option value="">比較日（後）</option></select>
  <button class="btn btn-primary" onclick="triggerManualCollection()" style="font-size:12px;padding:5px 12px;">📥 今日のデータ取得</button>
  <div class="stats-bar">
    <div class="stat-item"><div class="stat-dot" style="background:#3fb950;"></div><span style="color:var(--text-muted)">新規追加</span><span class="stat-count" style="color:#3fb950;" id="statNew">0</span></div>
    <div class="stat-item"><div class="stat-dot" style="background:#f85149;"></div><span style="color:var(--text-muted)">削除済み</span><span class="stat-count" style="color:#f85149;" id="statRemoved">0</span></div>
    <div class="stat-item"><div class="stat-dot" style="background:var(--text-muted);"></div><span style="color:var(--text-muted)">変更なし</span><span class="stat-count" style="color:var(--text-muted);" id="statExisting">0</span></div>
  </div>
</div>
<div class="map-wrapper">
  <div id="map"></div>
  <div class="loading-overlay" id="loadingOverlay" style="display:none;"><div class="spinner"></div><div class="loading-text" id="loadingText">データを読み込み中...</div></div>
  <div class="empty-state" id="emptyState"><div class="empty-icon">🌿</div><div class="empty-text">上の「📥 今日のデータ取得」ボタンを押してデータを収集してください<br>2日分のデータが溜まると変更が表示されます</div></div>
  <div class="map-legend">
    <div class="legend-title">変更状況</div>
    <div class="legend-item"><div class="legend-marker" style="background:#3fb950;"></div>新規追加</div>
    <div class="legend-item"><div class="legend-marker" style="background:#f85149;"></div>削除済み</div>
    <div class="legend-item"><div class="legend-marker" style="background:#4a9eff;border-color:#a855f7;"></div>変更なし</div>
    <div class="legend-item"><div class="legend-marker" style="background:#ffe066;border-color:#c8a000;border-radius:2px;"></div>農振農用地</div>
  </div>
  <div class="zoom-controls">
    <button class="zoom-btn" onclick="map.zoomIn()">＋</button>
    <div class="zoom-level" id="zoomLevel">11</div>
    <button class="zoom-btn" onclick="map.zoomOut()">－</button>
  </div>
  <div class="gis-switch">
    <button class="gis-switch-btn active" id="gisMap" onclick="switchGIS('map')">🗺 地図</button>
    <button class="gis-switch-btn" id="gisSat" onclick="switchGIS('satellite')">🛰 衛星</button>
  </div>
  <!-- 地番・住所検索 -->
  <div class="chiban-search" id="chibanSearch">
    <span class="chiban-search-icon">🔍</span>
    <input type="text" id="chibanInput" placeholder="市区町村 大字 地番で検索...">
    <div class="chiban-results" id="chibanResults"></div>
  </div>
  <div class="hazard-controls">
    <button class="hazard-btn" id="hzFlood" onclick="toggleHazard('flood')">💧 浸水</button>
    <button class="hazard-btn" id="hzInner" onclick="toggleHazard('inner')">💧 内水</button>
    <button class="hazard-btn" id="hzSediment" onclick="toggleDosyaPolygon()">⚠ 土砂災害</button>
    <button class="hazard-btn" id="hzTide" onclick="toggleHazard('tide')">🌊 高潮</button>
    <button class="hazard-btn" id="hzTsunami" onclick="toggleHazard('tsunami')">🌊 津波</button>
    <div class="hazard-divider"></div>
    <button class="hazard-btn" id="hzToshi" onclick="toggleToshi()">🏙 用途地域</button>
    <div class="hazard-divider"></div>
    <button class="hazard-btn" id="hzNoshin" onclick="toggleNoshin()">🌾 農振農用地</button>
  </div>
  <div class="side-panel" id="sidePanel">
    <div class="side-panel-header"><span class="side-panel-title">🌿 農地詳細</span><button class="close-btn" onclick="closeSidePanel()">✕</button></div>
    <div class="side-panel-body" id="sidePanelBody"></div>
  </div>
</div>
<div class="toast-container" id="toastContainer"></div>
<script>
var SUPABASE_URL='https://fygnrjjifoasozbhkxlk.supabase.co';
var SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ5Z25yamppZm9hc296YmhreGxrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2MDYzNTEsImV4cCI6MjA5MDE4MjM1MX0.A1fAMcu7wGBBP4xHUKkrExIuy7MFbmarAtLQahwZiso';
var WORKER_BASE='https://reinfolib-proxy.takumi-29b.workers.dev';
var db=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
var map,markersLayer=null;
var ZOOM=14;
var baseLayer=null;
var currentGIS='map';
var BASE_TILES={
  map:'https://cyberjapandata.gsi.go.jp/xyz/std/{z}/{x}/{y}.png',
  satellite:'https://cyberjapandata.gsi.go.jp/xyz/seamlessphoto/{z}/{x}/{y}.jpg'
};
function switchGIS(mode){
  if(currentGIS===mode)return;
  currentGIS=mode;
  if(baseLayer){map.removeLayer(baseLayer);}
  baseLayer=L.tileLayer(BASE_TILES[mode],{attribution:'GSI',maxZoom:18,opacity:0.9});
  baseLayer.addTo(map);
  baseLayer.bringToBack();
  document.getElementById('gisMap').classList.toggle('active',mode==='map');
  document.getElementById('gisSat').classList.toggle('active',mode==='satellite');
  for(var k in hazardLayers){hazardLayers[k].bringToFront();}
  if(toshiLayer){toshiLayer.bringToFront();}
  if(markersLayer){markersLayer.bringToFront();}
}
var hazardLayers={};
var HAZARD_URLS={
  flood:'https://disaportaldata.gsi.go.jp/raster/01_flood_l2_shinsuishin_data/{z}/{x}/{y}.png',
  inner:'https://disaportaldata.gsi.go.jp/raster/01_flood_l2_shinsuishin_kuni_data/{z}/{x}/{y}.png',
  sediment:'https://disaportaldata.gsi.go.jp/raster/05_dosekiryukeikaikuiki_data/{z}/{x}/{y}.png',
  tide:'https://disaportaldata.gsi.go.jp/raster/03_hightide_l2_shinsuishin_data/{z}/{x}/{y}.png',
  tsunami:'https://disaportaldata.gsi.go.jp/raster/04_tsunami_newlegend_data/{z}/{x}/{y}.png'
};
function toggleHazard(type){
  var btnId='hz'+type.charAt(0).toUpperCase()+type.slice(1);
  var btn=document.getElementById(btnId);
  if(hazardLayers[type]){
    map.removeLayer(hazardLayers[type]);
    delete hazardLayers[type];
    btn.classList.remove('active');
  } else {
    var layer=L.tileLayer(HAZARD_URLS[type],{opacity:0.7,maxZoom:18,attribution:'国土交通省'});
    layer.addTo(map);
    layer.bringToFront();
    hazardLayers[type]=layer;
    btn.classList.add('active');
  }
}
var toshiLayer=null;
var TOSHI_URL='https://cyberjapandata.gsi.go.jp/xyz/experimental_yzto/{z}/{x}/{y}.png';
function toggleToshi(){
  var btn=document.getElementById('hzToshi');
  if(toshiLayer){
    map.removeLayer(toshiLayer);
    toshiLayer=null;
    btn.classList.remove('active');
  } else {
    toshiLayer=L.tileLayer(TOSHI_URL,{opacity:0.55,maxZoom:18,attribution:'国土交通省 用途地域'});
    toshiLayer.addTo(map);
    toshiLayer.bringToFront();
    btn.classList.add('active');
    showToast('用途地域を表示中（国土地理院）','success');
  }
}
// ── 土砂災害警戒区域ポリゴン（Supabase）──
var dosyaLayer=null;
var dosyaEnabled=false;
var dosyaRenderTimer=null;
function getDosyaStyle(phenomenon,areaType){
  var isSpecial=areaType==='特別警戒区域';
  var colorMap={'土石流':isSpecial?'#dc2626':'#f59e0b','急傾斜地の崩壊':isSpecial?'#9f1239':'#f97316','地すべり':isSpecial?'#7c3aed':'#84cc16'};
  var color=colorMap[phenomenon]||(isSpecial?'#dc2626':'#f59e0b');
  return{fillColor:color,fillOpacity:isSpecial?0.35:0.2,color:color,weight:isSpecial?2:1.5,opacity:0.9};
}
function toggleDosyaPolygon(){
  var btn=document.getElementById('hzSediment');
  dosyaEnabled=!dosyaEnabled;
  if(dosyaEnabled){
    btn.classList.add('active');
    loadDosya();
  } else {
    btn.classList.remove('active');
    if(dosyaLayer){map.removeLayer(dosyaLayer);dosyaLayer=null;}
    map.off('moveend',renderDosyaInView);
    map.off('zoomend',renderDosyaInView);
  }
}
function renderDosyaInView(){
  if(dosyaRenderTimer)clearTimeout(dosyaRenderTimer);
  dosyaRenderTimer=setTimeout(_doRenderDosya,300);
}
function _doRenderDosya(){
  if(!dosyaEnabled)return;
  if(map.getZoom()<12){
    if(dosyaLayer){map.removeLayer(dosyaLayer);dosyaLayer=null;}
    showToast('ズーム12以上で土砂警戒ポリゴンが表示されます','error');
    return;
  }
  _fetchAndRenderDosya();
}
async function _fetchAndRenderDosya(){
  try{
    var b=map.getBounds().pad(0.05);
    var res=await db.rpc('get_dosya_in_bbox',{lat_min:b.getSouth(),lat_max:b.getNorth(),lng_min:b.getWest(),lng_max:b.getEast(),row_limit:300});
    if(res.error||!res.data||!res.data.length)return;
    if(dosyaLayer){map.removeLayer(dosyaLayer);dosyaLayer=null;}
    var features=res.data.map(function(row){return{type:'Feature',geometry:row.geojson,properties:{area_name:row.area_name,phenomenon:row.phenomenon,area_type:row.area_type,city_name:row.city_name,area_code:row.area_code}};});
    dosyaLayer=L.geoJSON({type:'FeatureCollection',features:features},{
      style:function(f){return getDosyaStyle(f.properties.phenomenon,f.properties.area_type);},
      onEachFeature:function(feature,layer){
        var p=feature.properties;
        var typeColor=p.area_type==='特別警戒区域'?'#dc2626':'#f59e0b';
        layer.on('click',function(e){
          L.popup({maxWidth:280,minWidth:220}).setLatLng(e.latlng).setContent(
            '<div style="padding:12px;font-family:sans-serif;">'+
            '<div style="font-size:13px;color:'+typeColor+';margin-bottom:8px;font-weight:700;">⚠️ 土砂災害'+p.area_type+'</div>'+
            '<div style="font-size:12px;margin-bottom:4px;"><b>現象：</b>'+(p.phenomenon||'—')+'</div>'+
            '<div style="font-size:12px;margin-bottom:4px;"><b>区域名：</b>'+(p.area_name||'—')+'</div>'+
            '<div style="font-size:12px;"><b>市区町村：</b>'+(p.city_name||'—')+'</div>'+
            '</div>'
          ).openOn(map);
        });
        layer.on('mouseover',function(){layer.setStyle({fillOpacity:0.55,weight:3});});
        layer.on('mouseout',function(){if(dosyaLayer)dosyaLayer.resetStyle(layer);});
      }
    }).addTo(map);
    dosyaLayer.bringToFront();
  }catch(e){showToast('土砂警戒ポリゴン取得エラー','error');}
}
function loadDosya(){
  map.on('moveend',renderDosyaInView);
  map.on('zoomend',renderDosyaInView);
  renderDosyaInView();
}
var noshinLayer=null;
var noshinLoading=false;
function toggleNoshin(){
  var btn=document.getElementById('hzNoshin');
  if(noshinLayer){
    map.removeLayer(noshinLayer);
    noshinLayer=null;
    btn.classList.remove('active');
    showToast('農振農用地を非表示にしました','success');
    return;
  }
  if(noshinLoading)return;
  noshinLoading=true;
  btn.classList.add('active');
  showToast('農振農用地データを読み込み中...','success');
  fetch(WORKER_BASE+'/r2/noshin_aichi.geojson')
    .then(function(r){return r.ok?r.json():Promise.reject('取得失敗');})
    .then(function(geojson){
      noshinLayer=L.geoJSON(geojson,{

function getTileVersion(){var d=new Date();return String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0');}
function decodePBFTile(buf){var pbf=new Pbf(new Uint8Array(buf));var layers={};pbf.readFields(function(tag,layers,pbf){if(tag===3){var layer={name:'',version:1,extent:4096,keys:[],values:[],features:[]};pbf.readMessage(readVTLayer,layer);if(layer.name)layers[layer.name]=layer;}},layers);return layers;}
function readVTLayer(tag,layer,pbf){if(tag===15)layer.version=pbf.readVarint();else if(tag===1)layer.name=pbf.readString();else if(tag===5)layer.extent=pbf.readVarint();else if(tag===3)layer.keys.push(pbf.readString());else if(tag===4){var v={};pbf.readMessage(readVTValue,v);layer.values.push(v);}else if(tag===2){var f={id:0,tags:[],type:0,geometry:[]};pbf.readMessage(readVTFeature,f);layer.features.push(f);}}
function readVTFeature(tag,f,pbf){if(tag===1)f.id=pbf.readVarint();else if(tag===2)f.tags=pbf.readPackedVarint();else if(tag===3)f.type=pbf.readVarint();else if(tag===4)f.geometry=pbf.readPackedVarint();}
function readVTValue(tag,v,pbf){if(tag===1)v.v=pbf.readString();else if(tag===2)v.v=pbf.readFloat();else if(tag===3)v.v=pbf.readDouble();else if(tag===4)v.v=pbf.readVarint(true);else if(tag===5)v.v=pbf.readVarint();else if(tag===6)v.v=pbf.readSVarint();else if(tag===7)v.v=pbf.readBoolean();}
function getVTProperties(feature,layer){var props={};for(var i=0;i+1<feature.tags.length;i+=2){var ki=feature.tags[i],vi=feature.tags[i+1];if(ki<layer.keys.length&&vi<layer.values.length)props[layer.keys[ki]]=layer.values[vi].v;}return props;}
function getPolygonCentroid(geometry,tileX,tileY,tileZ,extent){var x=0,y=0,sumX=0,sumY=0,count=0,i=0;while(i<geometry.length){var cmdInt=geometry[i++],cmd=cmdInt&7,len=cmdInt>>3;if(cmd===1||cmd===2){for(var j=0;j<len;j++){x+=(geometry[i]>>1)^-(geometry[i]&1);i++;y+=(geometry[i]>>1)^-(geometry[i]&1);i++;sumX+=x;sumY+=y;count++;}}else if(cmd===7){break;}else{i++;}}if(!count)return null;var tx=sumX/count,ty=sumY/count;var z2=Math.pow(2,tileZ);var lng=((tileX+tx/extent)/z2)*360-180;var n=Math.PI*(1-2*(tileY+ty/extent)/z2);var lat=180/Math.PI*Math.atan(Math.sinh(n));if(lat<30||lat>38||lng<130||lng>142)return null;return{lat:lat,lng:lng};}

}
async function loadDates(){var res=await db.from('farmland_snapshots').select('snapshot_date').order('snapshot_date',{ascending:true}).limit(10000);if(res.error){showToast('DB接続エラー: '+res.error.message,'error');return;}if(!res.data||res.data.length===0){return;}var seen={},dates=[];res.data.forEach(function(d){if(!seen[d.snapshot_date]){seen[d.snapshot_date]=true;dates.push(d.snapshot_date);}});dates.sort().reverse();var fe=document.getElementById('dateFrom'),te=document.getElementById('dateTo');fe.innerHTML='<option value="">基準日（前）</option>';te.innerHTML='<option value="">比較日（後）</option>';dates.forEach(function(d){fe.innerHTML+='<option value="'+d+'">'+d+'</option>';te.innerHTML+='<option value="'+d+'">'+d+'</option>';});if(dates.length>=2){fe.value=dates[1];te.value=dates[0];loadDiff();}else if(dates.length===1){te.value=dates[0];loadDiff();}}
async function loadDiff(){var dateFrom=document.getElementById('dateFrom').value;var dateTo=document.getElementById('dateTo').value;if(!dateTo)return;showLoading('差分データを取得中...');if(markersLayer){map.removeLayer(markersLayer);markersLayer=null;}document.getElementById('emptyState').style.display='none';try{var toRes=await db.from('farmland_snapshots').select('*').eq('snapshot_date',dateTo).limit(10000);var toData=(toRes.data||[]).filter(function(d){return d.intent!=='貸したい';});var fromIds={};if(dateFrom){var fRes=await db.from('farmland_snapshots').select('feature_id').eq('snapshot_date',dateFrom).limit(10000);(fRes.data||[]).forEach(function(d){fromIds[d.feature_id]=true;});}if(!toData.length){hideLoading();document.getElementById('emptyState').style.display='flex';return;}var newCount=0,removedCount=0,existingCount=0,markers=[];toData.forEach(function(item){if(!item.lat||!item.lng)return;if(dateFrom&&!fromIds[item.feature_id]){newCount++;markers.push({item:item,changeType:'new'});}else{existingCount++;}});if(dateFrom){var toIds={};toData.forEach(function(d){toIds[d.feature_id]=true;});var ffRes=await db.from('farmland_snapshots').select('*').eq('snapshot_date',dateFrom).limit(10000);var fromFiltered=(ffRes.data||[]).filter(function(d){return d.intent!=='貸したい';});fromFiltered.forEach(function(item){if(!item.lat||!item.lng)return;if(!toIds[item.feature_id]){removedCount++;markers.push({item:item,changeType:'removed'});}});}var shown=0;toData.forEach(function(item){if(!item.lat||!item.lng)return;if(dateFrom&&!fromIds[item.feature_id])return;if(shown>=1000)return;markers.push({item:item,changeType:'existing'});shown++;});document.getElementById('statNew').textContent=newCount;document.getElementById('statRemoved').textContent=removedCount;document.getElementById('statExisting').textContent=dateFrom?existingCount:toData.length;var lm=markers.map(function(m){var c=m.changeType==='new'?'#3fb950':m.changeType==='removed'?'#f85149':'#4a9eff';var sz=m.changeType==='existing'?4:11;var op=m.changeType==='existing'?0.7:0.95;var bc=m.changeType==='existing'?'#a855f7':'#fff';var mk=L.circleMarker([m.item.lat,m.item.lng],{radius:sz,fillColor:c,color:bc,weight:2,fillOpacity:op});var lbl=m.changeType==='new'?'新規':m.changeType==='removed'?'削除':'既存';mk.bindTooltip('<b>'+lbl+'</b> '+(m.item.city||''),{direction:'top',permanent:false,opacity:0.95,className:'farmland-tooltip'});mk.on('click',function(){showDetail(m.item,m.changeType);});return mk;});markersLayer=L.layerGroup(lm).addTo(map);var imp=markers.filter(function(m){return m.changeType!=='existing';});if(imp.length){var b=L.latLngBounds(imp.map(function(m){return[m.item.lat,m.item.lng];}));map.fitBounds(b,{padding:[40,40]});}else if(markers.length){var b2=L.latLngBounds(markers.map(function(m){return[m.item.lat,m.item.lng];}));map.fitBounds(b2,{padding:[40,40]});}hideLoading();if(newCount===0&&removedCount===0&&dateFrom)showToast('変更はありませんでした','success');else if(newCount>0||removedCount>0)showToast('新規 '+newCount+'件 / 削除 '+removedCount+'件 の変更を検出しました','success');}catch(e){hideLoading();showToast('エラー: '+e.message,'error');}}

async function triggerManualCollection(){
  if(typeof Pbf==='undefined'){showToast('PBFライブラリ未読み込み - ページを再読み込みしてください','error');return;}
  var ping=await db.from('farmland_snapshots').select('id').limit(1);
  if(ping.error){showToast('DB接続失敗: '+ping.error.message,'error');return;}
  showLoading('農地タイルをスキャン中...');
  try{
    var today=new Date().toISOString().split('T')[0];
    var chk=await db.from('farmland_snapshots').select('id').eq('snapshot_date',today).limit(1);
    if(chk.data&&chk.data.length>0){hideLoading();showToast('今日のデータはすでに取得済みです','success');await loadDates();return;}
    var ver=getTileVersion();
    var records=[],featureSeen={};
    var totalTiles=0,nonEmpty=0,totalFeatures=0;
    for(var ci=0;ci<CITIES.length;ci++){
      var city=CITIES[ci];
      var cityCount=0;
      document.getElementById('loadingText').textContent=city.name+' ('+(ci+1)+'/'+CITIES.length+')';
      for(var tx=city.xMin;tx<=city.xMax;tx++){
        for(var ty=city.yMin;ty<=city.yMax;ty++){
          totalTiles++;
          try{
            var url=WORKER_BASE+'/farmland/matching/aic/map/'+city.slug+'/tiles/'+ZOOM+'/'+tx+'/'+ty+'.pbf?v='+ver;
            var r=await fetch(url);
            if(!r.ok)continue;
            var buf=await r.arrayBuffer();
            if(buf.byteLength<30)continue;
            nonEmpty++;
            var layers=decodePBFTile(buf);
            for(var layerName in layers){
              var layer=layers[layerName];
              for(var fi=0;fi<layer.features.length;fi++){
                var feature=layer.features[fi];
                if(feature.type!==3)continue;
                var props=getVTProperties(feature,layer);
                var iko=props['出手意向'];
                if(!iko||iko===''||iko==='null')continue;
                if(iko==='貸したい')continue;
                var fid=city.slug+'_'+tx+'_'+ty+'_'+fi;
                if(featureSeen[fid])continue;
                featureSeen[fid]=true;
                var centroid=getPolygonCentroid(feature.geometry,tx,ty,ZOOM,layer.extent);
                if(!centroid)continue;
                var addr=String(props['農地所在地']||props['筆在キー']||'').replace(/^[0-9]+\//,'').replace(/\/$/,'');
                var chimoku=String(props['申請地目など']||props['地目']||'');
                var kousa=String(props['耕作状況']||'');
                var menseki=parseFloat(props['登記面積']||props['出手農地数']||props['面積']||0)||null;
                var uri=String(props['出手売却金額']||'');
                var chintai=String(props['出手賃金額']||'');
                records.push({feature_id:fid,city:city.name,address:addr,area_sqm:menseki,intent:String(iko),price:uri,registered_date:chimoku+'|'+kousa+'||'+chintai,lat:centroid.lat,lng:centroid.lng,snapshot_date:today,status:'active'});
                cityCount++;totalFeatures++;
              }
            }
          }catch(e2){}
        }
      }
      if(cityCount>0)showDebug(city.name+': '+cityCount);
    }
    showDebug('合計: '+totalTiles+' / 非空: '+nonEmpty+' / 農地: '+totalFeatures);
    if(!records.length){hideLoading();showToast('データが見つかりませんでした','error');return;}
    var saved=0;
    for(var si=0;si<records.length;si+=100){
      var batch=records.slice(si,si+100);
      var ins=await db.from('farmland_snapshots').insert(batch);
      if(ins.error)showDebug('ERR:'+JSON.stringify(ins.error));
      else saved+=batch.length;
    }
    hideLoading();
    showToast(saved+'件保存完了','success');
    await loadDates();
  }catch(e){hideLoading();showToast('ERR:'+e.message,'error');showDebug('EX:'+e.message);}
}
function showLoading(t){document.getElementById('loadingText').textContent=t;document.getElementById('loadingOverlay').style.display='flex';}
function hideLoading(){document.getElementById('loadingOverlay').style.display='none';}
function showToast(msg,type){var c=document.getElementById('toastContainer'),t=document.createElement('div');t.className='toast '+(type||'success');t.textContent=msg;c.appendChild(t);setTimeout(function(){if(t.parentNode)t.parentNode.removeChild(t);},6000);}
function showDebug(msg){var el=document.getElementById('debugPanel');if(!el){el=document.createElement('div');el.id='debugPanel';el.style.cssText='position:fixed;top:60px;left:50%;transform:translateX(-50%);z-index:9999;background:#1c2333;border:2px solid #f0b429;border-radius:10px;padding:16px 24px;max-width:700px;width:90%;font-family:monospace;font-size:12px;color:#e6edf3;white-space:pre-wrap;max-height:400px;overflow-y:auto;';el.innerHTML='<button onclick="this.parentElement.remove()" style="float:right;background:#f85149;border:none;color:#fff;border-radius:4px;padding:2px 8px;cursor:pointer;">X</button><div id="debugLog"></div>';document.body.appendChild(el);}document.getElementById('debugLog').textContent+=new Date().toLocaleTimeString()+' '+msg+'\n';}

var _searchTimer=null;

  if(q.length<2){res.style.display='none';return;}

async function _searchChiban(q,res){
  var parts=q.replace(/\u3000/g,' ').split(' ').filter(function(t){return t.length>0;});
  var chibanToken=parts.find(function(t){return /^[0-9\-]+$/.test(t);});
  var nameTokens=parts.filter(function(t){return !/^[0-9\-]+$/.test(t);});
  var query=db.from('chiban_index').select('city_name,oaza,koaza,chiban,lat,lng');
  if(chibanToken)query=query.eq('chiban',chibanToken);
  nameTokens.forEach(function(t){query=query.or('city_name.ilike.%'+t+'%,oaza.ilike.%'+t+'%,koaza.ilike.%'+t+'%');});
  var result=await query.limit(10);
  if(!result.data||!result.data.length){res.style.display='none';return;}
  res.innerHTML=result.data.map(function(r){
    var label=[r.city_name,r.oaza,r.koaza,r.chiban].filter(Boolean).join(' ');
    return '<div class="chiban-result-item" onmousedown="jumpToChiban('+r.lat+','+r.lng+',\''+label.replace(/'/g,"\\'")+'\')">&#128205; '+label+'</div>';
  }).join('');
  res.style.display='block';
}
function jumpToChiban(lat,lng,label){
  map.setView([lat,lng],17);
  L.popup({maxWidth:260}).setLatLng([lat,lng]).setContent('<div style="padding:10px;font-size:12px">&#128205; '+label+'</div>').openOn(map);
  document.getElementById('chibanResults').style.display='none';
  document.getElementById('chibanInput').value=label;
}
