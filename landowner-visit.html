<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>地権者訪問マップ | SOLAR LAND MGR</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2333;
    --border: #30363d;
    --accent: #f0b429;
    --green: #3fb950;
    --blue: #58a6ff;
    --red: #f85149;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --font-main: 'Zen Kaku Gothic New', sans-serif;
    --font-mono: 'Share Tech Mono', monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: var(--font-main); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 20px; height: 52px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; z-index: 1000; }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .logo { display: flex; align-items: center; gap: 8px; text-decoration: none; color: var(--text); }
  .logo-icon { width: 28px; height: 28px; background: linear-gradient(135deg, #f0b429, #e85d04); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 14px; }
  .logo-text { font-size: 14px; font-weight: 700; }
  .page-title { font-size: 13px; color: var(--text-muted); display: flex; align-items: center; gap: 6px; }
  .page-title::before { content: '/'; color: var(--border); }
  .phase-badge { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; }
  .phase-plan { background: rgba(88,166,255,0.15); color: var(--blue); border: 1px solid rgba(88,166,255,0.3); }
  .phase-visit { background: rgba(240,180,41,0.15); color: var(--accent); border: 1px solid rgba(240,180,41,0.3); }
  .legend { display: flex; align-items: center; gap: 12px; font-size: 11px; color: var(--text-muted); }
  .legend-item { display: flex; align-items: center; gap: 4px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
  .btn { padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border); font-family: var(--font-main); font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.15s; }
  .btn-ghost { background: none; color: var(--text-muted); }
  .btn-ghost:hover { background: var(--surface2); color: var(--text); }
  .btn-primary { background: var(--accent); color: #000; border-color: var(--accent); }
  .btn-primary:hover { background: #e0a820; }
  .btn-danger { background: var(--red); color: #fff; border-color: var(--red); }

  .map-wrapper { flex: 1; position: relative; overflow: hidden; }
  #map { width: 100%; height: 100%; }

  .control-panel { position: absolute; top: 12px; left: 12px; z-index: 500; display: flex; flex-direction: column; gap: 8px; }
  .stat-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 6px 14px; font-size: 12px; display: flex; align-items: center; gap: 6px; white-space: nowrap; }
  .stat-pill-dot { width: 8px; height: 8px; border-radius: 50%; }
  .action-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px; display: flex; flex-direction: column; gap: 8px; min-width: 200px; }
  .action-panel-title { font-size: 11px; font-weight: 700; color: var(--text-muted); letter-spacing: .08em; text-transform: uppercase; margin-bottom: 2px; }

  .layer-control { position: absolute; top: 12px; right: 12px; z-index: 500; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; display: flex; flex-direction: column; gap: 8px; min-width: 160px; }
  .layer-title { font-size: 10px; font-weight: 700; color: var(--text-muted); letter-spacing: .08em; text-transform: uppercase; }
  .layer-item { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text); cursor: pointer; }
  .layer-item input[type=checkbox] { accent-color: var(--blue); }

  .leaflet-popup-content-wrapper { background: var(--surface) !important; border: 1px solid var(--border) !important; border-radius: 10px !important; color: var(--text) !important; box-shadow: 0 8px 32px rgba(0,0,0,0.5) !important; padding: 0 !important; min-width: 260px; }
  .leaflet-popup-tip { background: var(--surface) !important; }
  .leaflet-popup-content { margin: 0 !important; }

  .popup-body { padding: 14px; font-family: var(--font-main); }
  .popup-name { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 6px; display: flex; align-items: center; justify-content: space-between; }
  .popup-case-no { font-family: var(--font-mono); font-size: 11px; color: var(--accent); }
  .popup-info { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
  .popup-row { display: flex; gap: 8px; font-size: 12px; }
  .popup-label { color: var(--text-muted); min-width: 56px; flex-shrink: 0; }
  .popup-value { color: var(--text); }
  .popup-divider { border: none; border-top: 1px solid var(--border); margin: 8px 0; }
  .popup-actions { display: flex; gap: 6px; flex-wrap: wrap; }
  .popup-btn { flex: 1; padding: 7px 8px; border-radius: 6px; border: 1px solid var(--border); background: none; color: var(--text); font-family: var(--font-main); font-size: 11px; font-weight: 500; cursor: pointer; transition: all 0.15s; text-align: center; min-width: 80px; }
  .popup-btn:hover { background: var(--surface2); }
  .popup-btn.select-btn { border-color: var(--blue); color: var(--blue); }
  .popup-btn.select-btn:hover { background: rgba(88,166,255,0.1); }
  .popup-btn.selected-btn { background: rgba(240,180,41,0.15); border-color: var(--accent); color: var(--accent); }
  .popup-btn.nav-btn { background: var(--green); border-color: var(--green); color: #fff; font-weight: 700; }
  .popup-btn.complete-btn { background: var(--red); border-color: var(--red); color: #fff; }
  .popup-btn.completed-btn { background: rgba(248,81,73,0.1); border-color: var(--red); color: var(--red); cursor: default; }

  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); backdrop-filter: blur(4px); z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 20px; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; width: 100%; max-width: 480px; transform: scale(0.95); transition: transform 0.2s; }
  .modal-overlay.open .modal { transform: scale(1); }
  .modal-header { padding: 16px 20px 12px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .modal-title { font-size: 15px; font-weight: 700; }
  .modal-subtitle { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .modal-close { background: none; border: none; color: var(--text-muted); font-size: 18px; cursor: pointer; padding: 4px; border-radius: 4px; }
  .modal-close:hover { background: var(--surface2); color: var(--text); }
  .modal-body { padding: 16px 20px; }
  .modal-footer { padding: 12px 20px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
  .form-label { font-size: 11px; font-weight: 700; color: var(--text-muted); letter-spacing: .06em; text-transform: uppercase; }
  .form-input, .form-textarea { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 9px 12px; color: var(--text); font-family: var(--font-main); font-size: 13px; transition: border-color 0.2s; }
  .form-input:focus, .form-textarea:focus { outline: none; border-color: var(--blue); }
  .form-textarea { resize: vertical; min-height: 80px; }

  .side-panel { position: absolute; top: 0; right: 0; width: 280px; height: 100%; background: var(--surface); border-left: 1px solid var(--border); z-index: 600; transform: translateX(100%); transition: transform 0.3s ease; display: flex; flex-direction: column; }
  .side-panel.open { transform: translateX(0); }
  .side-panel-header { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: var(--surface); }
  .side-panel-title { font-size: 13px; font-weight: 700; }
  .plan-list { flex: 1; overflow-y: auto; padding: 10px; }
  .plan-item { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; margin-bottom: 8px; border-left: 3px solid var(--blue); }
  .plan-item.visited { border-left-color: var(--red); opacity: 0.6; }
  .plan-item-name { font-size: 13px; font-weight: 600; }
  .plan-item-case { font-family: var(--font-mono); font-size: 10px; color: var(--accent); margin-top: 2px; }
  .plan-item-address { font-size: 11px; color: var(--text-muted); margin-top: 3px; }

  .toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 3000; display: flex; flex-direction: column; gap: 8px; }
  .toast { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 11px 16px; font-size: 13px; min-width: 220px; animation: slideIn 0.3s ease; display: flex; align-items: center; gap: 8px; }
  .toast.success { border-left: 3px solid var(--green); }
  .toast.error { border-left: 3px solid var(--red); }
  @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
</style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <a class="logo" href="index.html">
      <div class="logo-icon">☀️</div>
      <span class="logo-text">SOLAR LAND MGR</span>
    </a>
    <span class="page-title">🚗 地権者訪問マップ</span>
    <span class="phase-badge phase-plan" id="phaseBadge">📋 訪問計画モード</span>
  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#58a6ff"></div><span>未選択</span></div>
    <div class="legend-item"><div class="legend-dot" style="background:#f0b429"></div><span>訪問予定</span></div>
    <div class="legend-item"><div class="legend-dot" style="background:#f85149"></div><span>訪問済</span></div>
    <button class="btn btn-ghost" onclick="location.href='index.html'">← 案件一覧</button>
  </div>
</header>

<div class="map-wrapper">
  <div id="map"></div>

  <div class="control-panel">
    <div class="stat-pill"><div class="stat-pill-dot" style="background:var(--blue)"></div>全 <span id="statTotal">—</span> 件</div>
    <div class="stat-pill"><div class="stat-pill-dot" style="background:var(--accent)"></div>訪問予定 <span id="statPlan">0</span> 件</div>
    <div class="stat-pill"><div class="stat-pill-dot" style="background:var(--red)"></div>訪問済 <span id="statDone">0</span> 件</div>

    <div class="action-panel" id="planPanel">
      <div class="action-panel-title">訪問計画モード</div>
      <div style="font-size:11px;color:var(--text-muted);line-height:1.6">フラグをクリックして<br>訪問予定を選択してください</div>
      <button class="btn btn-primary" onclick="startVisitMode()" id="startBtn" disabled>🚗 訪問開始</button>
      <button class="btn btn-ghost" style="font-size:11px" onclick="togglePlanList()">📋 予定リスト</button>
    </div>

    <div class="action-panel" id="visitPanel" style="display:none">
      <div class="action-panel-title">訪問実行モード</div>
      <div style="font-size:11px;color:var(--text-muted);line-height:1.6">フラグをクリックして<br>ナビを起動してください</div>
      <button class="btn btn-ghost" style="font-size:11px" onclick="togglePlanList()">📋 予定リスト</button>
      <button class="btn btn-ghost" style="font-size:11px;color:var(--red);border-color:var(--red)" onclick="resetPlan()">🔄 計画をリセット</button>
    </div>
  </div>

  <div class="layer-control">
    <div class="layer-title">地図レイヤー</div>
    <label class="layer-item"><input type="checkbox" id="layerGsi" onchange="toggleLayer('gsi',this.checked)"> GSI 航空写真</label>
    <label class="layer-item"><input type="checkbox" id="layerHazard" onchange="toggleLayer('hazard',this.checked)"> ハザードマップ</label>
  </div>

  <div class="side-panel" id="sidePanel">
    <div class="side-panel-header">
      <span class="side-panel-title">📋 訪問予定リスト</span>
      <button class="modal-close" onclick="togglePlanList()">✕</button>
    </div>
    <div class="plan-list" id="planList"><div style="color:var(--text-muted);font-size:12px;padding:10px">訪問予定がありません</div></div>
  </div>
</div>

<div class="modal-overlay" id="visitModal">
  <div class="modal">
    <div class="modal-header">
      <div>
        <div class="modal-title">✅ 訪問完了・商談記録</div>
        <div class="modal-subtitle" id="visitModalInfo"></div>
      </div>
      <button class="modal-close" onclick="closeModal('visitModal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">訪問日</label>
        <input class="form-input" type="date" id="visitDate">
      </div>
      <div class="form-group">
        <label class="form-label">商談内容</label>
        <textarea class="form-textarea" id="visitContent" placeholder="訪問結果・地権者の反応・次回アクションなど..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('visitModal')">キャンセル</button>
      <button class="btn btn-danger" onclick="saveVisit()">訪問完了・フラグを赤に変更</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
const SUPABASE_URL = 'https://fygnrjjifoasozbhkxlk.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ5Z25yamppZm9hc296YmhreGxrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2MDYzNTEsImV4cCI6MjA5MDE4MjM1MX0.A1fAMcu7wGBBP4xHUKkrExIuy7MFbmarAtLQahwZiso';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

let map, gsiLayer, hazardLayer;
let markers = {};
let planSet = new Set();
let visitMode = false;
let currentVisitCaseId = null;
let currentLandownerId = null;

function initMap() {
  map = L.map('map', { zoomControl: true }).setView([36.2048, 138.2529], 6);
  L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/std/{z}/{x}/{y}.png', { attribution: '© 国土地理院', maxZoom: 18 }).addTo(map);
  gsiLayer = L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/seamlessphoto/{z}/{x}/{y}.jpg', { attribution: '© 国土地理院', maxZoom: 18, opacity: 0.85 });
  hazardLayer = L.tileLayer('https://disaportaldata.gsi.go.jp/rastertile/suibouzoneL2color/{z}/{x}/{y}.png', { attribution: '© 国土地理院', maxZoom: 17, minZoom: 10, opacity: 0.7, errorTileUrl: '' });
}

function toggleLayer(type, enabled) {
  if (type === 'gsi') { enabled ? gsiLayer.addTo(map) : map.removeLayer(gsiLayer); }
  else if (type === 'hazard') { enabled ? hazardLayer.addTo(map) : map.removeLayer(hazardLayer); }
}

async function loadData() {
  const { data: los } = await db.from('landowner_info').select('*, cases(id, case_no, status)');
  const { data: visits } = await db.from('visit_status').select('*');
  if (!los) return;

  let total = 0, done = 0;
  los.forEach(lo => {
    if (!lo.lat || !lo.lng) return;
    total++;
    const caseId = lo.case_id;
    const visit = visits?.find(v => v.case_id === caseId);
    const isVisited = visit?.visited || false;
    if (isVisited) done++;
    const color = isVisited ? '#f85149' : '#58a6ff';
    const icon = L.divIcon({ html: makeIconHtml(color), className: '', iconSize: [24,24], iconAnchor: [12,24], popupAnchor: [0,-26] });
    const marker = L.marker([lo.lat, lo.lng], { icon });
    marker.bindPopup(buildPopup(lo, caseId, isVisited, false), { maxWidth: 280, minWidth: 260 });
    marker.addTo(map);
    markers[caseId] = { marker, lo, visit, isVisited };
  });

  document.getElementById('statTotal').textContent = total;
  document.getElementById('statDone').textContent = done;
}

function makeIconHtml(color) {
  return `<div style="width:24px;height:24px;background:${color};border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:2px solid rgba(0,0,0,0.3);box-shadow:0 2px 6px rgba(0,0,0,0.4)"></div>`;
}

function buildPopup(lo, caseId, isVisited, isPlanned) {
  const d = markers[caseId];
  const visitedAt = d?.visit?.visited_at ? new Date(d.visit.visited_at).toLocaleDateString('ja-JP') : null;
  let actionHtml = '';
  if (isVisited) {
    actionHtml = `<button class="popup-btn completed-btn">✓ 訪問済み（${visitedAt || ''}）</button>`;
  } else if (visitMode) {
    actionHtml = `
      <button class="popup-btn nav-btn" onclick="startNav('${caseId}')">🗺 ナビ開始</button>
      <button class="popup-btn complete-btn" onclick="openVisitModal('${caseId}')">✅ 完了</button>
    `;
  } else {
    if (planSet.has(caseId)) {
      actionHtml = `<button class="popup-btn selected-btn" onclick="removePlan('${caseId}')">✓ 予定済（クリックで解除）</button>`;
    } else {
      actionHtml = `<button class="popup-btn select-btn" onclick="addPlan('${caseId}')">＋ 訪問予定に追加</button>`;
    }
  }

  return `
    <div class="popup-body">
      <div class="popup-name">
        <span>${lo.name || '（氏名未登録）'}</span>
        <span class="popup-case-no">${lo.cases?.case_no || ''}</span>
      </div>
      <div class="popup-info">
        <div class="popup-row"><span class="popup-label">住所</span><span class="popup-value">${lo.address || '—'}</span></div>
        <div class="popup-row"><span class="popup-label">電話</span><span class="popup-value">${lo.tel || '—'}</span></div>
        <div class="popup-row"><span class="popup-label">価格</span><span class="popup-value">${lo.price ? Number(lo.price).toLocaleString() + ' 万円' : '—'}</span></div>
      </div>
      <hr class="popup-divider">
      <div class="popup-actions">${actionHtml}</div>
    </div>
  `;
}

function addPlan(caseId) {
  planSet.add(caseId);
  updateMarkerColor(caseId, '#f0b429');
  const d = markers[caseId];
  if (d) d.marker.setPopupContent(buildPopup(d.lo, caseId, false, true));
  updatePlanUI();
  map.closePopup();
  showToast('訪問予定に追加しました', 'success');
}

function removePlan(caseId) {
  planSet.delete(caseId);
  updateMarkerColor(caseId, '#58a6ff');
  const d = markers[caseId];
  if (d) d.marker.setPopupContent(buildPopup(d.lo, caseId, false, false));
  updatePlanUI();
  map.closePopup();
  showToast('訪問予定から解除しました', 'success');
}

function updateMarkerColor(caseId, color) {
  const d = markers[caseId];
  if (!d) return;
  d.marker.setIcon(L.divIcon({ html: makeIconHtml(color), className: '', iconSize: [24,24], iconAnchor: [12,24], popupAnchor: [0,-26] }));
}

function updatePlanUI() {
  const count = planSet.size;
  document.getElementById('statPlan').textContent = count;
  document.getElementById('startBtn').disabled = count === 0;
  renderPlanList();
}

function renderPlanList() {
  const el = document.getElementById('planList');
  if (planSet.size === 0) { el.innerHTML = '<div style="color:var(--text-muted);font-size:12px;padding:10px">訪問予定がありません</div>'; return; }
  el.innerHTML = [...planSet].map(caseId => {
    const d = markers[caseId];
    const lo = d?.lo;
    return `<div class="plan-item ${d?.isVisited ? 'visited' : ''}">
      <div class="plan-item-name">${lo?.name || '（氏名未登録）'} ${d?.isVisited ? '✓' : ''}</div>
      <div class="plan-item-case">${lo?.cases?.case_no || ''}</div>
      <div class="plan-item-address">${lo?.address || ''}</div>
    </div>`;
  }).join('');
}

function startVisitMode() {
  visitMode = true;
  Object.keys(markers).forEach(caseId => {
    const d = markers[caseId];
    if (!planSet.has(caseId) && !d.isVisited) map.removeLayer(d.marker);
    else if (planSet.has(caseId) && !d.isVisited) d.marker.setPopupContent(buildPopup(d.lo, caseId, false, false));
  });
  document.getElementById('planPanel').style.display = 'none';
  document.getElementById('visitPanel').style.display = 'flex';
  document.getElementById('phaseBadge').textContent = '🚗 訪問実行モード';
  document.getElementById('phaseBadge').className = 'phase-badge phase-visit';
  showToast('訪問実行モードに切り替えました', 'success');
  document.getElementById('sidePanel').classList.remove('open');
}

function startNav(caseId) {
  const d = markers[caseId];
  if (!d?.lo?.lat) return;
  window.open(`https://www.google.com/maps/dir/?api=1&destination=${d.lo.lat},${d.lo.lng}&travelmode=driving`, '_blank');
}

async function openVisitModal(caseId) {
  currentVisitCaseId = caseId;
  const d = markers[caseId];
  const lo = d?.lo;
  document.getElementById('visitModalInfo').textContent = `${lo?.cases?.case_no || ''} ${lo?.name || ''}`;
  document.getElementById('visitDate').value = new Date().toISOString().split('T')[0];
  document.getElementById('visitContent').value = '';
  currentLandownerId = lo?.id || null;
  document.getElementById('visitModal').classList.add('open');
  map.closePopup();
}

async function saveVisit() {
  const date = document.getElementById('visitDate').value;
  const content = document.getElementById('visitContent').value.trim();
  if (!date || !content) { showToast('日付と商談内容を入力してください', 'error'); return; }
  const caseId = currentVisitCaseId;

  if (currentLandownerId) {
    await db.from('negotiation_logs').insert({ landowner_id: currentLandownerId, log_date: date, content });
  }

  const { data: existing } = await db.from('visit_status').select('id').eq('case_id', caseId).single();
  const payload = { visited: true, visited_at: new Date().toISOString(), flag_color: 'red' };
  if (existing) { await db.from('visit_status').update(payload).eq('case_id', caseId); }
  else { await db.from('visit_status').insert({ case_id: caseId, ...payload }); }

  updateMarkerColor(caseId, '#f85149');
  const d = markers[caseId];
  if (d) {
    d.isVisited = true;
    d.visit = { visited: true, visited_at: new Date().toISOString() };
    d.marker.setPopupContent(buildPopup(d.lo, caseId, true, false));
  }

  document.getElementById('statDone').textContent = parseInt(document.getElementById('statDone').textContent) + 1;
  renderPlanList();
  showToast('訪問完了を記録しました', 'success');
  closeModal('visitModal');
}

function resetPlan() {
  if (!confirm('訪問計画をリセットして計画モードに戻りますか？')) return;
  visitMode = false;
  planSet.clear();
  Object.keys(markers).forEach(caseId => {
    const d = markers[caseId];
    const color = d.isVisited ? '#f85149' : '#58a6ff';
    updateMarkerColor(caseId, color);
    if (!map.hasLayer(d.marker)) d.marker.addTo(map);
    d.marker.setPopupContent(buildPopup(d.lo, caseId, d.isVisited, false));
  });
  document.getElementById('planPanel').style.display = 'flex';
  document.getElementById('visitPanel').style.display = 'none';
  document.getElementById('phaseBadge').textContent = '📋 訪問計画モード';
  document.getElementById('phaseBadge').className = 'phase-badge phase-plan';
  updatePlanUI();
}

function togglePlanList() { document.getElementById('sidePanel').classList.toggle('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-overlay').forEach(o => { o.addEventListener('click', e => { if (e.target === o) o.classList.remove('open'); }); });

function showToast(msg, type = 'success') {
  const c = document.getElementById('toastContainer');
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.innerHTML = `<span>${type === 'success' ? '✓' : '✕'}</span><span>${msg}</span>`;
  c.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

initMap();
loadData();
</script>
