<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>📝 手紙・宛名ラベル作成 | SOLAR LAND MGR</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#0d1117;--surface:#161b22;--surface2:#1c2129;--border:#30363d;
  --text:#e6edf3;--text-muted:#8b949e;--accent:#a371f7;--blue:#58a6ff;
  --green:#3fb950;--yellow:#f0b429;--red:#f85149;--orange:#fd7e14;
  --font-main:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;
  --font-mincho:"Yu Mincho","YuMincho","Hiragino Mincho ProN","MS Mincho",serif;
  --font-mono:ui-monospace,SFMono-Regular,Menlo,monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font-main);background:var(--bg);color:var(--text);font-size:14px;min-height:100vh;}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.header-title{display:flex;align-items:center;gap:12px;font-weight:700;font-size:16px;}
.header-actions{display:flex;gap:8px;}
.btn{padding:8px 16px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text);cursor:pointer;font-size:13px;font-family:var(--font-main);transition:all .15s;white-space:nowrap;}
.btn:hover{background:#272d36;}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff;}
.btn-primary:hover{background:#8b5cf6;}
.btn-ghost{background:transparent;}
.btn-success{background:var(--green);border-color:var(--green);color:#fff;}
.btn-success:hover{background:#2ea043;}
.btn-danger{background:rgba(248,81,73,.15);border-color:rgba(248,81,73,.4);color:var(--red);}
.tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;}
.tab{padding:14px 24px;cursor:pointer;border:none;background:transparent;color:var(--text-muted);font-size:14px;font-weight:500;border-bottom:3px solid transparent;transition:all .15s;font-family:var(--font-main);}
.tab:hover{color:var(--text);}
.tab.active{color:var(--text);border-bottom-color:var(--accent);}
.layout{display:grid;grid-template-columns:380px 1fr;min-height:calc(100vh - 110px);}
.sidebar{background:var(--surface);border-right:1px solid var(--border);padding:16px;overflow-y:auto;max-height:calc(100vh - 110px);position:sticky;top:110px;}
.main{padding:24px;overflow-y:auto;background:var(--bg);}
.section{margin-bottom:20px;}
.section-title{font-size:12px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;}
.form-group{margin-bottom:10px;}
.form-label{display:block;font-size:12px;color:var(--text-muted);margin-bottom:4px;}
.form-input,.form-textarea,.form-select{width:100%;padding:8px 10px;border:1px solid var(--border);background:var(--surface2);color:var(--text);border-radius:6px;font-size:13px;font-family:var(--font-main);}
.form-input:focus,.form-textarea:focus,.form-select:focus{outline:none;border-color:var(--accent);}
.form-textarea{resize:vertical;min-height:120px;font-family:var(--font-mono);font-size:12px;line-height:1.5;}
.landowner-list{border:1px solid var(--border);border-radius:6px;background:var(--surface2);max-height:320px;overflow-y:auto;}
.landowner-item{padding:6px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;cursor:pointer;font-size:12px;}
.landowner-item:last-child{border-bottom:none;}
.landowner-item:hover{background:#272d36;}
.landowner-item input[type="checkbox"]{cursor:pointer;width:14px;height:14px;}
.landowner-item .case-no{color:var(--accent);font-weight:600;min-width:70px;font-family:var(--font-mono);font-size:11px;}
.landowner-item .lo-name{flex:1;font-weight:500;}
.landowner-item .lo-meta{color:var(--text-muted);font-size:10px;}
.landowner-item.missing-addr{opacity:.5;}
.landowner-item.missing-addr .lo-meta{color:var(--red);}
.select-all-bar{display:flex;gap:8px;align-items:center;padding:8px 10px;background:var(--surface2);border:1px solid var(--border);border-bottom:none;border-radius:6px 6px 0 0;font-size:12px;}
.select-all-bar label{display:flex;align-items:center;gap:4px;cursor:pointer;}
.count-badge{background:var(--accent);color:#fff;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;margin-left:auto;}
.filter-row{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px;}
.preview-area{background:#fff;color:#000;border-radius:8px;box-shadow:0 4px 12px rgba(0,0,0,.3);min-height:400px;}
.preview-toolbar{background:var(--surface);padding:10px 16px;border-radius:8px;margin-bottom:16px;display:flex;gap:8px;align-items:center;justify-content:space-between;}
.preview-toolbar .info{font-size:12px;color:var(--text-muted);}
.empty-preview{padding:60px 20px;text-align:center;color:var(--text-muted);}
.empty-preview-icon{font-size:48px;margin-bottom:16px;}

/* 手紙レイアウト */
.letter-sheet{width:210mm;min-height:297mm;padding:20mm 25mm;margin:0 auto 16px;background:#fff;color:#000;font-family:var(--font-mincho);font-size:11pt;line-height:1.8;page-break-after:always;box-shadow:0 2px 8px rgba(0,0,0,.2);}
.letter-sheet:last-child{page-break-after:auto;}
.letter-date{text-align:right;margin-bottom:20mm;font-size:11pt;}
.letter-to{margin-bottom:20mm;}
.letter-to-postal{font-size:11pt;margin-bottom:4mm;font-family:var(--font-mono);letter-spacing:.5mm;}
.letter-to-addr{font-size:12pt;margin-bottom:4mm;}
.letter-to-name{font-size:16pt;font-weight:600;}
.letter-to-name .sama{font-size:14pt;margin-left:1em;font-weight:500;}
.letter-from{text-align:right;margin-bottom:18mm;font-size:10pt;line-height:1.6;}
.letter-from-line{display:block;}
.letter-title{text-align:center;font-size:14pt;font-weight:600;margin-bottom:15mm;}
.letter-body{font-size:11pt;line-height:2;white-space:pre-wrap;}
.letter-body .land-box{border:1pt solid #333;padding:5mm;margin:5mm 0;font-size:10.5pt;background:#f5f5f5;}
.letter-body .land-box ul{list-style:none;padding:0;margin:0;}
.letter-body .land-box li{padding:1mm 0;}
.letter-body .land-box li:before{content:"■ ";color:#333;}

/* 宛名ラベルレイアウト */
/* A-one 28645 (21面、63.5×38.1mm) */
.label-sheet{width:210mm;height:297mm;margin:0 auto 16px;background:#fff;padding:0;box-shadow:0 2px 8px rgba(0,0,0,.2);page-break-after:always;position:relative;}
.label-sheet:last-child{page-break-after:auto;}
.label-grid-21{display:grid;grid-template-columns:repeat(3,63.5mm);grid-template-rows:repeat(7,38.1mm);padding:21.2mm 7.2mm;column-gap:2.54mm;row-gap:0;}
/* A-one 28177 (12面、86.4×42.3mm) */
.label-grid-12{display:grid;grid-template-columns:repeat(2,86.4mm);grid-template-rows:repeat(6,42.3mm);padding:21.2mm 17mm;column-gap:3.2mm;row-gap:0;}
.label-item{padding:4mm 5mm;overflow:hidden;border:1px dashed #ccc;display:flex;flex-direction:column;justify-content:center;color:#000;font-family:"Yu Gothic","Hiragino Sans",sans-serif;box-sizing:border-box;}
.label-item.empty{border:1px dashed #eee;}
.label-postal{font-size:10pt;font-family:var(--font-mono);letter-spacing:.3mm;margin-bottom:1mm;color:#333;}
.label-addr{font-size:9pt;line-height:1.35;margin-bottom:2mm;}
.label-addr-2nd{font-size:8.5pt;color:#333;line-height:1.3;}
.label-name{font-size:12pt;font-weight:700;text-align:center;letter-spacing:2pt;}
.label-grid-12 .label-postal{font-size:11pt;}
.label-grid-12 .label-addr{font-size:10pt;}
.label-grid-12 .label-name{font-size:14pt;}

/* 印刷時スタイル */
@media print {
  @page{size:A4;margin:0;}
  body{background:#fff !important;margin:0;padding:0;}
  .header,.tabs,.sidebar,.preview-toolbar,.layout{all:unset;display:block;}
  .layout{display:block;}
  .main{padding:0;margin:0;background:#fff;}
  .letter-sheet,.label-sheet{box-shadow:none;margin:0;page-break-after:always;}
  .label-item{border:none !important;}
  .empty-preview{display:none;}
  .no-print{display:none !important;}
}

/* ツールチップ */
.placeholder-help{background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:8px 10px;font-size:11px;color:var(--text-muted);margin-top:4px;line-height:1.5;}
.placeholder-help code{background:rgba(163,113,247,.15);color:var(--accent);padding:1px 5px;border-radius:3px;font-family:var(--font-mono);}
.tab-content{display:none;}
.tab-content.active{display:block;}
.loading{text-align:center;color:var(--text-muted);padding:40px;}
.spinner{display:inline-block;width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.radio-group{display:flex;flex-direction:column;gap:6px;}
.radio-item{display:flex;align-items:center;gap:6px;cursor:pointer;font-size:12px;}
.template-select-bar{display:flex;gap:6px;margin-bottom:8px;}
.template-select-bar select{flex:1;}

.toast{position:fixed;bottom:20px;right:20px;background:var(--accent);color:#fff;padding:12px 20px;border-radius:6px;font-size:13px;box-shadow:0 4px 12px rgba(0,0,0,.3);z-index:1000;opacity:0;transform:translateY(10px);transition:all .2s;pointer-events:none;}
.toast.show{opacity:1;transform:translateY(0);}
.toast.error{background:var(--red);}
.toast.success{background:var(--green);}
</style>
</head>
<body>

<header class="header no-print">
  <div class="header-title">
    <button class="btn btn-ghost" onclick="location.href='index.html'">← 戻る</button>
    📝 手紙・宛名ラベル作成
  </div>
  <div class="header-actions">
    <span id="loadStatus" style="color:var(--text-muted);font-size:12px"></span>
  </div>
</header>

<div class="tabs no-print">
  <button class="tab active" onclick="switchTab('letter')" id="tabLetter">📬 手紙作成</button>
  <button class="tab" onclick="switchTab('label')" id="tabLabel">🏷️ 宛名ラベル</button>
</div>

<div class="layout">
  <!-- サイドバー -->
  <aside class="sidebar no-print">
    <!-- 地権者選択（両タブ共通） -->
    <div class="section">
      <div class="section-title">📍 地権者選択</div>
      <div class="filter-row">
        <select class="form-select" id="filterArea" onchange="renderLandownerList()">
          <option value="">すべてのエリア</option>
          <option>北海道</option><option>東北</option><option>関東</option><option>中部</option>
          <option>関西</option><option>中国</option><option>四国</option><option>九州</option>
        </select>
        <select class="form-select" id="filterStatus" onchange="renderLandownerList()">
          <option value="">全ステータス</option>
          <option>NOT VISITED</option><option>THINKING↑</option><option>THINKING→</option>
          <option>THINKING↓</option><option>OK</option><option>SUCCESS</option>
          <option>NON MEET</option><option>NG</option><option>UNKNOWN</option>
        </select>
      </div>
      <input class="form-input" type="text" placeholder="氏名・案件番号で絞込..." id="searchQ" oninput="renderLandownerList()" style="margin-bottom:8px;">
      <div class="select-all-bar">
        <label><input type="checkbox" id="chkAll" onchange="toggleAllLandowners()"> 全選択</label>
        <label><input type="checkbox" id="chkOnlyWithPostal" onchange="renderLandownerList()"> 住所あり</label>
        <span class="count-badge" id="selCount">0</span>
      </div>
      <div class="landowner-list" id="loList">
        <div class="loading"><div class="spinner"></div></div>
      </div>
    </div>
  </aside>

  <!-- メインエリア -->
  <main class="main">
    <!-- 手紙作成タブ -->
    <div class="tab-content active" id="content-letter">
      <div class="preview-toolbar no-print">
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
          <details style="position:relative;">
            <summary style="cursor:pointer;color:var(--accent);font-size:13px;padding:6px 12px;background:var(--surface2);border-radius:6px;border:1px solid var(--border);list-style:none;">⚙️ 差出人・テンプレート設定</summary>
            <div style="position:absolute;top:100%;left:0;z-index:50;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:16px;width:500px;margin-top:4px;box-shadow:0 4px 12px rgba(0,0,0,.3);max-height:70vh;overflow-y:auto;">
              <div class="section">
                <div class="section-title">差出人情報</div>
                <div class="form-group">
                  <label class="form-label">会社名</label>
                  <input class="form-input" type="text" id="fromCompany" placeholder="例：株式会社〇〇">
                </div>
                <div class="form-group">
                  <label class="form-label">担当者名</label>
                  <input class="form-input" type="text" id="fromName" placeholder="例：栗本">
                </div>
                <div class="form-group">
                  <label class="form-label">郵便番号</label>
                  <input class="form-input" type="text" id="fromPostal" placeholder="例：442-0000">
                </div>
                <div class="form-group">
                  <label class="form-label">住所</label>
                  <input class="form-input" type="text" id="fromAddress" placeholder="例：愛知県豊川市〇〇町...">
                </div>
                <div class="form-group">
                  <label class="form-label">電話番号</label>
                  <input class="form-input" type="text" id="fromTel" placeholder="例：0533-00-0000">
                </div>
                <button class="btn btn-primary" onclick="saveSettings()" style="width:100%;">💾 保存</button>
              </div>
              <div class="section">
                <div class="section-title">テンプレート</div>
                <div class="template-select-bar">
                  <select class="form-select" id="templateSelect" onchange="loadTemplate()"></select>
                  <button class="btn" onclick="newTemplate()">➕</button>
                  <button class="btn btn-danger" onclick="deleteTemplate()">🗑</button>
                </div>
                <div class="form-group">
                  <label class="form-label">テンプレート名</label>
                  <input class="form-input" type="text" id="tplName" placeholder="例：土地売却の打診">
                </div>
                <div class="form-group">
                  <label class="form-label">タイトル</label>
                  <input class="form-input" type="text" id="tplTitle" placeholder="例：所有地に関するご相談">
                </div>
                <div class="form-group">
                  <label class="form-label">本文</label>
                  <textarea class="form-textarea" id="tplBody" rows="14" oninput="updatePreview()"></textarea>
                  <div class="placeholder-help">
                    使用可能なプレースホルダー：
                    <code>{{name}}</code>氏名　<code>{{postal_code}}</code>郵便番号　<code>{{address}}</code>住所
                    <br><code>{{lands}}</code>所有土地の所在（自動整形）　<code>{{today}}</code>本日日付　<code>{{case_no}}</code>案件番号
                  </div>
                </div>
                <button class="btn btn-success" onclick="saveTemplate()" style="width:100%;">💾 テンプレート保存</button>
              </div>
            </div>
          </details>
          <span class="info" id="letterInfo">0件選択中</span>
        </div>
        <div>
          <button class="btn btn-primary" onclick="window.print()">🖨 印刷 / PDF化</button>
        </div>
      </div>
      <div id="letterPreview">
        <div class="empty-preview">
          <div class="empty-preview-icon">📝</div>
          左の一覧から地権者を選択すると<br>ここに手紙のプレビューが表示されます
        </div>
      </div>
    </div>

    <!-- 宛名ラベルタブ -->
    <div class="tab-content" id="content-label">
      <div class="preview-toolbar no-print">
        <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap;">
          <div>
            <label class="form-label" style="display:inline;font-size:11px;">ラベル形式:</label>
            <select class="form-select" id="labelFormat" onchange="renderLabelPreview()" style="display:inline-block;width:auto;padding:4px 8px;margin-left:4px;">
              <option value="21">A-one 28645 互換（21面・63.5×38.1mm）</option>
              <option value="12">A-one 28177 互換（12面・86.4×42.3mm）</option>
            </select>
          </div>
          <div>
            <label class="form-label" style="display:inline;font-size:11px;">開始位置:</label>
            <input class="form-input" type="number" id="labelStart" min="1" max="21" value="1" onchange="renderLabelPreview()" style="width:60px;display:inline-block;padding:4px 8px;">
          </div>
          <span class="info" id="labelInfo">0件選択中</span>
        </div>
        <div>
          <button class="btn btn-primary" onclick="window.print()">🖨 印刷 / PDF化</button>
        </div>
      </div>
      <div id="labelPreview">
        <div class="empty-preview">
          <div class="empty-preview-icon">🏷️</div>
          左の一覧から地権者を選択すると<br>ここに宛名ラベルのプレビューが表示されます
        </div>
      </div>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
// ============ Supabase接続 ============
const SUPABASE_URL='https://fygnrjjifoasozbhkxlk.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ5Z25yamppZm9hc296YmhreGxrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2MDYzNTEsImV4cCI6MjA5MDE4MjM1MX0.A1fAMcu7wGBBP4xHUKkrExIuy7MFbmarAtLQahwZiso';
const{createClient}=supabase;
const db=createClient(SUPABASE_URL,SUPABASE_KEY);

// ============ 状態 ============
let allLandowners=[];       // 地権者＋案件情報
let landsByCase={};         // case_id → [land_info...]
let selectedIds=new Set();  // 選択された地権者ID
let activeTab='letter';
let templates=[];           // LocalStorageのテンプレート
let currentTemplateIdx=0;

// デフォルトテンプレート
const DEFAULT_TEMPLATE={
  name:'デフォルト：土地売却のご相談',
  title:'所有地に関するご相談',
  body:`拝啓　時下ますますご清栄のこととお慶び申し上げます。

突然の書面にて失礼いたします。

このたび、{{name}}様が所有されている下記の土地につきまして、
弊社にてご活用・売買のご相談をさせていただきたく、
ご連絡差し上げました次第です。

{{lands}}

つきましては、今後のご予定やお考えについて
お聞かせいただけますと幸いです。

何卒よろしくお願い申し上げます。

敬具`
};

// ============ 初期化 ============
document.addEventListener('DOMContentLoaded',async()=>{
  loadSettings();
  loadTemplates();
  await loadData();
});

async function loadData(){
  document.getElementById('loadStatus').textContent='読込中...';
  const[loRes,ldRes]=await Promise.all([
    db.from('landowner_info').select('*,cases(case_no,status,area_name,kubun)').order('case_id'),
    db.from('land_info').select('case_id,location,area_sqm,chiban')
  ]);
  if(loRes.error){showToast('読込エラー: '+loRes.error.message,'error');return;}
  allLandowners=(loRes.data||[]).sort((a,b)=>(a.cases?.case_no||'').localeCompare(b.cases?.case_no||'','ja'));
  landsByCase={};
  (ldRes.data||[]).forEach(l=>{
    if(!l.case_id)return;
    (landsByCase[l.case_id]=landsByCase[l.case_id]||[]).push(l);
  });
  document.getElementById('loadStatus').textContent=`地権者 ${allLandowners.length}件`;
  renderLandownerList();
}

// ============ 地権者選択 ============
function getFilteredLandowners(){
  const area=document.getElementById('filterArea').value;
  const status=document.getElementById('filterStatus').value;
  const q=document.getElementById('searchQ').value.toLowerCase();
  const onlyAddr=document.getElementById('chkOnlyWithPostal').checked;
  return allLandowners.filter(lo=>{
    if(area&&lo.cases?.area_name!==area)return false;
    if(status&&lo.cases?.status!==status)return false;
    if(q&&!((lo.name||'').toLowerCase().includes(q)||(lo.cases?.case_no||'').toLowerCase().includes(q)))return false;
    if(onlyAddr&&!lo.address)return false;
    return true;
  });
}

function renderLandownerList(){
  const list=getFilteredLandowners();
  const el=document.getElementById('loList');
  if(!list.length){
    el.innerHTML='<div style="padding:20px;text-align:center;color:var(--text-muted);font-size:12px">該当なし</div>';
    updateCount();return;
  }
  el.innerHTML=list.map(lo=>{
    const sel=selectedIds.has(lo.id)?'checked':'';
    const missingAddr=!lo.address?'missing-addr':'';
    const addrLabel=lo.address?(lo.postal_code?`〒${lo.postal_code}`:'住所のみ'):'住所なし';
    return `<div class="landowner-item ${missingAddr}" onclick="toggleLandowner('${lo.id}',event)">
      <input type="checkbox" ${sel} data-id="${lo.id}" onclick="event.stopPropagation();toggleLandowner('${lo.id}')">
      <span class="case-no">${lo.cases?.case_no||'—'}</span>
      <span class="lo-name">${lo.name||'—'}</span>
      <span class="lo-meta">${addrLabel}</span>
    </div>`;
  }).join('');
  updateCount();
}

function toggleLandowner(id,e){
  if(e&&e.target&&e.target.tagName==='INPUT')return;
  if(selectedIds.has(id))selectedIds.delete(id);
  else selectedIds.add(id);
  renderLandownerList();
  updatePreview();
}

function toggleAllLandowners(){
  const chk=document.getElementById('chkAll').checked;
  const list=getFilteredLandowners();
  if(chk)list.forEach(lo=>selectedIds.add(lo.id));
  else list.forEach(lo=>selectedIds.delete(lo.id));
  renderLandownerList();
  updatePreview();
}

function updateCount(){
  document.getElementById('selCount').textContent=selectedIds.size;
  document.getElementById('letterInfo').textContent=`${selectedIds.size}件選択中`;
  document.getElementById('labelInfo').textContent=`${selectedIds.size}件選択中`;
  // 全選択チェック状態を同期
  const list=getFilteredLandowners();
  const chk=document.getElementById('chkAll');
  chk.checked=list.length>0&&list.every(lo=>selectedIds.has(lo.id));
}

// ============ タブ切替 ============
function switchTab(t){
  activeTab=t;
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab'+(t==='letter'?'Letter':'Label')).classList.add('active');
  document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
  document.getElementById('content-'+t).classList.add('active');
  updatePreview();
}

// ============ 設定保存（差出人情報）============
function loadSettings(){
  try{
    const s=JSON.parse(localStorage.getItem('letterGen_from')||'{}');
    ['fromCompany','fromName','fromPostal','fromAddress','fromTel'].forEach(k=>{
      if(s[k])document.getElementById(k).value=s[k];
    });
  }catch(e){}
}
function saveSettings(){
  const s={};
  ['fromCompany','fromName','fromPostal','fromAddress','fromTel'].forEach(k=>{s[k]=document.getElementById(k).value;});
  localStorage.setItem('letterGen_from',JSON.stringify(s));
  showToast('差出人情報を保存しました','success');
  updatePreview();
}

// ============ テンプレート管理 ============
function loadTemplates(){
  try{
    templates=JSON.parse(localStorage.getItem('letterGen_templates')||'null');
    if(!templates||!templates.length)templates=[{...DEFAULT_TEMPLATE}];
  }catch(e){
    templates=[{...DEFAULT_TEMPLATE}];
  }
  currentTemplateIdx=0;
  renderTemplateSelect();
  applyTemplate(templates[0]);
}
function renderTemplateSelect(){
  const sel=document.getElementById('templateSelect');
  sel.innerHTML=templates.map((t,i)=>`<option value="${i}" ${i===currentTemplateIdx?'selected':''}>${t.name||'(無名)'}</option>`).join('');
}
function loadTemplate(){
  currentTemplateIdx=Number(document.getElementById('templateSelect').value);
  applyTemplate(templates[currentTemplateIdx]);
  updatePreview();
}
function applyTemplate(t){
  document.getElementById('tplName').value=t.name||'';
  document.getElementById('tplTitle').value=t.title||'';
  document.getElementById('tplBody').value=t.body||'';
}
function saveTemplate(){
  const t={
    name:document.getElementById('tplName').value||'(無名)',
    title:document.getElementById('tplTitle').value,
    body:document.getElementById('tplBody').value
  };
  templates[currentTemplateIdx]=t;
  localStorage.setItem('letterGen_templates',JSON.stringify(templates));
  renderTemplateSelect();
  showToast('テンプレートを保存しました','success');
  updatePreview();
}
function newTemplate(){
  templates.push({name:'新しいテンプレート',title:'',body:''});
  currentTemplateIdx=templates.length-1;
  renderTemplateSelect();
  applyTemplate(templates[currentTemplateIdx]);
  localStorage.setItem('letterGen_templates',JSON.stringify(templates));
  showToast('新規テンプレートを作成しました','success');
}
function deleteTemplate(){
  if(templates.length<=1){showToast('最後のテンプレートは削除できません','error');return;}
  if(!confirm(`テンプレート「${templates[currentTemplateIdx].name}」を削除しますか？`))return;
  templates.splice(currentTemplateIdx,1);
  currentTemplateIdx=Math.max(0,currentTemplateIdx-1);
  localStorage.setItem('letterGen_templates',JSON.stringify(templates));
  renderTemplateSelect();
  applyTemplate(templates[currentTemplateIdx]);
  showToast('削除しました','success');
  updatePreview();
}

// ============ プレビュー更新 ============
function updatePreview(){
  if(activeTab==='letter')renderLetterPreview();
  else renderLabelPreview();
}

// ============ 手紙プレビュー ============
function getSelectedLandowners(){
  return allLandowners.filter(lo=>selectedIds.has(lo.id));
}
function formatToday(){
  const d=new Date();
  return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;
}
function formatLandsText(caseId){
  const lands=landsByCase[caseId]||[];
  if(!lands.length)return '';
  return lands.map(l=>{
    const loc=l.location||l.chiban||'（未登録）';
    const area=l.area_sqm?`（約${Number(l.area_sqm).toLocaleString()}㎡）`:'';
    return `・${loc}${area}`;
  }).join('\n');
}
function formatLandsHtml(caseId){
  const lands=landsByCase[caseId]||[];
  if(!lands.length)return '<div style="color:#888">（土地情報が登録されていません）</div>';
  return `<ul>${lands.map(l=>{
    const loc=l.location||l.chiban||'（未登録）';
    const area=l.area_sqm?`<span style="color:#555;margin-left:1em;">約${Number(l.area_sqm).toLocaleString()}㎡</span>`:'';
    return `<li>${loc}${area}</li>`;
  }).join('')}</ul>`;
}
function escapeHtml(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function renderLetterPreview(){
  const sel=getSelectedLandowners();
  const el=document.getElementById('letterPreview');
  if(!sel.length){
    el.innerHTML='<div class="empty-preview"><div class="empty-preview-icon">📝</div>地権者を選択してください</div>';
    return;
  }
  const from={
    company:document.getElementById('fromCompany').value||'',
    name:document.getElementById('fromName').value||'',
    postal:document.getElementById('fromPostal').value||'',
    address:document.getElementById('fromAddress').value||'',
    tel:document.getElementById('fromTel').value||''
  };
  const tpl={
    title:document.getElementById('tplTitle').value||'',
    body:document.getElementById('tplBody').value||''
  };
  const today=formatToday();
  el.innerHTML=sel.map(lo=>{
    const landsTextPlain=formatLandsText(lo.case_id);
    const landsHtml=formatLandsHtml(lo.case_id);
    let body=tpl.body
      .replace(/\{\{name\}\}/g,lo.name||'')
      .replace(/\{\{postal_code\}\}/g,lo.postal_code||'')
      .replace(/\{\{address\}\}/g,lo.address||'')
      .replace(/\{\{case_no\}\}/g,lo.cases?.case_no||'')
      .replace(/\{\{today\}\}/g,today);
    // lands を特別扱い（HTMLで土地ボックスにする）
    const landsPlaceholder='<<<LANDS_PLACEHOLDER>>>';
    body=body.replace(/\{\{lands\}\}/g,landsPlaceholder);
    body=escapeHtml(body);
    body=body.replace(landsPlaceholder,`<div class="land-box">${landsHtml}</div>`);
    return `<div class="letter-sheet">
      <div class="letter-date">${today}</div>
      <div class="letter-to">
        ${lo.postal_code?`<div class="letter-to-postal">〒${lo.postal_code}</div>`:''}
        ${lo.address?`<div class="letter-to-addr">${escapeHtml(lo.address)}</div>`:''}
        <div class="letter-to-name">${escapeHtml(lo.name||'')}<span class="sama">様</span></div>
      </div>
      <div class="letter-from">
        ${from.postal?`<span class="letter-from-line">〒${escapeHtml(from.postal)}</span>`:''}
        ${from.address?`<span class="letter-from-line">${escapeHtml(from.address)}</span>`:''}
        ${from.company?`<span class="letter-from-line">${escapeHtml(from.company)}</span>`:''}
        ${from.name?`<span class="letter-from-line">${escapeHtml(from.name)}</span>`:''}
        ${from.tel?`<span class="letter-from-line">TEL: ${escapeHtml(from.tel)}</span>`:''}
      </div>
      ${tpl.title?`<div class="letter-title">${escapeHtml(tpl.title)}</div>`:''}
      <div class="letter-body">${body}</div>
    </div>`;
  }).join('');
}

// ============ 宛名ラベルプレビュー ============
function renderLabelPreview(){
  const sel=getSelectedLandowners();
  const el=document.getElementById('labelPreview');
  if(!sel.length){
    el.innerHTML='<div class="empty-preview"><div class="empty-preview-icon">🏷️</div>地権者を選択してください</div>';
    return;
  }
  const format=document.getElementById('labelFormat').value;
  const start=Math.max(1,Number(document.getElementById('labelStart').value)||1);
  const perSheet=format==='21'?21:12;
  const gridClass=format==='21'?'label-grid-21':'label-grid-12';
  // シートリスト構築（開始位置分の空ラベル含む）
  const items=[];
  for(let i=0;i<start-1;i++)items.push(null);
  sel.forEach(lo=>items.push(lo));
  // シートごとに分割
  const sheets=[];
  for(let i=0;i<items.length;i+=perSheet){
    sheets.push(items.slice(i,i+perSheet));
  }
  el.innerHTML=sheets.map(sheet=>{
    // 各シートをperSheet個に埋める
    while(sheet.length<perSheet)sheet.push(null);
    return `<div class="label-sheet">
      <div class="${gridClass}">
        ${sheet.map(lo=>renderLabelItem(lo)).join('')}
      </div>
    </div>`;
  }).join('');
}

function renderLabelItem(lo){
  if(!lo)return '<div class="label-item empty"></div>';
  const addr=lo.address||'（住所未登録）';
  // 長い住所は2段に分割（25文字程度で折り返し）
  const addrLines=splitAddress(addr,24);
  return `<div class="label-item">
    <div class="label-postal">${lo.postal_code?'〒'+lo.postal_code:'　'}</div>
    <div class="label-addr">${escapeHtml(addrLines[0])}</div>
    ${addrLines[1]?`<div class="label-addr-2nd">${escapeHtml(addrLines[1])}</div>`:''}
    <div class="label-name">${escapeHtml(lo.name||'')} 様</div>
  </div>`;
}

function splitAddress(addr,maxLen){
  if(!addr||addr.length<=maxLen)return[addr||''];
  // 候補位置を全て列挙（丁目後、市/区/町/村後）
  const candidates=[];
  let m;
  const chomeRe=/丁目/g;
  while((m=chomeRe.exec(addr))!==null)candidates.push(m.index+2);
  const kuchoReRe=/[市区町村]/g;
  while((m=kuchoReRe.exec(addr))!==null)candidates.push(m.index+1);
  // maxLenの半分〜maxLen以内で、maxLenに近い候補を優先
  const valid=candidates.filter(i=>i>=maxLen/2&&i<=maxLen).sort((a,b)=>b-a);
  if(valid.length)return[addr.slice(0,valid[0]),addr.slice(valid[0])];
  // maxLenをちょっと超えても良い候補を探す
  const loose=candidates.filter(i=>i>=maxLen/2&&i<=maxLen*1.2).sort((a,b)=>a-b);
  if(loose.length)return[addr.slice(0,loose[0]),addr.slice(loose[0])];
  // フォールバック
  return[addr.slice(0,maxLen),addr.slice(maxLen)];
}

// ============ トースト ============
function showToast(msg,type='info'){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.className='toast '+(type==='error'?'error':type==='success'?'success':'');
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}
