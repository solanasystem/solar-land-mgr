<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>📝 手紙・宛名ラベル作成 | SOLAR LAND MGR</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d1117;--surface:#161b22;--surface2:#1c2129;--border:#30363d;
  --text:#e6edf3;--text-muted:#8b949e;--accent:#a371f7;--blue:#58a6ff;
  --green:#3fb950;--yellow:#f0b429;--red:#f85149;--orange:#fd7e14;
  --font-main:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;
  --font-mono:ui-monospace,SFMono-Regular,Menlo,monospace;
  --font-maru:"M PLUS Rounded 1c","Hiragino Maru Gothic ProN","Hiragino Maru Gothic Pro","HG丸ゴシックM-PRO","HGMaruGothicMPRO",sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font-main);background:var(--bg);color:var(--text);font-size:14px;min-height:100vh;}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.header-title{display:flex;align-items:center;gap:12px;font-weight:700;font-size:16px;}
.header-actions{display:flex;gap:8px;}
.btn{padding:8px 16px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text);cursor:pointer;font-size:13px;font-family:var(--font-main);transition:all .15s;white-space:nowrap;}
.btn:hover{background:#272d36;}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff;}
.btn-primary:hover{background:#8b5cf6;}
.btn-ghost{background:transparent;}
.btn-success{background:var(--green);border-color:var(--green);color:#fff;}
.btn-success:hover{background:#2ea043;}
.btn-danger{background:rgba(248,81,73,.15);border-color:rgba(248,81,73,.4);color:var(--red);}
.tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;}
.tab{padding:14px 24px;cursor:pointer;border:none;background:transparent;color:var(--text-muted);font-size:14px;font-weight:500;border-bottom:3px solid transparent;transition:all .15s;font-family:var(--font-main);}
.tab:hover{color:var(--text);}
.tab.active{color:var(--text);border-bottom-color:var(--accent);}
.layout{display:grid;grid-template-columns:380px 1fr;min-height:calc(100vh - 110px);}
.sidebar{background:var(--surface);border-right:1px solid var(--border);padding:16px;overflow-y:auto;max-height:calc(100vh - 110px);position:sticky;top:110px;}
.main{padding:24px;overflow-y:auto;background:var(--bg);}
.section{margin-bottom:20px;}
.section-title{font-size:12px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;}
.form-group{margin-bottom:10px;}
.form-label{display:block;font-size:12px;color:var(--text-muted);margin-bottom:4px;}
.form-input,.form-textarea,.form-select{width:100%;padding:8px 10px;border:1px solid var(--border);background:var(--surface2);color:var(--text);border-radius:6px;font-size:13px;font-family:var(--font-main);}
.form-input:focus,.form-textarea:focus,.form-select:focus{outline:none;border-color:var(--accent);}
.landowner-list{border:1px solid var(--border);border-radius:6px;background:var(--surface2);max-height:320px;overflow-y:auto;}
.landowner-item{padding:6px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;cursor:pointer;font-size:12px;}
.landowner-item:last-child{border-bottom:none;}
.landowner-item:hover{background:#272d36;}
.landowner-item input[type="checkbox"]{cursor:pointer;width:14px;height:14px;}
.landowner-item .case-no{color:var(--accent);font-weight:600;min-width:70px;font-family:var(--font-mono);font-size:11px;}
.landowner-item .lo-name{flex:1;font-weight:500;}
.landowner-item .lo-meta{color:var(--text-muted);font-size:10px;}
.landowner-item.missing-addr{opacity:.5;}
.landowner-item.missing-addr .lo-meta{color:var(--red);}
.select-all-bar{display:flex;gap:8px;align-items:center;padding:8px 10px;background:var(--surface2);border:1px solid var(--border);border-bottom:none;border-radius:6px 6px 0 0;font-size:12px;}
.select-all-bar label{display:flex;align-items:center;gap:4px;cursor:pointer;}
.count-badge{background:var(--accent);color:#fff;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;margin-left:auto;}
.filter-row{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px;}
.preview-toolbar{background:var(--surface);padding:10px 16px;border-radius:8px;margin-bottom:16px;display:flex;gap:8px;align-items:center;justify-content:space-between;flex-wrap:wrap;}
.preview-toolbar .info{font-size:12px;color:var(--text-muted);}
.empty-preview{padding:60px 20px;text-align:center;color:var(--text-muted);}
.empty-preview-icon{font-size:48px;margin-bottom:16px;}

/* ============================================================
   XAMAX標準レター（PDF忠実再現）
   ============================================================ */
.letter-sheet{
  width:210mm;min-height:297mm;
  padding:8mm 22mm 5mm 22mm;          /* A4 1枚に収めるため上下を圧縮 10/10→8/5 */
  margin:0 auto 16px;
  background:#fff;color:#000;
  font-family:var(--font-maru);
  font-size:11pt;line-height:1.15;   /* 行間を狭める 1.29→1.15 */
  letter-spacing:-0.4pt;             /* 字間を狭める -0.1pt→-0.4pt */
  page-break-after:always;
  box-shadow:0 2px 8px rgba(0,0,0,.2);
  box-sizing:border-box;
}
.letter-sheet:last-child{page-break-after:auto;}

/* タイトル画像 */
.xamax-title-img{display:block;width:82%;max-width:160mm;margin:0 auto 3mm auto;}  /* A4 1枚化のため 6mm→3mm */

/* 宛名行 */
.xamax-recipient{
  display:flex;align-items:baseline;gap:0;
  margin:0 0 5mm 0;
  padding-left:2mm;
  font-size:12pt;
}
.xamax-recipient .name-slot{
  flex:0 1 auto;
  min-width:54mm;   /* 70mm→54mm（8文字分短く） */
  border-bottom:0.8pt solid #000;
  padding:0 4pt 1.5pt 4pt;
  text-align:center;
  font-size:14pt;
  font-weight:500;
  line-height:1.3;
}
.xamax-recipient .sama{font-size:12pt;padding:0 8pt;}
.xamax-recipient .admin-label{font-size:10pt;padding:0 0 0 4pt;}
.xamax-recipient .admin-slot{
  flex:0 1 auto;
  min-width:35mm;
  border-bottom:0.8pt solid #000;
  padding:0 4pt 1.5pt 4pt;
  text-align:center;
  font-family:var(--font-mono);
  font-size:11pt;
  line-height:1.3;
}

/* 本文 */
.xamax-body{font-size:11pt;line-height:1.32;margin-bottom:2mm;letter-spacing:-0.4pt;}  /* A4 1枚化のため line-height 1.45→1.32, margin-bottom 5mm→2mm */
.xamax-body p{margin:0;text-align:left;}
.xamax-body strong{font-weight:700;}

/* 購入金額（下線が途切れない連続線）*/
.xamax-price-row{
  display:flex;align-items:flex-end;justify-content:center;
  margin:5mm 0 3mm 0;
  font-size:14pt;font-weight:700;
  gap:0;
}
.xamax-price-row .label-left,
.xamax-price-row .label-right{
  font-weight:700;
  white-space:nowrap;
  padding-bottom:1pt;
  border-bottom:1pt solid #000;
}
.xamax-price-row .price-val{
  flex:0 1 auto;
  min-width:30mm;   /* 51mm→30mm: 最大値1,000,000(9桁)にフィット、余分な空白を排除 */
  text-align:right;
  padding:0 4pt 1pt 4pt;
  font-weight:700;
  font-size:14pt;
  border-bottom:1pt solid #000;
}

/* 該当地テーブル（3列×4行固定） */
.xamax-land-table{
  width:100%;border-collapse:collapse;
  margin-bottom:6mm;
  font-size:11pt;
}
.xamax-land-table th,
.xamax-land-table td{
  border:0.7pt solid #000;
  padding:2mm 3mm;
  line-height:1.3;
}
.xamax-land-table th{
  background:#e8e8e8;
  font-weight:600;
  text-align:center;
}
.xamax-land-table th.loc-head{text-align:left;padding-left:3mm;}
.xamax-land-table td.loc{text-align:left;}
.xamax-land-table td.chimoku{text-align:center;width:28mm;}
.xamax-land-table td.area{text-align:right;width:30mm;}
.xamax-land-table td.area::after{content:" ㎡";}

/* 差出人ブロック（名刺画像を枠線で囲む） */
.xamax-sender-block{
  display:grid;grid-template-columns:63mm auto;   /* 右側もautoに */
  gap:6mm;
  margin:3mm auto 1mm auto;   /* 中央寄せ */
  align-items:flex-start;
  justify-content:center;      /* grid全体を中央寄せ */
  width:fit-content;           /* 中身に合わせた幅 */
}
.xamax-meishi-wrap{
  border:0.8pt solid #000;
  padding:1.5mm;
  background:#fff;
  display:block;
}
.xamax-meishi-img{width:100%;display:block;height:auto;}  /* 縦は比例自動 */
.xamax-sender-right{
  font-size:11pt;line-height:1.55;
  padding-top:2mm;padding-left:2mm;
}
.xamax-sender-right .company-name{
  font-size:14pt;font-weight:500;
  letter-spacing:0.3pt;
  margin-bottom:0.5mm;
}
.xamax-sender-right .company-kana{
  font-size:8pt;color:#000;
  letter-spacing:0.8pt;
  margin-bottom:1.5mm;
  padding-left:6pt;
}
.xamax-sender-right .person{
  font-size:14pt;font-weight:500;
  margin:0.5mm 0;
  letter-spacing:0.3pt;
}
.xamax-sender-right .tel{
  font-size:19pt;font-weight:500;
  letter-spacing:0.5pt;
  margin:0.5mm 0;line-height:1.2;
}
.xamax-sender-right .tel .lab{font-size:13pt;font-weight:500;}
.xamax-sender-right .email{
  font-size:11pt;margin:1mm 0;
  letter-spacing:0.2pt;
}
.xamax-sender-right .addr{
  font-size:9pt;margin-top:1mm;
  letter-spacing:0;
  white-space:nowrap;  /* 1行に収める */
}

/* XAMAXロゴ + 年月日（破線の直上に配置） */
/* ロゴ + 年月日 の行（ロゴを紙面中央に固定、年月日を右端に配置） */
/* CSS Grid (1fr auto 1fr) により左右の余白を強制的に等幅にする。
   従来のflex+margin:autoではautoマージンが3つ存在し均等分配されてしまい
   ロゴが左に寄っていた。grid-column指定で物理中央に固定する。 */
.xamax-logo-date-row{
  display:grid;
  grid-template-columns:1fr auto 1fr;
  align-items:center;
  margin:3mm 0 0 0;
  padding:0;
}
.xamax-logo-date-row .logo-center{
  grid-column:2;
  display:flex;justify-content:center;
  background:#fff;
  transform:translateX(-12mm);   /* クローバー1つ分左にシフト（視覚的バランス調整） */
}
.xamax-logo-date-row .logo-center img{
  height:11mm;display:block;
  background:transparent;
}
.xamax-logo-date-row .date-part{
  grid-column:3;
  justify-self:end;
  display:flex;align-items:center;
  gap:3mm;
  font-size:10.5pt;
}
.xamax-logo-date-row .date-slot{
  display:inline-block;
  min-width:7mm;
  padding:0 2pt;
  text-align:center;
  font-family:var(--font-maru);
}
.xamax-logo-date-row .date-label{font-size:10.5pt;}

/* 破線（PDF実測：短い横線の連続・細かく等間隔） */
.xamax-separator-text{
  margin:2mm 0 2mm 0;
  padding:0;
  height:0;
  border:none;
  border-top:1pt dashed #000;  /* CSSの破線で表現 */
  width:100%;
  /* dashedは各ブラウザで見え方が異なるため、background-imageで明示的に指定 */
  background-image:linear-gradient(to right,#000 50%,transparent 50%);
  background-size:5pt 1pt;  /* 短線2.5pt + 空白2.5pt の繰り返し */
  background-repeat:repeat-x;
  background-position:0 0;
  border-top:none;
  height:1pt;
}

/* 下部セクション */
.xamax-bottom{font-size:10pt;line-height:1.2;}  /* A4 1枚化のため 1.3→1.2 */
.xamax-bottom h4{font-size:11pt;font-weight:700;margin:1mm 0 1.5mm 0;}
.xamax-bottom .q{margin:1mm 0 0.5mm 3mm;font-size:10.5pt;}
.xamax-bottom .indent{margin-left:6mm;font-size:10pt;line-height:1.3;}
.xamax-contract-table{
  width:calc(100% - 6mm);
  border-collapse:collapse;
  margin:1mm 0 1.5mm 6mm;
  font-size:10pt;
}
.xamax-contract-table th,
.xamax-contract-table td{
  border:0.7pt solid #000;
  padding:1.4mm 2mm;
  text-align:center;line-height:1.25;
}
.xamax-contract-table th{background:#e8e8e8;font-weight:600;}
.xamax-bottom .note{margin:0.5mm 0 0 6mm;font-size:9.5pt;line-height:1.3;}

/* 宛名ラベル */
.label-sheet{width:210mm;height:297mm;margin:0 auto 16px;background:#fff;padding:0;box-shadow:0 2px 8px rgba(0,0,0,.2);page-break-after:always;position:relative;}
.label-sheet:last-child{page-break-after:auto;}
.label-grid-21{display:grid;grid-template-columns:repeat(3,63.5mm);grid-template-rows:repeat(7,38.1mm);padding:21.2mm 7.2mm;column-gap:2.54mm;row-gap:0;}
.label-grid-12{display:grid;grid-template-columns:repeat(2,86.4mm);grid-template-rows:repeat(6,42.3mm);padding:21.2mm 17mm;column-gap:3.2mm;row-gap:0;}
.label-item{padding:4mm 5mm;overflow:hidden;border:1px dashed #ccc;display:flex;flex-direction:column;justify-content:center;color:#000;font-family:var(--font-maru);box-sizing:border-box;}
.label-item.empty{border:1px dashed #eee;}
.label-postal{font-size:10pt;font-family:var(--font-mono);letter-spacing:.3mm;margin-bottom:1mm;color:#333;}
.label-addr{font-size:9pt;line-height:1.35;margin-bottom:2mm;}
.label-addr-2nd{font-size:8.5pt;color:#333;line-height:1.3;}
.label-name{font-size:12pt;font-weight:700;text-align:center;letter-spacing:2pt;}
.label-grid-12 .label-postal{font-size:11pt;}
.label-grid-12 .label-addr{font-size:10pt;}
.label-grid-12 .label-name{font-size:14pt;}

@media print{
  @page{size:A4;margin:0;}
  body{background:#fff !important;margin:0;padding:0;}
  .header,.tabs,.sidebar,.preview-toolbar,.layout{all:unset;display:block;}
  .layout{display:block;}
  .main{padding:0;margin:0;background:#fff;}
  .letter-sheet,.label-sheet{box-shadow:none;margin:0;page-break-after:always;}
  .label-item{border:none !important;}
  .empty-preview{display:none;}
  .no-print{display:none !important;}
  /* A4 1枚化保険：テーブル行と差出人/ロゴ行を分割禁止
     ※ .xamax-bottom はavoidにすると逆効果（丸ごと次ページに追い出される）ため対象外 */
  tr{page-break-inside:avoid;}
  .xamax-sender-block,.xamax-logo-date-row{page-break-inside:avoid;}
}

.tab-content{display:none;}
.tab-content.active{display:block;}
.loading{text-align:center;color:var(--text-muted);padding:40px;}
.spinner{display:inline-block;width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.toast{position:fixed;bottom:20px;right:20px;background:var(--accent);color:#fff;padding:12px 20px;border-radius:6px;font-size:13px;box-shadow:0 4px 12px rgba(0,0,0,.3);z-index:1000;opacity:0;transform:translateY(10px);transition:all .2s;pointer-events:none;}
.toast.show{opacity:1;transform:translateY(0);}
.toast.error{background:var(--red);}
.toast.success{background:var(--green);}
</style>
</head>
<body>

<header class="header no-print">
  <div class="header-title">
    <button class="btn btn-ghost" onclick="location.href='index.html'">← 戻る</button>
    📝 手紙・宛名ラベル作成
  </div>
  <div class="header-actions">
    <span id="loadStatus" style="color:var(--text-muted);font-size:12px"></span>
  </div>
</header>

<div class="tabs no-print">
  <button class="tab active" onclick="switchTab('letter')" id="tabLetter">📬 手紙作成</button>
  <button class="tab" onclick="switchTab('label')" id="tabLabel">🏷️ 宛名ラベル</button>
</div>

<div class="layout">
  <aside class="sidebar no-print">
    <div class="section">
      <div class="section-title">📍 地権者選択</div>
      <div class="filter-row">
        <select class="form-select" id="filterArea" onchange="renderLandownerList()">
          <option value="">すべてのエリア</option>
          <option>北海道</option><option>東北</option><option>関東</option><option>中部</option>
          <option>関西</option><option>中国</option><option>四国</option><option>九州</option>
        </select>
        <select class="form-select" id="filterStatus" onchange="renderLandownerList()">
          <option value="">全ステータス</option>
          <option>NOT VISITED</option><option>THINKING↑</option><option>THINKING→</option>
          <option>THINKING↓</option><option>OK</option><option>SUCCESS</option>
          <option>NON MEET</option><option>NG</option><option>UNKNOWN</option>
        </select>
      </div>
      <input class="form-input" type="text" placeholder="氏名・案件番号で絞込..." id="searchQ" oninput="renderLandownerList()" style="margin-bottom:8px;">
      <div class="select-all-bar">
        <label><input type="checkbox" id="chkAll" onchange="toggleAllLandowners()"> 全選択</label>
        <label><input type="checkbox" id="chkOnlyWithPostal" onchange="renderLandownerList()"> 住所あり</label>
        <span class="count-badge" id="selCount">0</span>
      </div>
      <div class="landowner-list" id="loList">
        <div class="loading"><div class="spinner"></div></div>
      </div>
    </div>
  </aside>

  <main class="main">
    <div class="tab-content active" id="content-letter">
      <div class="preview-toolbar no-print">
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
          <label style="display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text);background:var(--surface2);padding:6px 10px;border-radius:6px;border:1px solid var(--border);">
            差出人
            <select id="senderPreset" onchange="switchSenderPreset(this.value)" style="padding:3px 6px;border:1px solid var(--border);background:var(--bg);color:var(--text);border-radius:4px;font-size:12px;font-family:inherit;">
              <option value="kurimoto">栗本 工</option>
              <option value="itani">伊谷 保博</option>
            </select>
          </label>
          <details style="position:relative;">
            <summary style="cursor:pointer;color:var(--accent);font-size:13px;padding:6px 12px;background:var(--surface2);border-radius:6px;border:1px solid var(--border);list-style:none;">⚙️ 差出人情報</summary>
            <div style="position:absolute;top:100%;left:0;z-index:50;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:16px;width:500px;margin-top:4px;box-shadow:0 4px 12px rgba(0,0,0,.3);max-height:70vh;overflow-y:auto;">
              <div class="section">
                <div class="section-title">差出人情報（現在のプリセットを編集）</div>
                <div class="form-group"><label class="form-label">会社名</label><input class="form-input" type="text" id="fromCompany"></div>
                <div class="form-group"><label class="form-label">会社名（カナ）</label><input class="form-input" type="text" id="fromCompanyKana"></div>
                <div class="form-group"><label class="form-label">氏名</label><input class="form-input" type="text" id="fromName"></div>
                <div class="form-group"><label class="form-label">氏名（カナ）</label><input class="form-input" type="text" id="fromNameKana"></div>
                <div class="form-group"><label class="form-label">郵便番号</label><input class="form-input" type="text" id="fromPostal"></div>
                <div class="form-group"><label class="form-label">住所</label><input class="form-input" type="text" id="fromAddress"></div>
                <div class="form-group"><label class="form-label">電話番号</label><input class="form-input" type="text" id="fromTel"></div>
                <div class="form-group"><label class="form-label">Email</label><input class="form-input" type="text" id="fromEmail"></div>
                <button class="btn btn-primary" onclick="saveSettings()" style="width:100%;">💾 このプリセットを保存</button>
              </div>
              <div class="section">
                <div class="section-title">オプション</div>
                <label style="display:flex;align-items:center;gap:6px;font-size:13px;">
                  <input type="checkbox" id="optShowContract" checked onchange="updatePreview()"> 下部の「不動産屋への媒介契約」セクションを含める
                </label>
              </div>
            </div>
          </details>

function renderLabelPreview(){
  const sel=getSelectedLandowners();
  const el=document.getElementById('labelPreview');
  if(!sel.length){
    el.innerHTML='<div class="empty-preview"><div class="empty-preview-icon">🏷️</div>地権者を選択してください</div>';
    return;
  }
  const format=document.getElementById('labelFormat').value;
  const start=Math.max(1,Number(document.getElementById('labelStart').value)||1);
  const perSheet=format==='21'?21:12;
  const gridClass=format==='21'?'label-grid-21':'label-grid-12';
  const items=[];
  for(let i=0;i<start-1;i++)items.push(null);
  sel.forEach(lo=>items.push(lo));
  const sheets=[];
  for(let i=0;i<items.length;i+=perSheet){
    sheets.push(items.slice(i,i+perSheet));
  }
  el.innerHTML=sheets.map(sheet=>{
    while(sheet.length<perSheet)sheet.push(null);
    return `<div class="label-sheet"><div class="${gridClass}">${sheet.map(lo=>renderLabelItem(lo)).join('')}</div></div>`;
  }).join('');
}

function renderLabelItem(lo){
  if(!lo)return '<div class="label-item empty"></div>';
  const addr=lo.address||'（住所未登録）';
  const addrLines=splitAddress(addr,24);
  return `<div class="label-item">
    <div class="label-postal">${lo.postal_code?'〒'+lo.postal_code:'　'}</div>
    <div class="label-addr">${escapeHtml(addrLines[0])}</div>
    ${addrLines[1]?`<div class="label-addr-2nd">${escapeHtml(addrLines[1])}</div>`:''}
    <div class="label-name">${escapeHtml(lo.name||'')} 様</div>
  </div>`;
}

function splitAddress(addr,maxLen){
  if(!addr||addr.length<=maxLen)return[addr||''];
  const candidates=[];
  let m;
  const chomeRe=/丁目/g;
  while((m=chomeRe.exec(addr))!==null)candidates.push(m.index+2);
  const kuchoRe=/[市区町村]/g;
  while((m=kuchoRe.exec(addr))!==null)candidates.push(m.index+1);
  const valid=candidates.filter(i=>i>=maxLen/2&&i<=maxLen).sort((a,b)=>b-a);
  if(valid.length)return[addr.slice(0,valid[0]),addr.slice(valid[0])];
  const loose=candidates.filter(i=>i>=maxLen/2&&i<=maxLen*1.2).sort((a,b)=>a-b);
  if(loose.length)return[addr.slice(0,loose[0]),addr.slice(loose[0])];
  return[addr.slice(0,maxLen),addr.slice(maxLen)];
}

function showToast(msg,type='info'){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.className='toast '+(type==='error'?'error':type==='success'?'success':'');
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}
